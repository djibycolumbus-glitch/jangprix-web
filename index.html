<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jàng Prix — Prix Agricoles Dakar</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f2;
      --bg2: #ffffff;
      --bg3: #f0ede8;
      --bg4: #e8e4dc;
      --border: #e2ddd6;
      --border2: #ccc7bc;

      --accent: #c84b2f;
      --accent2: #a33a21;
      --accent-light: #fdf0ec;
      --accent-mid: #f5d5cc;

      --green: #1a7a4a;
      --green-bg: #edf7f2;
      --green-border: #b8e4cc;

      --red: #c84b2f;
      --red-bg: #fdf0ec;
      --red-border: #f5c4b8;

      --amber: #b07d1a;
      --amber-bg: #fef9ec;
      --amber-border: #f0dfa0;

      --blue: #1d5fa8;
      --blue-bg: #eef4fd;

      --text: #1a1714;
      --text2: #3d3830;
      --text3: #6b6358;
      --text4: #968d82;
      --text5: #bbb4ab;

      --shadow-sm: 0 1px 3px rgba(26,23,20,0.06), 0 1px 2px rgba(26,23,20,0.04);
      --shadow-md: 0 4px 12px rgba(26,23,20,0.08), 0 2px 4px rgba(26,23,20,0.04);
      --shadow-lg: 0 12px 32px rgba(26,23,20,0.10), 0 4px 8px rgba(26,23,20,0.06);

      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
    }
    .logo-block { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 700; font-size: 14px; color: white;
      letter-spacing: -0.5px;
      box-shadow: 0 2px 8px rgba(200,75,47,0.3);
    }
    .logo-name {
      font-family: 'Fraunces', serif;
      font-size: 19px; font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-sub { font-size: 11px; color: var(--text4); margin-top: 1px; font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: var(--green);
      letter-spacing: 0.8px; text-transform: uppercase;
      background: var(--green-bg);
      padding: 5px 10px; border-radius: 20px;
      border: 1px solid var(--green-border);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .header-date { font-size: 12px; color: var(--text4); font-weight: 400; }
    .header-zone { font-size: 12px; color: var(--text5); }

    /* ── TABASKI BANNER ── */
    .tabaski-banner {
      background: var(--amber-bg);
      border-bottom: 1px solid var(--amber-border);
      padding: 10px 40px;
    }
    .tabaski-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .tabaski-label {
      font-size: 10px; font-weight: 700; color: var(--amber);
      text-transform: uppercase; letter-spacing: 1.2px;
      background: rgba(176,125,26,0.12); padding: 3px 9px;
      border-radius: 20px; border: 1px solid var(--amber-border);
    }
    .tabaski-days {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 700; color: var(--amber);
      line-height: 1;
    }
    .tabaski-jours { font-size: 13px; color: var(--amber); opacity: 0.7; }
    .tabaski-tip { font-size: 12px; color: var(--amber); opacity: 0.6; }

    /* ── STATS BAR ── */
    .stats-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
    }
    .stats-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 0;
    }
    .stat-item {
      padding: 16px 48px 16px 0;
      position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute; right: 24px; top: 50%;
      transform: translateY(-50%);
      width: 1px; height: 24px;
      background: var(--border);
    }
    .stat-value {
      font-family: 'Fraunces', serif;
      font-size: 24px; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .stat-label {
      font-size: 11px; color: var(--text4);
      margin-top: 3px; text-transform: uppercase;
      letter-spacing: 0.6px; font-weight: 500;
    }

    /* ── MAIN ── */
    .main { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }

    .page-header { margin-bottom: 24px; }
    .page-title {
      font-family: 'Fraunces', serif;
      font-size: 26px; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; line-height: 1.2;
    }
    .page-sub { font-size: 14px; color: var(--text3); margin-top: 4px; }

    /* ── SEARCH & FILTERS ── */
    .search-filter-row {
      display: flex; gap: 12px; margin-bottom: 24px;
      flex-wrap: wrap; align-items: flex-start;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 280px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text4); font-size: 15px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 10px 14px 10px 40px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .search-input::placeholder { color: var(--text5); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,75,47,0.08);
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--text3);
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
    }
    .cat-tab:hover { border-color: var(--border2); color: var(--text2); background: var(--bg3); }
    .cat-tab.active {
      background: var(--accent); color: white;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(200,75,47,0.25);
    }

    /* ── LOADING ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 100px; color: var(--text4);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    /* ── COMMODITY GRID ── */
    .commodity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    /* ── COMMODITY CARD ── */
    .commodity-card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }
    .commodity-card:hover {
      border-color: var(--border2);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .commodity-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,75,47,0.1), var(--shadow-md);
    }

    .card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 16px; gap: 10px;
    }
    .card-cat-chip {
      font-size: 10px; font-weight: 600; color: var(--text4);
      text-transform: uppercase; letter-spacing: 0.8px;
      background: var(--bg3); padding: 3px 8px;
      border-radius: 20px; border: 1px solid var(--border);
      white-space: nowrap; margin-bottom: 5px;
      display: inline-block;
    }
    .card-name {
      font-family: 'Fraunces', serif;
      font-weight: 600; font-size: 17px;
      color: var(--text); line-height: 1.2;
    }
    .card-markets { font-size: 11px; color: var(--text4); margin-top: 4px; }

    .rec-badge {
      font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      flex-shrink: 0; white-space: nowrap;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .rec-sell {
      background: var(--green-bg); color: var(--green);
      border: 1.5px solid var(--green-border);
    }
    .rec-wait {
      background: var(--red-bg); color: var(--red);
      border: 1.5px solid var(--red-border);
    }
    .rec-pending {
      background: var(--bg3); color: var(--text4);
      border: 1.5px solid var(--border);
    }

    /* Price display */
    .price-block { margin-bottom: 12px; }
    .price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .price-value {
      font-family: 'Fraunces', serif;
      font-size: 36px; font-weight: 700;
      color: var(--text); line-height: 1;
      letter-spacing: -1px;
    }
    .price-currency { font-size: 14px; color: var(--text3); font-weight: 500; }
    .price-unit { font-size: 12px; color: var(--text4); }

    /* Reason box */
    .rec-reason {
      font-size: 12px; line-height: 1.5;
      padding: 9px 12px; border-radius: var(--radius-sm);
      margin-bottom: 10px; font-weight: 400;
    }
    .rec-reason.sell {
      background: var(--green-bg);
      border-left: 3px solid var(--green);
      color: #166035;
    }
    .rec-reason.wait {
      background: var(--red-bg);
      border-left: 3px solid var(--red);
      color: #9a2e1a;
    }
    .rec-reason.pending {
      background: var(--bg3);
      border-left: 3px solid var(--border2);
      color: var(--text3);
    }

    /* Prediction pill */
    .pred-summary {
      font-size: 12px; padding: 7px 12px;
      border-radius: var(--radius-sm); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
      font-weight: 500;
    }
    .pred-summary.up { background: var(--red-bg); color: #9a2e1a; border: 1px solid var(--red-border); }
    .pred-summary.down { background: var(--green-bg); color: #166035; border: 1px solid var(--green-border); }
    .pred-summary.stable { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
    .pred-arrow { font-size: 13px; flex-shrink: 0; }

    /* Sources table */
    .sources-divider {
      height: 1px; background: var(--border); margin-bottom: 12px;
    }
    .sources-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .sources-table td { padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--bg3); }
    .sources-table tr:last-child td { border-bottom: none; }
    .td-source { color: var(--text4); width: 70px; font-weight: 500; }
    .td-market { color: var(--text3); }
    .td-price { color: var(--text); font-weight: 600; text-align: right; font-family: 'Fraunces', serif; }
    .td-type { text-align: right; }
    .type-tag {
      font-size: 10px; color: var(--text4);
      background: var(--bg3); padding: 2px 7px;
      border-radius: 20px; border: 1px solid var(--border);
    }
    .card-date { font-size: 11px; color: var(--text5); margin-bottom: 14px; }

    /* Buttons */
    .card-actions { display: flex; flex-direction: column; gap: 6px; }
    .voir-btn {
      width: 100%; padding: 10px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text3);
    }
    .voir-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .voir-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(200,75,47,0.25); }

    .report-btn {
      width: 100%; padding: 8px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text4);
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .report-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }

    /* ── REVENUE CALCULATOR ── */
    .calc-section {
      margin-top: 12px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .calc-label {
      font-size: 11px; font-weight: 600; color: var(--text4);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
    }
    .calc-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .calc-input {
      flex: 1; padding: 8px 10px;
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
      min-width: 0; transition: border-color 0.15s;
    }
    .calc-input:focus { border-color: var(--accent); background: var(--bg2); }
    .calc-unit { font-size: 12px; color: var(--text4); white-space: nowrap; }
    .calc-results { display: flex; flex-direction: column; gap: 6px; }
    .calc-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: var(--bg3);
      border-radius: var(--radius-xs); border: 1px solid var(--border);
    }
    .calc-row.best-market { border-color: var(--green-border); background: var(--green-bg); }
    .calc-market { font-size: 12px; color: var(--text3); }
    .calc-earning { font-size: 14px; font-weight: 700; color: var(--text); font-family: 'Fraunces', serif; }
    .calc-earning.best { color: var(--green); }
    .calc-best-label {
      font-size: 10px; font-weight: 600; color: var(--green);
      background: rgba(26,122,74,0.1); padding: 2px 7px; border-radius: 20px;
    }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 40px;
      box-shadow: var(--shadow-md);
      animation: fadeUp 0.25s ease both;
    }
    .detail-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 22px;
      flex-wrap: wrap; gap: 14px;
    }
    .detail-title {
      font-family: 'Fraunces', serif;
      font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px;
    }
    .detail-sub { font-size: 12px; color: var(--text4); margin-top: 4px; }
    .detail-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .detail-tab {
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text3);
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .detail-tab:hover { border-color: var(--border2); color: var(--text2); }
    .detail-tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(200,75,47,0.2); }

    .market-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .mkt-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg3);
      color: var(--text3); font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .mkt-btn:hover { border-color: var(--border2); color: var(--text2); }
    .mkt-btn.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }

    /* Prediction months */
    .pred-months { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
    .pred-month-card {
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
      transition: border-color 0.15s;
    }
    .pred-month-card.active-month { border-color: var(--accent); }
    .pred-month-name {
      font-size: 11px; font-weight: 600; color: var(--text4);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
    }
    .pred-month-price {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 700; margin-bottom: 4px; line-height: 1;
    }
    .pred-month-price.up { color: var(--red); }
    .pred-month-price.down { color: var(--green); }
    .pred-month-price.stable { color: var(--text2); }
    .pred-month-change { font-size: 12px; margin-bottom: 8px; font-weight: 500; }
    .pred-month-change.up { color: var(--red); }
    .pred-month-change.down { color: var(--green); }
    .pred-month-change.stable { color: var(--text4); }
    .pred-month-driver { font-size: 11px; color: var(--text4); line-height: 1.4; }
    .pred-confidence { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .pred-conf-bar-wrap { flex: 1; background: var(--border); border-radius: 2px; height: 3px; overflow: hidden; }
    .pred-conf-bar { height: 100%; border-radius: 2px; background: var(--accent); }
    .pred-conf-label { font-size: 10px; color: var(--text5); white-space: nowrap; }

    /* Factors */
    .pred-factors { margin-top: 22px; }
    .pred-factors-title {
      font-size: 11px; font-weight: 600; color: var(--text4);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px;
    }
    .factor-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid var(--bg3);
    }
    .factor-row:last-child { border-bottom: none; }
    .factor-icon {
      width: 32px; height: 32px; border-radius: var(--radius-xs);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; font-weight: 700;
    }
    .factor-icon.positive { background: var(--green-bg); color: var(--green); }
    .factor-icon.negative { background: var(--red-bg); color: var(--red); }
    .factor-icon.neutral { background: var(--bg3); color: var(--text4); }
    .factor-name { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
    .factor-desc { font-size: 12px; color: var(--text4); line-height: 1.4; }
    .factor-impact { font-size: 11px; font-weight: 600; margin-top: 4px; }
    .factor-impact.positive { color: var(--green); }
    .factor-impact.negative { color: var(--red); }
    .factor-impact.neutral { color: var(--text4); }
    .pred-disclaimer {
      margin-top: 18px; padding: 12px 16px;
      background: var(--bg3); border-radius: var(--radius-sm);
      font-size: 11px; color: var(--text4); line-height: 1.6;
      border: 1px solid var(--border);
    }

    /* Comparison */
    .comparison-list { display: flex; flex-direction: column; gap: 12px; max-width: 620px; }
    .comparison-row { display: flex; align-items: center; gap: 14px; }
    .comp-market { width: 150px; flex-shrink: 0; }
    .comp-market-name { font-size: 13px; color: var(--text); font-weight: 600; display: block; }
    .comp-source-tag { font-size: 10px; color: var(--text5); }
    .comp-bar-wrap {

}

const TABASKI_2026 = new Date('2026-06-27')
const RAMADAN_2026_START = new Date('2026-02-17')
const RAMADAN_2026_END = new Date('2026-03-18')

function isNearTabaski(targetDate, weeks=6){
  const diff=(TABASKI_2026-targetDate)/86400000
  return diff>0&&diff<(weeks*7)
}
function isRamadan(targetDate){
  return targetDate>=RAMADAN_2026_START&&targetDate<=RAMADAN_2026_END
}
function getCategorySeasonalFactor(category, month, history){
  const s=SENEGAL_SEASONS[month]||{}
  if(category==='cereals and tubers'){
    if(s.lean) return{pct:+12,driver:'Soudure (stocks bas)',direction:'up',confidence:78}
    if(s.rain) return{pct:+6,driver:'Pluies limitent transport',direction:'up',confidence:65}
    if(s.harvest) return{pct:-15,driver:'Arrivée des récoltes',direction:'down',confidence:85}
    return{pct:-3,driver:'Saison sèche stable',direction:'stable',confidence:60}
  }
  if(category==='pulses and nuts'){
    if(s.lean) return{pct:+8,driver:'Soudure (stocks réduits)',direction:'up',confidence:72}
    if(s.harvest) return{pct:-12,driver:'Récolte d\'arachides',direction:'down',confidence:80}
    if(s.rain) return{pct:+4,driver:'Accès réduit aux marchés',direction:'up',confidence:60}
    return{pct:0,driver:'Période stable',direction:'stable',confidence:55}
  }
  if(category==='vegetables'){
    if(s.rain) return{pct:+18,driver:'Pluies réduisent l\'offre maraîchère',direction:'up',confidence:75}
    if(s.harvest) return{pct:-20,driver:'Pic de production Niayes',direction:'down',confidence:88}
    return{pct:+5,driver:'Demande urbaine stable',direction:'stable',confidence:58}
  }
  if(category==='fish'||category==='seafood'){
    if(s.rain) return{pct:+15,driver:'Pluies limitent la pêche artisanale',direction:'up',confidence:70}
    if(month>=1&&month<=4) return{pct:-10,driver:'Haute saison de pêche',direction:'down',confidence:72}
    return{pct:+3,driver:'Demande stable en poisson',direction:'stable',confidence:55}
  }
  if(category==='meat'||category==='poultry'){
    if(isNearTabaski(new Date(new Date().getFullYear(),month,1))) return{pct:+25,driver:'Approche de Tabaski — forte demande',direction:'up',confidence:85}
    if(isRamadan(new Date(new Date().getFullYear(),month,15))) return{pct:+10,driver:'Ramadan — hausse de consommation',direction:'up',confidence:70}
    return{pct:+2,driver:'Demande stable en viande',direction:'stable',confidence:50}
  }
  if(category==='livestock'){
    return{pct:0,driver:'Demande stable',direction:'stable',confidence:50}
  }
  return{pct:0,driver:'Facteurs saisonniers',direction:'stable',confidence:50}
}
function getHistoricalSeasonalAvg(history, targetMonth){
  const relevant=history.filter(h=>{
    if(!h.price_date)return false
    const m=new Date(h.price_date).getMonth()
    return m===targetMonth
  })
  if(!relevant.length)return null
  return relevant.reduce((s,h)=>s+h.price,0)/relevant.length
}
function buildPrediction(currentPrice, category, history){
  const now=new Date()
  const months=[]
  for(let i=1;i<=3;i++){
    const targetDate=new Date(now.getFullYear(),now.getMonth()+i,1)
    const targetMonth=targetDate.getMonth()
    const monthName=targetDate.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
    const seasonal=getCategorySeasonalFactor(category,targetMonth,history)
    const histAvg=getHistoricalSeasonalAvg(history,targetMonth)
    let predictedPrice, confidence=seasonal.confidence
    if(histAvg&&history.length>12){
      const currentPlusSeasonal=currentPrice*(1+seasonal.pct/100)
      predictedPrice=Math.round(histAvg*0.6+currentPlusSeasonal*0.4)
      confidence=Math.min(seasonal.confidence+10,92)
    } else {
      predictedPrice=Math.round(currentPrice*(1+seasonal.pct/100))
    }
    const changePct=Math.round(((predictedPrice-currentPrice)/currentPrice)*100)
    const direction=changePct>5?'up':changePct<-5?'down':'stable'
    const factors=[]
    const s=SENEGAL_SEASONS[targetMonth]||{}
    if(s.rain) factors.push({name:'Saison des pluies',desc:'Les pluies limitent le transport et réduisent l\'offre sur les marchés.',impact:'negative',icon:'🌧'})
    if(s.harvest) factors.push({name:'Période de récolte',desc:'L\'arrivée des nouvelles récoltes augmente l\'offre et fait baisser les prix.',impact:'positive',icon:'🌾'})
    if(s.lean) factors.push({name:'Période de soudure',desc:'Les stocks s\'épuisent. La demande dépasse l\'offre disponible.',impact:'negative',icon:'📉'})
    if(isNearTabaski(targetDate)&&(category==='livestock'||category==='cereals and tubers'||category==='meat'||category==='poultry'))
      factors.push({name:'Approche de Tabaski',desc:'La demande augmente fortement dans les semaines précédant Tabaski.',impact:'negative',icon:'🐑'})
    if(isRamadan(targetDate))
      factors.push({name:'Ramadan',desc:'La consommation d\'oignons, sucre et huile augmente pendant le Ramadan.',impact:'negative',icon:'🌙'})
    if(!factors.length)
      factors.push({name:'Marché stable',desc:'Aucun facteur saisonnier majeur attendu.',impact:'neutral',icon:'📊'})
    months.push({monthName,targetMonth,predictedPrice,changePct,direction,confidence,driver:seasonal.driver,factors})
  }
  return months
}
function getRec(avg,hist){
  if(!hist||hist.length<6) return{label:'EN ATTENTE',cls:'rec-pending',reason:'Données insuffisantes. La recommandation sera disponible prochainement.',reasonCls:'pending'}
  const old=hist.slice(-12,-1).map(h=>h.price)
  const mean=old.reduce((a,b)=>a+b,0)/old.length
  const pct=((avg-mean)/mean)*100
  if(pct>8) return{label:'VENDRE',cls:'rec-sell',reason:'Prix '+Math.round(pct)+'% au-dessus de la moyenne saisonnière. Bon moment pour vendre.',reasonCls:'sell'}
  if(pct<-8) return{label:'ATTENDRE',cls:'rec-wait',reason:'Prix '+Math.abs(Math.round(pct))+'% sous la moyenne saisonnière. Attendez une remontée.',reasonCls:'wait'}
  return{label:'VENDRE',cls:'rec-sell',reason:'Prix dans la normale saisonnière. Conditions correctes pour vendre.',reasonCls:'sell'}
}
function getTabaski(){
  const d=Math.ceil((TABASKI_2026-new Date())/86400000)

}

        <div className="detail-tabs">
          {[['predict','Prévision 3 mois'],['compare','Comparer marchés'],['years','Comparer années'],['trend','Tendance'],['history','Historique']].map(([k,l])=>(
            <button type="button" key={k} className={'detail-tab'+(activeTab===k?' active':'')} onClick={e=>{e.preventDefault();setActiveTab(k)}}>{l}</button>
          ))}
        </div>
      </div>
      {markets.length>1&&(
        <div className="market-filter">
          <span style={{fontSize:11,color:'var(--text5)',alignSelf:'center',marginRight:4}}>Filtrer :</span>
          <button type="button" className={'mkt-btn'+(marketFilter==='all'?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter('all')}}>Tous</button>
          {markets.map(m=>(
            <button type="button" key={m} className={'mkt-btn'+(marketFilter===m?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter(m)}}>{m}</button>
          ))}
        </div>
      )}
      {activeTab==='predict'&&(
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 10px'}}></div>Chargement des données...</div>):(
          <PredictionTab commodity={selected.commodity} currentPrice={avg} history={filteredHistory}/>
        )
      )}
      {activeTab==='compare'&&(
        filteredGroup.length<2?(<div className="no-data">Un seul marché disponible pour ce produit.</div>):(
          <>
            <div className="comparison-list">
              {sortedGroup.map(p=>{
                const pct=max>min?((p.price-min)/(max-min))*100:50
                return(
                  <div key={p.id} className="comparison-row">
                    <div className="comp-market">
                      <span className="comp-market-name">{p.market_name}</span>
                      <span className="comp-source-tag">{SOURCE_LABEL[p.source]||p.source} · {p.price_type==='retail'?'Détail':'Gros'}</span>
                    </div>
                    <div className="comp-bar-wrap">
                      <div className="comp-bar" style={{width:Math.max(pct,5)+'%',background:p.price===min?'var(--green)':p.price===max?'var(--red)':'var(--accent)'}}/>
                    </div>
                    <div className="comp-price-wrap">
                      <span className="comp-price">{Math.round(p.price).toLocaleString('fr-FR')} F</span>
                      {p.price===min&&<span className="comp-tag best">Meilleur</span>}
                      {p.price===max&&<span className="comp-tag worst">Plus cher</span>}
                    </div>
                  </div>
                )
              })}
            </div>
            <div className="insight-box">
              Écart de <strong>{Math.round(max-min).toLocaleString('fr-FR')} FCFA/{selected.commodity.unit||'kg'}</strong> entre {sortedGroup[0].market_name} ({Math.round(min).toLocaleString('fr-FR')} F) et {sortedGroup[sortedGroup.length-1].market_name} ({Math.round(max).toLocaleString('fr-FR')} F).
            </div>
          </>
        )
      )}
      {activeTab==='years'&&(
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 10px'}}></div>Chargement...</div>):filteredHistory.length===0?(<div className="no-data">Pas de données historiques disponibles.</div>):(()=>{
          const now=new Date()
          const currentYear=now.getFullYear()
          const currentMonth=now.getMonth()
          const byYear={}
          filteredHistory.forEach(h=>{
            if(!h.price_date)return
            const d=new Date(h.price_date)
            const y=d.getFullYear()
            const m=d.getMonth()
            if(m>currentMonth)return
            if(!byYear[y])byYear[y]=[]
            byYear[y].push(h.price)
          })
          const years=Object.entries(byYear)
            .filter(([y])=>parseInt(y)>=currentYear-5)
            .sort((a,b)=>b[0]-a[0])
            .map(([year,prices])=>({year:parseInt(year),avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length),count:prices.length}))
          if(years.length<2) return <div className="no-data">Pas assez d'années de données pour comparer.</div>
          const currentYearData=years.find(y=>y.year===currentYear)
          const lastYearData=years.find(y=>y.year===currentYear-1)
          const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
          const periodLabel=months[0]+' – '+months[currentMonth]+' '+currentYear
          return(
            <div>
              <div style={{fontSize:12,color:'var(--text4)',marginBottom:16}}>Comparaison sur la même période ({periodLabel}) · {years.length} années disponibles</div>
              <div className="year-comp-grid">
                {years.map((y,i)=>{
                  const isCurrent=y.year===currentYear
                  const vsNow=currentYearData&&!isCurrent?Math.round(((currentYearData.avg-y.avg)/y.avg)*100):null
                  const direction=vsNow===null?'same':vsNow>5?'higher':vsNow<-5?'lower':'same'
                  const vsLabel=vsNow===null?'Année en cours':vsNow>0?'Cette année: +'+vsNow+'% plus cher':vsNow<0?'Cette année: '+vsNow+'% moins cher':'Prix similaire à cette année'
                  return(
                    <div key={y.year} className={'year-comp-card'+(isCurrent?' current-year':'')}>
                      <div className="year-label">{y.year}{isCurrent?' (en cours)':''}</div>
                      <div className="year-price">{y.avg.toLocaleString('fr-FR')} FCFA</div>
                      <div className={'year-vs-now '+direction}>{vsLabel}</div>
                      <div className="year-months">{y.count} relevés</div>
                    </div>
                  )
                })}
              </div>
              {currentYearData&&lastYearData&&(
                <div className="year-insight">
                  {currentYearData.avg>lastYearData.avg?(
                    <span>Les prix du <strong>{fr(selected.commodity.name_fr)}</strong> sont <strong style={{color:'var(--red)'}}>+{Math.round(((currentYearData.avg-lastYearData.avg)/lastYearData.avg)*100)}% plus élevés</strong> cette année par rapport à {currentYear-1}.</span>
                  ):currentYearData.avg<lastYearData.avg?(
                    <span>Les prix du <strong>{fr(selected.commodity.name_fr)}</strong> sont <strong style={{color:'var(--green)'}}>+{Math.round(((lastYearData.avg-currentYearData.avg)/lastYearData.avg)*100)}% moins élevés</strong> cette année par rapport à {currentYear-1}.</span>
                  ):(<span>Les prix sont similaires à l'année dernière.</span>)}
                </div>
              )}
            </div>
          )
        })()
      )}
      {activeTab==='trend'&&(
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 10px'}}></div>Chargement...</div>):monthly.length===0?(<div className="no-data">Pas de données historiques disponibles.</div>):(
          <table className="trend-table">
            <thead><tr><th>Mois</th><th>Prix moyen</th><th>Variation</th><th>Marchés</th></tr></thead>
            <tbody>
              {monthly.map((row,i)=>{
                const prev=monthly[i+1]
                const change=prev?Math.round(((row.avg-prev.avg)/prev.avg)*100):null
                const cls=change===null?'flat':change>0?'up':'down'
                const sign=change===null?'—':change>0?'+'+change+'%':change+'%'
                const mktNames=[...new Set(filteredHistory.filter(h=>h.price_date&&h.price_date.startsWith(row.month)).map(h=>h.market_name).filter(Boolean))]
                return(
                  <tr key={row.month}>
                    <td>{fmtMonth(row.month)}</td>
                    <td className="trend-price">{row.avg.toLocaleString('fr-FR')} FCFA</td>
                    <td className={'trend-change '+cls}>{sign}</td>
                    <td style={{fontSize:11,color:'var(--text4)'}}>{mktNames.join(', ')||'—'}</td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        )
      )}
      {activeTab==='history'&&(
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 10px'}}></div>Chargement...</div>):filteredHistory.length===0?(<div className="no-data">Pas d'historique disponible.</div>):(
          <>
            <div style={{fontSize:12,color:'var(--text4)',marginBottom:12}}>{filteredHistory.length} enregistrements trouvés</div>
            <div className="history-wrap">
              <table className="history-table">
                <thead><tr><th>Date</th><th>Marché</th><th>Prix</th><th>Source</th><th>Type</th></tr></thead>
                <tbody>
                  {[...filteredHistory].sort((a,b)=>b.price_date.localeCompare(a.price_date)).map((h,i)=>(
                    <tr key={i}>
                      <td>{new Date(h.price_date).toLocaleDateString('fr-FR')}</td>
                      <td>{h.market_name}</td>
                      <td className="h-price">{Math.round(h.price).toLocaleString('fr-FR')} FCFA</td>
                      <td>{SOURCE_LABEL[h.source]||h.source}</td>
                      <td><span className="type-tag">{h.price_type==='retail'?'Détail':'Gros'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )
      )}
    </div>
  )
}

function ReportModal({commodity, onClose}){
  const[price,setPrice]=React.useState('')
  const[market,setMarket]=React.useState('')
  const[phone,setPhone]=React.useState('')
  const[notes,setNotes]=React.useState('')
  const[submitting,setSubmitting]=React.useState(false)
  const[success,setSuccess]=React.useState(false)
  const MARKETS=['Thiaroye','Tilène','Dakar','Pikine','Rufisque','Keur Massar','Castors','Gueule Tapée','Soumbédioune','Ouakam','Autre']
  async function handleSubmit(e){
    e.preventDefault()
    if(!price||!market)return
    setSubmitting(true)
    try{
      await fetch(SUPABASE_URL+'/rest/v1/reports',{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({commodity_id:commodity.id,market_name:market,price:parseFloat(price),unit:commodity.unit||'kg',reporter_phone:phone||null,notes:notes||null})
      })
      setSuccess(true)
    }catch(err){console.error(err)}
    setSubmitting(false)
  }
  return(
    <div className="report-modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="report-modal">
        {success?(
          <div className="report-success">
            <div className="report-success-icon">✓</div>
            <div className="report-success-title">Prix signalé avec succès</div>
            <div className="report-success-sub">Merci. Votre signalement aide tous les agriculteurs de la région.</div>
            <button type="button" className="btn-primary" style={{marginTop:18,width:'100%'}} onClick={onClose}>Fermer</button>
          </div>
        ):(
          <>
            <div className="report-modal-title">Signaler un prix</div>
            <div className="report-modal-sub">{fr(commodity.name_fr)} · Partagez le prix que vous observez sur le marché</div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Prix observé</label>
                <input className="form-input" type="number" min="0" placeholder="ex: 350" value={price} onChange={e=>setPrice(e.target.value)} />
              </div>
              <div className="form-group" style={{maxWidth:80}}>
                <label className="form-label">Unité</label>
                <input className="form-input" value={commodity.unit||'kg'} readOnly style={{color:'var(--text4)'}}/>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Marché</label>
              <select className="form-select" value={market} onChange={e=>setMarket(e.target.value)}>
                <option value="">Choisir un marché...</option>
                {MARKETS.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Téléphone (optionnel)</label>
              <input className="form-input" type="tel" placeholder="ex: 77 123 45 67" value={phone} onChange={e=>setPhone(e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Remarques (optionnel)</label>
              <input className="form-input" placeholder="ex: prix de gros, qualité moyenne..." value={notes} onChange={e=>setNotes(e.target.value)}/>
            </div>
            <div className="report-notice">Les prix signalés sont vérifiés avant publication. Votre numéro est confidentiel et ne sera jamais partagé.</div>
            <div className="modal-actions">
              <button type="button" className="btn-secondary" onClick={onClose}>Annuler</button>
              <button type="button" className="btn-primary" onClick={handleSubmit} disabled={!price||!market||submitting}>{submitting?'Envoi...':'Envoyer le prix'}</button>
            </div>
          </>
        )}
      </div>
    </div>
  )
}

function RevenueCalculator({group, unit}){
  const[qty,setQty]=React.useState('')
  const sorted=[...group].sort((a,b)=>b.price-a.price)
  return(
    <div className="calc-section">
      <div className="calc-label">Calculateur de revenus</div>
      <div className="calc-input-row">
        <input className="calc-input" type="number" min="0" placeholder="Quantité à vendre" value={qty} onChange={e=>setQty(e.target.value)}/>
        <span className="calc-unit">{unit||'kg'}</span>
      </div>
      {qty&&parseFloat(qty)>0&&(
        <div className="calc-results">
          {sorted.map((p,i)=>{
            const earning=Math.round(p.price*parseFloat(qty))
            const isBest=i===0
            return(
              <div key={p.id} className={'calc-row'+(isBest?' best-market':'')}>
                <div>
                  <div className="calc-market">{p.market_name} · {SOURCE_LABEL[p.source]||p.source}</div>
                  <div style={{fontSize:11,color:'var(--text5)'}}>à {Math.round(p.price).toLocaleString('fr-FR')} FCFA/{unit||'kg'}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className={'calc-earning'+(isBest?' best':'')}>{earning.toLocaleString('fr-FR')} FCFA</span>
                  {isBest&&<span className="calc-best-label">Meilleur</span>}
                </div>
              </div>
            )
          })}
          {sorted.length>1&&(
            <div style={{fontSize:11,color:'var(--text4)',textAlign:'center',paddingTop:6}}>
              Différence : <strong style={{color:'var(--text3)'}}>{(Math.round(sorted[0].price*parseFloat(qty))-Math.round(sorted[sorted.length-1].price*parseFloat(qty))).toLocaleString('fr-FR')} FCFA</strong>
            </div>
          )}
        </div>
      )}
    </div>
  )
}

function App(){
  const[prices,setPrices]=React.useState([])
  const[commodities,setCommodities]=React.useState([])
  const[selected,setSelected]=React.useState(null)
  const[history,setHistory]=React.useState([])
  const[histLoading,setHistLoading]=React.useState(false)
  const[loading,setLoading]=React.useState(true)
  const[category,setCategory]=React.useState('all')
  const[search,setSearch]=React.useState('')
  const[reportingCommodity,setReportingCommodity]=React.useState(null)

  React.useEffect(()=>{
    Promise.all([
      sq('prices','?select=id,price,price_date,source,price_type,commodity_id,market_id&order=price_date.desc&limit=2000'),
      sq('commodities','?select=*'),
      sq('markets','?select=*')
    ]).then(([pd,cd,md])=>{
      const mMap={}
      if(md)md.forEach(m=>mMap[m.id]=m)
      const enriched=(pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Inconnu'}))
      const latest={}
      enriched.forEach(p=>{const k=p.commodity_id+'_'+p.market_id;if(!latest[k])latest[k]=p})
      setPrices(Object.values(latest))
      setCommodities(cd||[])
      setLoading(false)
    })
  },[])

  function handleSelect(item){
    if(selected&&selected.commodity_id===item.commodity_id){setSelected(null);setHistory([]);return}
    setSelected(item);setHistory([]);setHistLoading(true)
    Promise.all([
      sq('markets','?select=*'),
      sq('prices','?commodity_id=eq.'+item.commodity_id+'&order=price_date.desc&limit=500&select=price,price_date,market_id,source,price_type')
    ]).then(([md,pd])=>{
      const mMap={}
      if(md)md.forEach(m=>mMap[m.id]=m)
      setHistory((pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Marché'})))
      setHistLoading(false)
      setTimeout(()=>{const el=document.getElementById('dp');if(el)el.scrollIntoView({behavior:'smooth'})},200)
    })
  }

  const tabDays=getTabaski()
  const byCom={}
  prices.forEach(p=>{
    const c=commodities.find(x=>x.id===p.commodity_id)
    if(!c)return
    if(category!=='all'&&c.category!==category)return
    if(search&&!fr(c.name_fr).toLowerCase().includes(search.toLowerCase()))return
    if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]
    byCom[p.commodity_id].push(p)
  })

  const today=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
  const markets=[...new Set(prices.map(p=>p.market_name).filter(Boolean))]
  const comCount=[...new Set(prices.map(p=>p.commodity_id))].length
  const sources=[...new Set(prices.map(p=>p.source))]
  const lastDate=prices.length?new Date(Math.max(...prices.map(p=>new Date(p.price_date)))).toLocaleDateString('fr-FR'):'—'

  return(
    <div>
      <header className="header">
        <div className="header-inner">
          <div className="logo-block">
            <div className="logo-mark">JP</div>
            <div>
              <div className="logo-name">Jàng Prix</div>
              <div className="logo-sub">Intelligence des marchés agricoles</div>
            </div>
          </div>
          <div className="header-right">
            <div className="live-badge"><span className="live-dot"></span>EN DIRECT</div>
            <div className="header-date">{today}</div>
            <div className="header-zone">Dakar · Keur Massar · Niayes</div>
          </div>
        </div>
      </header>

      {tabDays&&(
        <div className="tabaski-banner">
          <div className="tabaski-inner">
            <span className="tabaski-label">Tabaski 2026</span>
            <span className="tabaski-days">{tabDays}</span>
            <span className="tabaski-jours">jours restants</span>
            <span className="tabaski-tip">
              {tabDays>60?'— Prix des moutons en hausse progressive. Attendez pour mieux vendre.':
               tabDays>30?'— Bonne période pour vendre vos moutons. Prix en pic.':
               '— Vendez maintenant ou dans 1 à 2 semaines. Pic de demande imminent.'}
            </span>
          </div>
        </div>
      )}

      <div className="stats-bar">
        <div className="stats-inner">
          {[{l:'Produits suivis',v:comCount},{l:'Marchés couverts',v:markets.length},{l:'Sources de données',v:sources.length},{l:'Dernière mise à jour',v:lastDate}].map(s=>(
            <div key={s.l} className="stat-item">
              <div className="stat-value">{s.v}</div>
              <div className="stat-label">{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      <main className="main">
        <div className="page-header">
          <h2 className="page-title">Prix du Marché</h2>
          <p className="page-sub">Données en temps réel depuis les marchés de Dakar et environs</p>
        </div>

        <div className="search-filter-row">
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input className="search-input" type="text" placeholder="Rechercher un produit... ex: mil, riz, thiof, carotte" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="filter-tabs">
            {[['all','Tout'],['cereals and tubers','Céréales'],['pulses and nuts','Légumineuses'],['fruits and vegetables','Fruits & Légumes'],['vegetables','Légumes'],['fruits','Fruits'],['fish','Poisson'],['seafood','Fruits de mer'],['meat','Viande'],['poultry','Volaille']].map(([k,l])=>(
              <button type="button" key={k} className={'cat-tab'+(category===k?' active':'')} onClick={e=>{e.preventDefault();setCategory(k)}}>{l}</button>
            ))}
          </div>
        </div>

        {loading?(
          <div className="loading"><div className="spinner"></div><p style={{fontWeight:500}}>Chargement des prix...</p></div>
        ):Object.keys(byCom).length===0?(
          <div className="empty">Aucun produit trouvé{search?' pour "'+search+'"':''}.</div>
        ):(

              const c=commodities.find(x=>x.id===parseInt(cid))
              if(!c)return null
              const avg=group.reduce((s,p)=>s+p.price,0)/group.length
              const isSel=selected&&selected.commodity_id===parseInt(cid)
              const rec=getRec(avg,null)

              const predCls=predSummary.direction
              const predArrow=predSummary.direction==='up'?'▲':predSummary.direction==='down'?'▼':'→'
              const predText=predSummary.direction==='up'?
                'Hausse attendue +'+Math.abs(predSummary.pct)+'% — '+predSummary.driver:
                predSummary.direction==='down'?
                'Baisse attendue '+predSummary.pct+'% — '+predSummary.driver:
                'Prix stable attendu — '+predSummary.driver

              return(
                <div key={cid} className={'commodity-card'+(isSel?' selected':'')} style={{animationDelay:(idx*0.04)+'s'}}>
                  <div className="card-header">
                    <div>
                      <div className="card-cat-chip">{CAT_LABEL[c.category]||c.category}</div>
                      <div className="card-name">{fr(c.name_fr)}</div>
                      <div className="card-markets">{group.map(p=>p.market_name).filter(Boolean).join(', ')}</div>
                    </div>
                    <div className={'rec-badge '+rec.cls}>{rec.label}</div>
                  </div>

                  <div className="price-block">
                    <div className="price-row">
                      <span className="price-value">{Math.round(avg).toLocaleString('fr-FR')}</span>

                        <div className="price-unit">/ {c.unit||'kg'}</div>
                      </div>

                  <div className={'rec-reason '+rec.reasonCls}>{rec.reason}</div>

                    <span className="pred-arrow">{predArrow}</span>
                    <span>{predText}</span>
                  </div>

                  <div className="sources-divider"></div>

                  <table className="sources-table">
                    <tbody>
                      {group.map(p=>(
                        <tr key={p.id}>
                          <td className="td-source">{SOURCE_LABEL[p.source]||p.source}</td>
                          <td className="td-market">{p.market_name}</td>
                          <td className="td-price">{Math.round(p.price).toLocaleString('fr-FR')} F</td>
                          <td className="td-type"><span className="type-tag">{p.price_type==='retail'?'Détail':'Gros'}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  <div className="card-date">Mis à jour le {new Date(group[0].price_date).toLocaleDateString('fr-FR')}</div>

                  <RevenueCalculator group={group} unit={c.unit||'kg'}/>

                  <div className="card-actions" style={{marginTop:12}}>
                    <button type="button" className={'voir-btn'+(isSel?' active':'')}
                      onClick={e=>{e.preventDefault();e.stopPropagation();handleSelect({commodity_id:parseInt(cid),commodity:c,group});return false}}>
                      {isSel?'Masquer les détails ↑':'Voir prévision et analyse complète →'}
                    </button>
                    <button type="button" className="report-btn"
                      onClick={e=>{e.preventDefault();e.stopPropagation();setReportingCommodity(c);return false}}>
                      + Signaler un prix sur le terrain
                    </button>
                  </div>
                </div>
              )
            })}
          </div>
        )}

        {selected&&(
          <div id="dp">
            <DetailPanel selected={selected} history={history} histLoading={histLoading}/>
          </div>
        )}
      </main>

      {reportingCommodity&&(
        <ReportModal commodity={reportingCommodity} onClose={()=>setReportingCommodity(null)}/>
      )}

      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand">Jàng Prix</div>
          <div className="footer-right">
            <div className="footer-sources">Sources : WFP VAM · Auchan Sénégal · FAO GIEWS · SenPoisson · Le Marché Thiaroye · Park Nadio</div>
            <div className="footer-note">Les prix sont indicatifs. Vérifiez toujours sur place avant de vendre.</div>
          </div>
        </div>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
