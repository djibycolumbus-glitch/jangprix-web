<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jàng Prix — Prix Agricoles Dakar</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#1c1917;--bg2:#292524;--bg3:#3d3532;--bg4:#44403c;
      --border:#3d3532;--border2:#57534e;
      --accent:#b45309;--accent2:#92400e;
      --green:#4ade80;--green-bg:#052e16;
      --red:#f87171;--red-bg:#450a0a;
      --amber:#fbbf24;--amber-bg:#2d1f00;
      --blue:#60a5fa;--blue-bg:#0c1a2e;
      --text:#fafaf9;--text2:#d6d3d1;--text3:#a8a29e;--text4:#78716c;--text5:#57534e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;line-height:1.5;}

    /* LOGIN GATE */
    .gate-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
    .gate-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;}
    .gate-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .gate-logo-mark{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;}
    .gate-logo-name{font-family:'Merriweather',serif;font-size:20px;font-weight:700;color:var(--text);}
    .gate-logo-sub{font-size:11px;color:var(--text5);margin-top:1px;}
    .gate-title{font-family:'Merriweather',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .gate-sub{font-size:13px;color:var(--text4);margin-bottom:24px;line-height:1.5;}
    .gate-form-group{margin-bottom:14px;}
    .gate-label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
    .gate-input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;}
    .gate-input:focus{border-color:var(--accent);}
    .gate-input::placeholder{color:var(--text5);}
    .gate-btn{width:100%;padding:12px;border-radius:8px;background:var(--accent);color:white;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;margin-top:6px;}
    .gate-btn:hover{background:var(--accent2);}
    .gate-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .gate-note{font-size:11px;color:var(--text5);text-align:center;margin-top:14px;line-height:1.5;}
    .gate-error{font-size:12px;color:var(--red);margin-top:8px;padding:8px 12px;background:var(--red-bg);border-radius:6px;}

    /* RENEWAL BANNER */
    .renewal-banner{background:var(--amber-bg);border-bottom:1px solid #3d2e00;padding:10px 32px;}
    .renewal-banner-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .renewal-banner-text{font-size:13px;color:var(--amber);}
    .renewal-banner-btn{padding:6px 14px;border-radius:6px;background:var(--amber);color:#1c1100;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;}

    /* EXPIRED POPUP */
    .expired-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
    .expired-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:32px;width:100%;max-width:400px;text-align:center;}
    .expired-icon{font-size:36px;margin-bottom:14px;}
    .expired-title{font-family:'Merriweather',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .expired-sub{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:20px;}
    .expired-wave{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:20px;}
    .expired-wave-label{font-size:11px;color:var(--text5);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
    .expired-wave-number{font-family:'Merriweather',serif;font-size:22px;font-weight:700;color:var(--accent);}
    .expired-wave-amount{font-size:13px;color:var(--text4);margin-top:4px;}
    .expired-dismiss{width:100%;padding:10px;border-radius:8px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
    .expired-dismiss:hover{border-color:var(--border2);color:var(--text2);}

    /* UPGRADE PROMPT */
    .upgrade-prompt{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    .upgrade-prompt-text{font-size:12px;color:var(--text3);}
    .upgrade-btn{padding:7px 14px;border-radius:6px;background:var(--accent);color:white;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;}
    .upgrade-btn:hover{background:var(--accent2);}
    /* UPGRADE MODAL — fixed to visible screen */
    .upgrade-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;}
    .upgrade-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px;width:100%;max-width:400px;}
    .upgrade-modal-title{font-family:'Merriweather',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .upgrade-modal-sub{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:16px;}
    .upgrade-modal-wave{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:16px;text-align:center;}
    .upgrade-modal-wave-label{font-size:11px;color:var(--text5);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
    .upgrade-modal-wave-number{font-family:'Merriweather',serif;font-size:24px;font-weight:700;color:var(--accent);}
    .upgrade-modal-plans{display:flex;gap:10px;margin-bottom:16px;}
    .upgrade-modal-plan{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
    .upgrade-modal-plan.recommended{border-color:var(--accent);}
    .upgrade-modal-plan-label{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
    .upgrade-modal-plan-price{font-family:'Merriweather',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .upgrade-modal-plan-note{font-size:10px;color:var(--text5);}
    .upgrade-modal-plan-save{font-size:10px;font-weight:600;color:var(--green);margin-top:3px;}

    /* LOCKED FEATURE */
    .locked-tab{opacity:0.4;cursor:not-allowed!important;position:relative;}
    .lock-icon{font-size:10px;margin-left:4px;}

    /* FREE BADGE */
    .free-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text5);background:var(--bg3);padding:2px 7px;border-radius:4px;border:0.5px solid var(--border);margin-left:6px;}
    .paid-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-bg);padding:2px 7px;border-radius:4px;border:0.5px solid rgba(251,191,36,0.2);margin-left:6px;}

    .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;position:sticky;top:0;z-index:100;}
    .header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:60px;}
    .logo-block{display:flex;align-items:center;gap:10px;}
    .logo-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;}
    .logo-name{font-family:'Merriweather',serif;font-size:17px;font-weight:700;color:var(--text);}
    .logo-sub{font-size:11px;color:var(--text5);margin-top:1px;}
    .header-right{display:flex;align-items:center;gap:20px;}
    .live-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--green);letter-spacing:0.5px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .header-date{font-size:12px;color:var(--text4);}
    .header-zone{font-size:12px;color:var(--text5);}
    .tabaski-banner{background:var(--amber-bg);border-bottom:1px solid #3d2e00;padding:9px 32px;}
    .tabaski-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .tabaski-label{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;background:rgba(251,191,36,0.08);padding:2px 8px;border-radius:4px;border:0.5px solid rgba(251,191,36,0.2);}
    .tabaski-days{font-family:'Merriweather',serif;font-size:18px;font-weight:700;color:var(--amber);}
    .tabaski-jours{font-size:13px;color:#78580a;}
    .tabaski-tip{font-size:12px;color:#78580a;}
    .stats-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;}
    .stats-inner{max-width:1400px;margin:0 auto;display:flex;flex-wrap:wrap;}
    .stat-item{padding:14px 40px 14px 0;}
    .stat-value{font-family:'Merriweather',serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
    .stat-label{font-size:11px;color:var(--text5);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}
    .main{max-width:1400px;margin:0 auto;padding:28px 32px;}
    .page-title{font-family:'Merriweather',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;}
    .search-filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
    .search-input{flex:1;min-width:260px;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;}
    .search-input::placeholder{color:var(--text5);}
    .search-input:focus{border-color:var(--accent);}
    .cat-tab{padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;}
    .cat-tab:hover{border-color:var(--border2);color:var(--text2);}
    .cat-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
    .loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:80px;color:var(--text4);}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .commodity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;margin-bottom:32px;}
    .commodity-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;transition:border-color 0.15s;}
    .commodity-card:hover{border-color:var(--border2);}
    .commodity-card.selected{border-color:var(--accent);}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px;}
    .card-name{font-weight:700;font-size:15px;color:var(--text);line-height:1.3;}
    .card-meta{font-size:11px;color:var(--text5);margin-top:3px;}
    .rec-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
    .rec-sell{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,0.2);}
    .rec-wait{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,0.2);}
    .rec-pending{background:var(--bg3);color:var(--text4);border:0.5px solid var(--border);}
    .price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
    .price-value{font-family:'Merriweather',serif;font-size:30px;font-weight:700;color:var(--text);}
    .price-unit{font-size:12px;color:var(--text4);}
    .rec-reason{font-size:12px;line-height:1.5;padding:8px 12px;border-radius:6px;margin-bottom:10px;}
    .rec-reason.sell{background:var(--green-bg);border-left:2px solid var(--green);color:#86efac;}
    .rec-reason.wait{background:var(--red-bg);border-left:2px solid var(--red);color:#fca5a5;}
    .rec-reason.pending{background:var(--bg3);border-left:2px solid var(--border2);color:var(--text4);}
    .pred-summary{font-size:11px;padding:7px 10px;border-radius:6px;margin-bottom:10px;display:flex;align-items:flex-start;gap:6px;}
    .pred-summary.up{background:var(--red-bg);border:0.5px solid rgba(248,113,113,0.15);color:#fca5a5;}
    .pred-summary.down{background:var(--green-bg);border:0.5px solid rgba(74,222,128,0.15);color:#86efac;}
    .pred-summary.stable{background:var(--bg3);border:0.5px solid var(--border);color:var(--text4);}
    .pred-arrow{font-size:14px;flex-shrink:0;margin-top:1px;}
    .sources-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
    .sources-table td{padding:5px 0;font-size:12px;border-bottom:1px solid var(--bg3);}
    .sources-table tr:last-child td{border-bottom:none;}
    .td-source{color:var(--text4);width:55px;font-weight:500;}
    .td-market{color:var(--text3);}
    .td-price{color:var(--text);font-weight:600;text-align:right;}
    .td-type{text-align:right;}
    .type-tag{font-size:10px;color:var(--text5);background:var(--bg3);padding:1px 5px;border-radius:3px;border:0.5px solid var(--border);}
    .card-date{font-size:11px;color:var(--text5);margin-bottom:12px;}
    .voir-btn{width:100%;padding:8px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);background:var(--bg3);color:var(--text3);}
    .voir-btn:hover{background:var(--accent2);border-color:var(--accent);color:white;}
    .voir-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
    .detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:32px;}
    .detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .detail-title{font-family:'Merriweather',serif;font-size:17px;font-weight:700;color:var(--text);}
    .detail-sub{font-size:12px;color:var(--text4);margin-top:3px;}
    .detail-tabs{display:flex;gap:6px;flex-wrap:wrap;}
    .detail-tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
    .detail-tab:hover{border-color:var(--border2);color:var(--text2);}
    .detail-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
    .market-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .mkt-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
    .mkt-btn:hover{border-color:var(--border2);color:var(--text2);}
    .mkt-btn.active{background:var(--bg4);color:var(--text);border-color:var(--border2);}
    .pred-months{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .pred-month-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;}
    .pred-month-card.active-month{border-color:var(--accent);}
    .pred-month-name{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
    .pred-month-price{font-family:'Merriweather',serif;font-size:20px;font-weight:700;margin-bottom:4px;}
    .pred-month-price.up{color:var(--red);}
    .pred-month-price.down{color:var(--green);}
    .pred-month-price.stable{color:var(--text2);}
    .pred-month-change{font-size:11px;margin-bottom:8px;}
    .pred-month-change.up{color:var(--red);}
    .pred-month-change.down{color:var(--green);}
    .pred-month-change.stable{color:var(--text4);}
    .pred-month-driver{font-size:11px;color:var(--text4);line-height:1.4;}
    .pred-confidence{display:flex;align-items:center;gap:6px;margin-top:8px;}
    .pred-conf-bar-wrap{flex:1;background:var(--bg);border-radius:2px;height:4px;overflow:hidden;}
    .pred-conf-bar{height:100%;border-radius:2px;background:var(--accent);}
    .pred-conf-label{font-size:10px;color:var(--text5);white-space:nowrap;}
    .pred-factors{margin-top:20px;}
    .pred-factors-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
    .factor-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg3);}
    .factor-row:last-child{border-bottom:none;}
    .factor-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
    .factor-icon.positive{background:var(--green-bg);}
    .factor-icon.negative{background:var(--red-bg);}
    .factor-icon.neutral{background:var(--bg3);}
    .factor-name{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px;}
    .factor-desc{font-size:12px;color:var(--text4);line-height:1.4;}
    .factor-impact{font-size:11px;font-weight:600;margin-top:3px;}
    .factor-impact.positive{color:var(--green);}
    .factor-impact.negative{color:var(--red);}
    .factor-impact.neutral{color:var(--text4);}
    .pred-disclaimer{margin-top:16px;padding:10px 14px;background:var(--bg3);border-radius:6px;font-size:11px;color:var(--text5);line-height:1.5;}
    .comparison-list{display:flex;flex-direction:column;gap:14px;max-width:600px;}
    .comparison-row{display:flex;align-items:center;gap:12px;}
    .comp-market{width:140px;flex-shrink:0;}
    .comp-market-name{font-size:13px;color:var(--text);font-weight:600;display:block;}
    .comp-source-tag{font-size:10px;color:var(--text5);}
    .comp-bar-wrap{flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;max-width:180px;}
    .comp-bar{height:100%;border-radius:3px;}
    .comp-price-wrap{display:flex;align-items:center;gap:8px;min-width:120px;justify-content:flex-end;}
    .comp-price{font-size:13px;color:var(--text);font-weight:600;}
    .comp-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;}
    .comp-tag.best{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,0.2);}
    .comp-tag.worst{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,0.2);}
    .insight-box{margin-top:16px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:7px;padding:12px 16px;font-size:13px;color:var(--text3);max-width:600px;}
    .trend-table{width:100%;border-collapse:collapse;max-width:700px;}
    .trend-table th{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text4);text-align:left;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--bg3);}
    .trend-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--bg3);color:var(--text2);}
    .trend-table tr:last-child td{border-bottom:none;}
    .trend-table tr:hover td{background:var(--bg3);}
    .trend-price{color:var(--text);font-weight:600;}
    .trend-change.up{color:var(--red);}
    .trend-change.down{color:var(--green);}
    .trend-change.flat{color:var(--text4);}
    .history-wrap{max-height:400px;overflow-y:auto;border-radius:7px;border:1px solid var(--border);}
    .history-table{width:100%;border-collapse:collapse;}
    .history-table th{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text4);text-align:left;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;}

async function sq(table,params){

async function registerFreeUser(name,phone){
  const clean=phone.replace(/\s/g,'')
  const r=await fetch(SUPABASE_URL+'/rest/v1/subscribers',{
    method:'POST',
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify({name,phone:clean,access_level:'free'})
  })
  const d=await r.json()
  return Array.isArray(d)?d[0]:d
}

function getAccessStatus(subscriber){
  if(!subscriber) return{level:'free',expired:false,daysLeft:null,inGrace:false}
  if(subscriber.access_level==='free') return{level:'free',expired:false,daysLeft:null,inGrace:false}

  const now=new Date()
  const expires=subscriber.expires_at?new Date(subscriber.expires_at):null

  if(!expires) return{level:'paid',expired:false,daysLeft:null,inGrace:false}

  const msLeft=expires-now
  const daysLeft=Math.ceil(msLeft/86400000)
  const graceDeadline=new Date(expires.getTime()+GRACE_DAYS*86400000)
  const inGrace=now>expires&&now<=graceDeadline
  const fullyExpired=now>graceDeadline

  if(fullyExpired) return{level:'free',expired:true,daysLeft:0,inGrace:false}
  if(inGrace) return{level:'paid',expired:false,daysLeft:0,inGrace:true}
  return{level:'paid',expired:false,daysLeft,inGrace:false}
}

function isNearTabaski(targetDate,weeks=6){
  const diff=(TABASKI_2026-targetDate)/86400000
  return diff>0&&diff<(weeks*7)
}
function isRamadan(targetDate){
  return targetDate>=RAMADAN_2026_START&&targetDate<=RAMADAN_2026_END

function getCategorySeasonalFactor(category,month,history){
  const s=SENEGAL_SEASONS[month]||{}
  if(category==='cereals and tubers'){
    if(s.lean) return{pct:+12,driver:'Soudure (stocks bas)',direction:'up',confidence:78}

    return{pct:-3,driver:'Saison sèche stable',direction:'stable',confidence:60}
  }
  if(category==='pulses and nuts'){
    if(s.lean) return{pct:+8,driver:'Soudure (stocks réduits)',direction:'up',confidence:72}
    if(s.harvest) return{pct:-12,driver:'Récolte d\'arachides',direction:'down',confidence:80}
    if(s.rain) return{pct:+4,driver:'Accès réduit aux marchés',direction:'up',confidence:60}
    return{pct:0,driver:'Période stable',direction:'stable',confidence:55}
  }
  if(category==='vegetables'){
    if(s.rain) return{pct:+18,driver:'Pluies réduisent l\'offre maraîchère',direction:'up',confidence:75}
    if(s.harvest) return{pct:-20,driver:'Pic de production Niayes',direction:'down',confidence:88}

  }
  if(category==='fish'||category==='seafood'){
    if(s.rain) return{pct:+15,driver:'Pluies limitent la pêche artisanale',direction:'up',confidence:70}
    if(month>=1&&month<=4) return{pct:-10,driver:'Haute saison de pêche',direction:'down',confidence:72}
    return{pct:+3,driver:'Demande stable en poisson',direction:'stable',confidence:55}
  }
  if(category==='meat'||category==='poultry'){
    if(isNearTabaski(new Date(new Date().getFullYear(),month,1))) return{pct:+25,driver:'Approche de Tabaski — forte demande',direction:'up',confidence:85}
    if(isRamadan(new Date(new Date().getFullYear(),month,15))) return{pct:+10,driver:'Ramadan — hausse de consommation',direction:'up',confidence:70}
    return{pct:+2,driver:'Demande stable en viande',direction:'stable',confidence:50}
  }
  if(category==='livestock') return{pct:0,driver:'Demande stable',direction:'stable',confidence:50}
  return{pct:0,driver:'Facteurs saisonniers',direction:'stable',confidence:50}
}

function getHistoricalSeasonalAvg(history,targetMonth){
  const relevant=history.filter(h=>{
    if(!h.price_date)return false
    return new Date(h.price_date).getMonth()===targetMonth
  })
  if(!relevant.length)return null
  return relevant.reduce((s,h)=>s+h.price,0)/relevant.length
}

function buildPrediction(currentPrice,category,history){
  const now=new Date()
  const months=[]
  for(let i=1;i<=3;i++){
    const targetDate=new Date(now.getFullYear(),now.getMonth()+i,1)
    const targetMonth=targetDate.getMonth()
    const monthName=targetDate.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
    const seasonal=getCategorySeasonalFactor(category,targetMonth,history)
    const histAvg=getHistoricalSeasonalAvg(history,targetMonth)
    let predictedPrice,confidence=seasonal.confidence
    if(histAvg&&history.length>12){
      predictedPrice=Math.round(histAvg*0.6+currentPrice*(1+seasonal.pct/100)*0.4)
      confidence=Math.min(seasonal.confidence+10,92)
    } else {
      predictedPrice=Math.round(currentPrice*(1+seasonal.pct/100))
    }
    const changePct=Math.round(((predictedPrice-currentPrice)/currentPrice)*100)
    const direction=changePct>5?'up':changePct<-5?'down':'stable'
    const factors=[]
    const s=SENEGAL_SEASONS[targetMonth]||{}
    if(s.rain) factors.push({name:'Saison des pluies',desc:'Les pluies limitent le transport et réduisent l\'offre sur les marchés.',impact:'negative',icon:'R'})
    if(s.harvest) factors.push({name:'Période de récolte',desc:'L\'arrivée des nouvelles récoltes augmente l\'offre et fait baisser les prix.',impact:'positive',icon:'R'})
    if(s.lean) factors.push({name:'Période de soudure',desc:'Les stocks s\'épuisent. La demande dépasse l\'offre disponible.',impact:'negative',icon:'S'})
    if(isNearTabaski(targetDate)&&(category==='livestock'||category==='cereals and tubers'||category==='meat'||category==='poultry')){
      factors.push({name:'Approche de Tabaski',desc:'La demande augmente fortement dans les semaines précédant Tabaski.',impact:'negative',icon:'T'})
    }
    if(isRamadan(targetDate)) factors.push({name:'Ramadan',desc:'La consommation d\'oignons, sucre et huile augmente pendant le Ramadan.',impact:'negative',icon:'R'})
    if(!factors.length) factors.push({name:'Marché stable',desc:'Aucun facteur saisonnier majeur attendu.',impact:'neutral',icon:'S'})
    months.push({monthName,targetMonth,predictedPrice,changePct,direction,confidence,driver:seasonal.driver,factors})
  }
  return months
}

function getPredSummary(category,history,currentPrice){

function getRec(avg,hist){
  if(!hist||hist.length<6) return{label:'EN ATTENTE',cls:'rec-pending',reason:'Données insuffisantes.',reasonCls:'pending'}
  const old=hist.slice(-12,-1).map(h=>h.price)
  const mean=old.reduce((a,b)=>a+b,0)/old.length
  const pct=((avg-mean)/mean)*100
  if(pct>8) return{label:'VENDRE',cls:'rec-sell',reason:'Prix '+Math.round(pct)+'% au-dessus de la moyenne saisonnière.',reasonCls:'sell'}
  if(pct<-8) return{label:'ATTENDRE',cls:'rec-wait',reason:'Prix '+Math.abs(Math.round(pct))+'% sous la moyenne saisonnière.',reasonCls:'wait'}
  return{label:'VENDRE',cls:'rec-sell',reason:'Prix dans la normale saisonnière.',reasonCls:'sell'}
}

function LoginGate({onLogin}){
  const[name,setName]=React.useState('')
  const[phone,setPhone]=React.useState('')
  const[loading,setLoading]=React.useState(false)
  const[error,setError]=React.useState('')

  async function handleSubmit(){
    const trimName=name.trim()
    const trimPhone=phone.trim().replace(/\s/g,'')
    if(!trimName){setError('Veuillez entrer votre prénom.');return}
    if(trimPhone.length<9){setError('Numéro de téléphone invalide. Format: 77 545 9889');return}
    setLoading(true);setError('')
    try{
      let sub=await getSubscriber(trimPhone)
      if(!sub){
        sub=await registerFreeUser(trimName,trimPhone)
      }
      saveSession(sub)
      onLogin(sub)
    }catch(e){
      setError('Erreur de connexion. Réessayez.')
    }
    setLoading(false)
  }

  function formatPhone(val){
    const digits=val.replace(/\D/g,'').slice(0,9)
    const parts=[]
    if(digits.length>0) parts.push(digits.slice(0,2))
    if(digits.length>2) parts.push(digits.slice(2,5))
    if(digits.length>5) parts.push(digits.slice(5,7))
    if(digits.length>7) parts.push(digits.slice(7,9))
    return parts.join(' ')
  }

  return(
    <div className="gate-overlay">
      <div className="gate-card">
        <div className="gate-logo">
          <div className="gate-logo-mark">JP</div>
          <div>
            <div className="gate-logo-name">Jàng Prix</div>
            <div className="gate-logo-sub">Intelligence des marchés agricoles</div>
          </div>
        </div>
        <div className="gate-title">Accéder aux prix du marché</div>
        <div className="gate-sub">Entrez votre prénom et numéro de téléphone pour consulter les prix agricoles de Dakar. Aucun mot de passe requis.</div>
        <div className="gate-form-group">
          <label className="gate-label">Prénom</label>
          <input className="gate-input" type="text" placeholder="ex: Mamadou" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSubmit()}/>
        </div>
        <div className="gate-form-group">
          <label className="gate-label">Numéro de téléphone</label>
          <input className="gate-input" type="tel" placeholder="77 545 9889" value={phone} onChange={e=>setPhone(formatPhone(e.target.value))} onKeyDown={e=>e.key==='Enter'&&handleSubmit()}/>
        </div>
        {error&&<div className="gate-error">{error}</div>}
        <button className="gate-btn" onClick={handleSubmit} disabled={loading}>
          {loading?'Connexion...':'Accéder aux prix →'}
        </button>
        <div className="gate-note">Vos données sont confidentielles et ne seront jamais partagées.</div>
      </div>
    </div>
  )
}

function DetailPanel({selected,history,histLoading,isPaid}){
  const[activeTab,setActiveTab]=React.useState('predict')
  const[marketFilter,setMarketFilter]=React.useState('all')

  const markets=[...new Set((selected.group||[]).map(p=>p.market_name).filter(Boolean))]
  const filteredGroup=(selected.group||[]).filter(p=>marketFilter==='all'||p.market_name===marketFilter)
  const filteredHistory=history.filter(p=>marketFilter==='all'||p.market_name===marketFilter)
  const sortedGroup=[...filteredGroup].sort((a,b)=>a.price-b.price)
  const min=sortedGroup[0]?.price||0
  const max=sortedGroup[sortedGroup.length-1]?.price||0
  const avg=filteredGroup.reduce((s,p)=>s+p.price,0)/(filteredGroup.length||1)

  const monthlyMap={}
  filteredHistory.forEach(h=>{
    const m=h.price_date&&h.price_date.slice(0,7)
    if(!monthlyMap[m])monthlyMap[m]=[]
    monthlyMap[m].push(h.price)
  })
  const monthly=Object.entries(monthlyMap)
    .sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12)
    .map(([month,prices])=>({month,avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length)}))

  const fmtMonth=m=>{
    if(!m)return''
    const[y,mo]=m.split('-')
    return['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][parseInt(mo)-1]+' '+y
  }

  // Tabs: predict, compare, years, trend, history — last 4 are paid only
  const TABS=[
    {k:'predict',l:'Prévision 3 mois',paid:true},
    {k:'compare',l:'Comparer marchés',paid:true},
    {k:'years',l:'Comparer années',paid:true},
    {k:'trend',l:'Tendance',paid:true},
    {k:'history',l:'Historique',paid:true},
  ]

  return(
    <div className="detail-panel">
      <div className="detail-header">
        <div>
          <div className="detail-title">{fr(selected.commodity.name_fr)}</div>
          <div className="detail-sub">{markets.length} marché(s) · {history.length} enregistrements</div>
        </div>
        <div className="detail-tabs">
          {TABS.map(({k,l,paid})=>{
            const locked=paid&&!isPaid
            return(
              <button type="button" key={k}
                className={'detail-tab'+(activeTab===k?' active':'')+(locked?' locked-tab':'')}
                onClick={e=>{e.preventDefault();if(!locked)setActiveTab(k)}}>
                {l}{locked&&<span className="lock-icon">🔒</span>}
              </button>
            )
          })}
        </div>
      </div>

      {!isPaid&&(
        <div style={{marginBottom:16}}>
          <UpgradePrompt/>
        </div>
      )}

      {markets.length>1&&(
        <div className="market-filter">
          <span style={{fontSize:11,color:'var(--text5)',alignSelf:'center',marginRight:4}}>Filtrer:</span>
          <button type="button" className={'mkt-btn'+(marketFilter==='all'?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter('all')}}>Tous</button>
          {markets.map(m=>(
            <button type="button" key={m} className={'mkt-btn'+(marketFilter===m?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter(m)}}>{m}</button>
          ))}
        </div>
      )}

      {activeTab==='predict'&&(
        !isPaid?<LockedFeature feature="Prévision 3 mois"/>:
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 8px'}}></div>Chargement...</div>):(
          <PredictionTab commodity={selected.commodity} currentPrice={avg} history={filteredHistory}/>
        )
      )}

      {activeTab==='compare'&&(
        !isPaid?<LockedFeature feature="Comparaison des marchés"/>:
        filteredGroup.length<2?(<div className="no-data">Un seul marché disponible.</div>):(
          <>
            <div className="comparison-list">
              {sortedGroup.map(p=>{
                const pct=max>min?((p.price-min)/(max-min))*100:50
                return(
                  <div key={p.id} className="comparison-row">
                    <div className="comp-market">
                      <span className="comp-market-name">{p.market_name}</span>
                      <span className="comp-source-tag">{SOURCE_LABEL[p.source]||p.source} · {p.price_type==='retail'?'Détail':'Gros'}</span>
                    </div>
                    <div className="comp-bar-wrap">
                      <div className="comp-bar" style={{width:Math.max(pct,5)+'%',background:p.price===min?'#4ade80':p.price===max?'#f87171':'#b45309'}}/>
                    </div>
                    <div className="comp-price-wrap">
                      <span className="comp-price">{Math.round(p.price).toLocaleString('fr-FR')} F</span>
                      {p.price===min&&<span className="comp-tag best">Meilleur</span>}
                      {p.price===max&&<span className="comp-tag worst">Plus cher</span>}
                    </div>
                  </div>
                )
              })}
            </div>
            <div className="insight-box">
              Ecart de <strong>{Math.round(max-min).toLocaleString('fr-FR')} FCFA/{selected.commodity.unit||'kg'}</strong> entre {sortedGroup[0].market_name} et {sortedGroup[sortedGroup.length-1].market_name}.
            </div>
          </>
        )
      )}

      {activeTab==='years'&&(
        !isPaid?<LockedFeature feature="Comparaison annuelle"/>:
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 8px'}}></div>Chargement...</div>):filteredHistory.length===0?(<div className="no-data">Pas de données disponibles.</div>):(()=>{
          const now=new Date()
          const currentYear=now.getFullYear()
          const currentMonth=now.getMonth()
          const byYear={}
          filteredHistory.forEach(h=>{
            if(!h.price_date)return
            const d=new Date(h.price_date)
            const y=d.getFullYear()
            if(d.getMonth()>currentMonth)return
            if(!byYear[y])byYear[y]=[]
            byYear[y].push(h.price)
          })
          const years=Object.entries(byYear)
            .filter(([y])=>parseInt(y)>=currentYear-5)
            .sort((a,b)=>b[0]-a[0])
            .map(([year,prices])=>({year:parseInt(year),avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length),count:prices.length}))
          if(years.length<2) return <div className="no-data">Pas assez d'années pour comparer.</div>
          const currentYearData=years.find(y=>y.year===currentYear)
          const lastYearData=years.find(y=>y.year===currentYear-1)
          const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
          return(
            <div>
              <div style={{fontSize:12,color:'var(--text4)',marginBottom:14}}>Période: {months[0]} – {months[currentMonth]} · {years.length} années</div>
              <div className="year-comp-grid">
                {years.map((y,i)=>{
                  const isCurrent=y.year===currentYear
                  const vsNow=currentYearData&&!isCurrent?Math.round(((currentYearData.avg-y.avg)/y.avg)*100):null
                  const direction=vsNow===null?'same':vsNow>5?'higher':vsNow<-5?'lower':'same'
                  const vsLabel=vsNow===null?'Année en cours':vsNow>0?'Cette année: +'+vsNow+'%':vsNow<0?'Cette année: '+vsNow+'%':'Prix similaire'
                  return(
                    <div key={y.year} className={'year-comp-card'+(isCurrent?' current-year':'')}>
                      <div className="year-label">{y.year}{isCurrent?' (en cours)':''}</div>
                      <div className="year-price">{y.avg.toLocaleString('fr-FR')} FCFA</div>
                      <div className={'year-vs-now '+direction}>{vsLabel}</div>
                      <div className="year-months">{y.count} relevés</div>
                    </div>
                  )
                })}
              </div>
              {currentYearData&&lastYearData&&(
                <div className="year-insight">
                  {currentYearData.avg>lastYearData.avg?(
                    <span>Prix <strong style={{color:'var(--red)'}}>+{Math.round(((currentYearData.avg-lastYearData.avg)/lastYearData.avg)*100)}% plus élevés</strong> cette année vs {currentYear-1}.</span>
                  ):currentYearData.avg<lastYearData.avg?(
                    <span>Prix <strong style={{color:'var(--green)'}}>+{Math.round(((lastYearData.avg-currentYearData.avg)/lastYearData.avg)*100)}% moins élevés</strong> cette année vs {currentYear-1}.</span>
                  ):(<span>Prix similaires à l'année dernière.</span>)}
                </div>
              )}
            </div>
          )
        })()
      )}

      {activeTab==='trend'&&(
        !isPaid?<LockedFeature feature="Tendance mensuelle"/>:
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 8px'}}></div>Chargement...</div>):monthly.length===0?(<div className="no-data">Pas de données disponibles.</div>):(
          <table className="trend-table">
            <thead><tr><th>Mois</th><th>Prix moyen</th><th>Variation</th><th>Marchés</th></tr></thead>
            <tbody>
              {monthly.map((row,i)=>{
                const prev=monthly[i+1]
                const change=prev?Math.round(((row.avg-prev.avg)/prev.avg)*100):null
                const cls=change===null?'flat':change>0?'up':'down'
                const sign=change===null?'—':change>0?'+'+change+'%':change+'%'
                const mktNames=[...new Set(filteredHistory.filter(h=>h.price_date&&h.price_date.startsWith(row.month)).map(h=>h.market_name).filter(Boolean))]
                return(
                  <tr key={row.month}>
                    <td>{fmtMonth(row.month)}</td>
                    <td className="trend-price">{row.avg.toLocaleString('fr-FR')} FCFA</td>
                    <td className={'trend-change '+cls}>{sign}</td>
                    <td style={{fontSize:11,color:'var(--text4)'}}>{mktNames.join(', ')||'—'}</td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        )
      )}

      {activeTab==='history'&&(
        !isPaid?<LockedFeature feature="Historique complet"/>:
        histLoading?(<div className="no-data"><div className="spinner" style={{margin:'0 auto 8px'}}></div>Chargement...</div>):filteredHistory.length===0?(<div className="no-data">Pas d'historique disponible.</div>):(
          <>
            <div style={{fontSize:12,color:'var(--text4)',marginBottom:10}}>{filteredHistory.length} enregistrements</div>
            <div className="history-wrap">
              <table className="history-table">
                <thead><tr><th>Date</th><th>Marché</th><th>Prix</th><th>Source</th><th>Type</th></tr></thead>
                <tbody>
                  {[...filteredHistory].sort((a,b)=>b.price_date.localeCompare(a.price_date)).map((h,i)=>(
                    <tr key={i}>
                      <td>{new Date(h.price_date).toLocaleDateString('fr-FR')}</td>
                      <td>{h.market_name}</td>
                      <td className="h-price">{Math.round(h.price).toLocaleString('fr-FR')} FCFA</td>
                      <td>{SOURCE_LABEL[h.source]||h.source}</td>
                      <td><span className="type-tag">{h.price_type==='retail'?'Détail':'Gros'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )
      )}
    </div>
  )
}

function App(){
  const[subscriber,setSubscriber]=React.useState(null)
  const[showGate,setShowGate]=React.useState(false)
  const[showExpired,setShowExpired]=React.useState(false)
  const[prices,setPrices]=React.useState([])
  const[commodities,setCommodities]=React.useState([])
  const[selected,setSelected]=React.useState(null)
  const[history,setHistory]=React.useState([])
  const[histLoading,setHistLoading]=React.useState(false)
  const[loading,setLoading]=React.useState(true)
  const[category,setCategory]=React.useState('all')
  const[search,setSearch]=React.useState('')
  const[reportingCommodity,setReportingCommodity]=React.useState(null)

  // Check if gate should be active
  React.useEffect(()=>{
    if(!GATE_IS_LIVE){
      // Before May 1 — no gate, no subscriber needed
      setShowGate(false)
      return
    }
    // May 1+ — check for existing session
    const saved=loadSession()
    if(saved){
      setSubscriber(saved)
      // Check if expired
      const status=getAccessStatus(saved)
      if(status.expired){
        setShowExpired(true)
      }
    } else {
      setShowGate(true)
    }
  },[])

  function handleLogin(sub){
    setSubscriber(sub)
    setShowGate(false)
    const status=getAccessStatus(sub)
    if(status.expired){
      setShowExpired(true)
    }
  }

  const accessStatus=subscriber?getAccessStatus(subscriber):{level:'free',expired:false,daysLeft:null,inGrace:false}
  const isPaid=GATE_IS_LIVE?(accessStatus.level==='paid'):true // Before May 1, everyone sees full site

  // Yesterday's date for free users
  const yesterday=new Date()
  yesterday.setDate(yesterday.getDate()-1)
  const yesterdayStr=yesterday.toISOString().split('T')[0]

  React.useEffect(()=>{
    Promise.all([
      sq('prices','?select=id,price,price_date,source,price_type,commodity_id,market_id&order=price_date.desc&limit=2000'),
      sq('commodities','?select=*'),
      sq('markets','?select=*')
    ]).then(([pd,cd,md])=>{
      const mMap={}
      if(md)md.forEach(m=>mMap[m.id]=m)
      const enriched=(pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Inconnu'}))

      // For free users: only show yesterday's prices (filter out today's)
      const filtered=GATE_IS_LIVE&&!isPaid
        ?enriched.filter(p=>p.price_date&&p.price_date.split('T')[0]<=yesterdayStr)
        :enriched

      const latest={}
      filtered.forEach(p=>{const k=p.commodity_id+'_'+p.market_id;if(!latest[k])latest[k]=p})
      setPrices(Object.values(latest))
      setCommodities(cd||[])
      setLoading(false)
    })
  },[isPaid])

  function handleSelect(item){
    if(selected&&selected.commodity_id===item.commodity_id){setSelected(null);setHistory([]);return}
    setSelected(item);setHistory([]);setHistLoading(true)
    Promise.all([
      sq('markets','?select=*'),
      sq('prices','?commodity_id=eq.'+item.commodity_id+'&order=price_date.desc&limit=500&select=price,price_date,market_id,source,price_type')
    ]).then(([md,pd])=>{
      const mMap={}
      if(md)md.forEach(m=>mMap[m.id]=m)
      setHistory((pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Marché'})))
      setHistLoading(false)
      setTimeout(()=>{const el=document.getElementById('dp');if(el)el.scrollIntoView({behavior:'smooth'})},200)
    })
  }

  const tabDays=getTabaski()
  const byCom={}
  prices.forEach(p=>{
    const c=commodities.find(x=>x.id===p.commodity_id)
    if(!c)return
    if(category!=='all'&&c.category!==category)return
    if(search&&!fr(c.name_fr).toLowerCase().includes(search.toLowerCase()))return
    if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]
    byCom[p.commodity_id].push(p)
  })

  const today=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
  const markets=[...new Set(prices.map(p=>p.market_name).filter(Boolean))]
  const comCount=[...new Set(prices.map(p=>p.commodity_id))].length
  const sources=[...new Set(prices.map(p=>p.source))]
  const lastDate=prices.length?new Date(Math.max(...prices.map(p=>new Date(p.price_date)))).toLocaleDateString('fr-FR'):'—'

  return(
    <div>
      {showGate&&<LoginGate onLogin={handleLogin}/>}
      {showExpired&&!showGate&&<ExpiredPopup onDismiss={()=>setShowExpired(false)}/>}

      {/* 7-day renewal reminder */}
      {GATE_IS_LIVE&&accessStatus.daysLeft!==null&&accessStatus.daysLeft>0&&accessStatus.daysLeft<=7&&(
        <RenewalBanner daysLeft={accessStatus.daysLeft}/>
      )}

      <header className="header">
        <div className="header-inner">
          <div className="logo-block">
            <div className="logo-mark">JP</div>
            <div>
              <div className="logo-name">Jàng Prix</div>
              <div className="logo-sub">Intelligence des marchés agricoles</div>
            </div>
          </div>
          <div className="header-right">
            <div className="live-badge"><span className="live-dot"></span>EN DIRECT</div>
            {GATE_IS_LIVE&&subscriber&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:12,color:'var(--text4)'}}>{subscriber.name}</span>
                {isPaid?(
                  <span className="paid-badge">⭐ Payant</span>
                ):(
                  <span className="free-badge">Gratuit</span>
                )}
              </div>
            )}
            <div className="header-date">{today}</div>
            <div className="header-zone">Dakar · Keur Massar · Niayes</div>
          </div>
        </div>
      </header>

      {tabDays&&(
        <div className="tabaski-banner">
          <div className="tabaski-inner">
            <span className="tabaski-label">Tabaski</span>
            <span className="tabaski-days">{tabDays}</span>
            <span className="tabaski-jours">jours restants</span>
            <span className="tabaski-tip">
              {tabDays>60?'— Prix des moutons en hausse progressive.':tabDays>30?'— Bonne période pour vendre vos moutons.':'— Vendez maintenant. Pic de demande imminent.'}
            </span>
          </div>
        </div>
      )}

      <div className="stats-bar">
        <div className="stats-inner">
          {[{l:'Produits suivis',v:comCount},{l:'Marchés couverts',v:markets.length},{l:'Sources de données',v:sources.length},{l:'Dernière mise à jour',v:lastDate}].map(s=>(
            <div key={s.l} className="stat-item">
              <div className="stat-value">{s.v}</div>
              <div className="stat-label">{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      <main className="main">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <h2 className="page-title" style={{margin:0}}>
            Prix du Marché
            {GATE_IS_LIVE&&!isPaid&&<span style={{fontSize:12,color:'var(--text4)',fontFamily:'Inter',fontWeight:400,marginLeft:10}}>· Prix d'hier</span>}
          </h2>
          {GATE_IS_LIVE&&!isPaid&&<UpgradePrompt/>}
        </div>

        <div className="search-filter-row">
          <input className="search-input" type="text" placeholder="Rechercher un produit... ex: mil, riz, thiof, carotte, poulet" value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[['all','Tout'],['cereals and tubers','Céréales'],['pulses and nuts','Légumineuses'],['fruits and vegetables','Fruits & Légumes (Auchan)'],['vegetables','Légumes'],['fruits','Fruits'],['fish','Poisson'],['seafood','Fruits de mer'],['meat','Viande'],['poultry','Volaille']].map(([k,l])=>(
              <button type="button" key={k} className={'cat-tab'+(category===k?' active':'')} onClick={e=>{e.preventDefault();setCategory(k)}}>{l}</button>
            ))}
          </div>
        </div>

        {loading?(
          <div className="loading"><div className="spinner"></div><p>Chargement des prix...</p></div>
        ):Object.keys(byCom).length===0?(
          <div className="empty">Aucun produit trouvé{search?' pour "'+search+'"':''}.</div>
        ):(
          <div className="commodity-grid">
            {Object.entries(byCom).map(([cid,group])=>{
              const c=commodities.find(x=>x.id===parseInt(cid))
              if(!c)return null
              const avg=group.reduce((s,p)=>s+p.price,0)/group.length
              const isSel=selected&&selected.commodity_id===parseInt(cid)
              const rec=getRec(avg,null)
              const nextMonth=(new Date().getMonth()+1)%12
              const predSummary=getCategorySeasonalFactor(c.category,nextMonth,null)
              const predCls=predSummary.direction
              const predArrow=predSummary.direction==='up'?'▲':predSummary.direction==='down'?'▼':'→'
              const predText=predSummary.direction==='up'?
                'Prix attendu en hausse (+'+Math.abs(predSummary.pct)+'%) — '+predSummary.driver:
                predSummary.direction==='down'?
                'Prix attendu en baisse ('+predSummary.pct+'%) — '+predSummary.driver:
                'Prix stable attendu — '+predSummary.driver

              return(
                <div key={cid} className={'commodity-card'+(isSel?' selected':'')}>
                  <div className="card-header">
                    <div>
                      <div className="card-name">{fr(c.name_fr)}</div>
                      <div className="card-meta">{CAT_LABEL[c.category]||c.category} · {group.map(p=>p.market_name).filter(Boolean).join(', ')}</div>
                    </div>
                    <div className={'rec-badge '+rec.cls}>{rec.label}</div>
                  </div>
                  <div className="price-row">
                    <span className="price-value">{Math.round(avg).toLocaleString('fr-FR')}</span>
                    <span className="price-unit">FCFA / {c.unit||'kg'}</span>
                  </div>
                  <div className={'rec-reason '+rec.reasonCls}>{rec.reason}</div>
                  <div className={'pred-summary '+predCls}>
                    <span className="pred-arrow">{predArrow}</span>
                    <span>{predText}</span>
                  </div>
                  <table className="sources-table">
                    <tbody>
                      {group.map(p=>(
                        <tr key={p.id}>
                          <td className="td-source">{SOURCE_LABEL[p.source]||p.source}</td>
                          <td className="td-market">{p.market_name}</td>
                          <td className="td-price">{Math.round(p.price).toLocaleString('fr-FR')} F</td>
                          <td className="td-type"><span className="type-tag">{p.price_type==='retail'?'Détail':'Gros'}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div className="card-date">
                    {GATE_IS_LIVE&&!isPaid?'Prix du ':'Mis à jour le '}
                    {new Date(group[0].price_date).toLocaleDateString('fr-FR')}
                  </div>
                  <RevenueCalculator group={group} unit={c.unit||'kg'}/>
                  <button type="button" className={'voir-btn'+(isSel?' active':'')}
                    onClick={e=>{e.preventDefault();e.stopPropagation();handleSelect({commodity_id:parseInt(cid),commodity:c,group});return false}}>
                    {isSel?'Masquer les détails':'Voir prévision et analyse complète'}
                  </button>
                  <button type="button" className="report-btn"
                    onClick={e=>{e.preventDefault();e.stopPropagation();setReportingCommodity(c);return false}}>
                    Signaler un prix sur le terrain
                  </button>
                </div>
              )
            })}
          </div>
        )}

        {selected&&(
          <div id="dp">
            <DetailPanel selected={selected} history={history} histLoading={histLoading} isPaid={isPaid}/>
          </div>
        )}
      </main>

      {reportingCommodity&&(
        <ReportModal commodity={reportingCommodity} onClose={()=>setReportingCommodity(null)}/>
      )}

      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand">Jàng Prix</div>
          <div className="footer-right">
            <div className="footer-sources">Sources: WFP VAM · Auchan Sénégal · FAO GIEWS · SenPoisson · Le Marché Thiaroye · Park Nadio</div>
            <div className="footer-note">Les prix sont indicatifs. Vérifiez toujours sur place avant de vendre.</div>
          </div>
        </div>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
