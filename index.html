<!DOCTYPE html>
<html lang="fr" style="color-scheme:dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080C14" />
  <title>Jàng Prix — Prix Agricoles Dakar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Core palette */
      --ink:       #080C14;
      --ink2:      #0D1220;
      --ink3:      #131927;
      --ink4:      #1A2235;
      --ink5:      #222D42;
      --wire:      rgba(255,255,255,0.06);
      --wire2:     rgba(255,255,255,0.10);
      --wire3:     rgba(255,255,255,0.16);
      /* Brand */
      --gold:      #F0B429;
      --gold2:     #D69E2E;
      --gold-glow: rgba(240,180,41,0.18);
      --gold-dim:  rgba(240,180,41,0.08);
      /* Signals */
      --up:        #34D399;
      --up-bg:     rgba(52,211,153,0.08);
      --down:      #F87171;
      --down-bg:   rgba(248,113,113,0.08);
      --flat:      #94A3B8;
      /* Text */
      --t1: #F1F5F9;
      --t2: #CBD5E1;
      --t3: #94A3B8;
      --t4: #64748B;
      --t5: #3D4E63;
      /* WA */
      --wa: #25D366; --wa2: #128C7E;
      /* Fonts */
      --font-ui:   'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-disp: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--t1);
      font-family: var(--font-ui);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Scanline texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes ticker   { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes glow     { 0%,100%{box-shadow:0 0 0 0 var(--gold-glow)} 50%{box-shadow:0 0 20px 4px var(--gold-glow)} }
    @keyframes waPop    { from{opacity:0;transform:scale(0.9) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .header {
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--wire);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      height: 60px;
    }
    .logo-block { display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; }
    .logo-mark {
      width: 34px; height: 34px;
      background: var(--gold);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink);
      box-shadow: 0 0 12px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .logo-name { font-family: var(--font-disp); font-size: 17px; font-weight: 800; color: var(--t1); letter-spacing: -0.3px; }
    .logo-name span { color: var(--gold); }
    .logo-sub { font-family: var(--font-mono); font-size: 9px; color: var(--t5); margin-top: 1px; letter-spacing: 0.8px; text-transform: uppercase; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .nav-btn {
      padding: 6px 14px; border-radius: 5px;
      border: 1px solid var(--wire2);
      background: transparent;
      color: var(--t3); font-family: var(--font-ui); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap; touch-action: manipulation;
    }
    .nav-btn:hover, .nav-btn:focus-visible { border-color: var(--gold); color: var(--gold); outline: none; }
    .nav-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 700; }
    .nav-btn.wa-nav { color: var(--wa); border-color: rgba(37,211,102,0.2); }
    .nav-btn.wa-nav:hover { border-color: var(--wa); background: rgba(37,211,102,0.06); }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      color: var(--up); letter-spacing: 1px; text-transform: uppercase;
      background: var(--up-bg); padding: 5px 10px;
      border-radius: 4px; border: 1px solid rgba(52,211,153,0.2);
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); animation: pulse 2s infinite; }
    .header-date { font-family: var(--font-mono); font-size: 11px; color: var(--t5); }
    .user-badge-paid { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--gold); background: var(--gold-dim); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(240,180,41,0.2); }
    .user-badge-free { font-family: var(--font-mono); font-size: 10px; color: var(--t4); background: rgba(148,163,184,0.06); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--wire); }

    /* ══════════════════════════════════════════
       TABASKI BANNER
    ══════════════════════════════════════════ */
    .tabaski-banner { background: linear-gradient(90deg,rgba(240,180,41,0.07),rgba(240,180,41,0.04),rgba(240,180,41,0.07)); border-bottom: 1px solid rgba(240,180,41,0.12); padding: 8px 32px; }
    .tabaski-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .tabaski-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1.5px; background:var(--gold-dim); padding:2px 8px; border-radius:3px; border:1px solid rgba(240,180,41,0.2); }
    .tabaski-days { font-family:var(--font-mono); font-size:20px; font-weight:700; color:var(--gold); line-height:1; }
    .tabaski-jours { font-size:12px; color:rgba(240,180,41,0.6); }
    .tabaski-tip { font-family:var(--font-mono); font-size:11px; color:rgba(240,180,41,0.4); }

    /* ══════════════════════════════════════════
       TICKER
    ══════════════════════════════════════════ */
    .ticker-wrap { background: var(--ink2); border-bottom: 1px solid var(--wire); overflow: hidden; height: 36px; display: flex; align-items: center; }
    .ticker-label { background: var(--gold); color: var(--ink); font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 0 14px; height: 100%; display: flex; align-items: center; flex-shrink: 0; }
    .ticker-track-wrap { flex:1; overflow:hidden; position:relative; }
    .ticker-track-wrap::before { content:''; position:absolute; left:0; top:0; bottom:0; width:32px; background:linear-gradient(to right,var(--ink2),transparent); z-index:1; pointer-events:none; }
    .ticker-track-wrap::after  { content:''; position:absolute; right:0; top:0; bottom:0; width:32px; background:linear-gradient(to left, var(--ink2),transparent); z-index:1; pointer-events:none; }
    .ticker-track { display:flex; animation:ticker 90s linear infinite; width:max-content; }
    .ticker-track:hover { animation-play-state:paused; }
    .ticker-item { display:flex; align-items:center; gap:6px; padding:0 18px; font-family:var(--font-mono); font-size:11px; font-weight:400; white-space:nowrap; border-right:1px solid var(--wire); height:36px; }
    .ticker-item .t-name  { color:var(--t3); }
    .ticker-item .t-price { color:var(--t1); font-weight:700; font-variant-numeric:tabular-nums; }
    .ticker-item.up   .t-arrow,.ticker-item.up   .t-change { color:var(--up); }
    .ticker-item.down .t-arrow,.ticker-item.down .t-change { color:var(--down); }
    .ticker-item.stable .t-arrow,.ticker-item.stable .t-change { color:var(--t4); }

    /* ══════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════ */
    .stats-bar { background:var(--ink2); border-bottom:1px solid var(--wire); padding:0 32px; }
    .stats-inner { max-width:1400px; margin:0 auto; display:flex; flex-wrap:wrap; }
    .stat-item { padding:14px 40px 14px 0; position:relative; }
    .stat-item:not(:last-child)::after { content:''; position:absolute; right:20px; top:50%; transform:translateY(-50%); width:1px; height:20px; background:var(--wire); }
    .stat-value { font-family:var(--font-mono); font-size:22px; font-weight:700; color:var(--gold); line-height:1; font-variant-numeric:tabular-nums; }
    .stat-label { font-family:var(--font-mono); font-size:9px; color:var(--t5); margin-top:4px; text-transform:uppercase; letter-spacing:1px; }

    /* ══════════════════════════════════════════
       HOMEPAGE
    ══════════════════════════════════════════ */
    .homepage { animation:fadeUp 0.4s ease both; }
    .hero {
      min-height: calc(100vh - 60px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 60px 32px 40px; position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,180,41,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Grid lines background */
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--wire) 1px, transparent 1px),
        linear-gradient(90deg, var(--wire) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
      pointer-events: none;
    }
    .hero-eyebrow { font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid rgba(240,180,41,0.2); padding:5px 14px; border-radius:3px; margin-bottom:28px; animation:fadeUp 0.4s 0.1s ease both; position:relative; z-index:1; }
    .hero-title { font-family:var(--font-disp); font-size:clamp(38px,6vw,72px); font-weight:800; color:var(--t1); letter-spacing:-2px; line-height:1.02; margin-bottom:20px; animation:fadeUp 0.4s 0.15s ease both; position:relative; z-index:1; }
    .hero-title span { color:var(--gold); }
    .hero-title-sub { display:block; font-family:var(--font-ui); font-size:clamp(18px,2.5vw,28px); font-weight:300; color:var(--t3); letter-spacing:0; margin-top:8px; }
    .hero-desc { font-size:clamp(14px,1.6vw,16px); color:var(--t3); max-width:540px; line-height:1.8; margin-bottom:36px; animation:fadeUp 0.4s 0.2s ease both; position:relative; z-index:1; }
    .hero-cta-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:56px; animation:fadeUp 0.4s 0.25s ease both; position:relative; z-index:1; }
    .btn-hero-primary { padding:13px 28px; border-radius:6px; background:var(--gold); color:var(--ink); border:none; font-family:var(--font-ui); font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.15s, box-shadow 0.15s; box-shadow:0 4px 20px var(--gold-glow); display:inline-flex; align-items:center; gap:8px; touch-action:manipulation; }
    .btn-hero-primary:hover { opacity:0.9; transform:translateY(-2px); box-shadow:0 8px 28px var(--gold-glow); }
    .btn-hero-primary:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .btn-hero-secondary { padding:13px 24px; border-radius:6px; background:transparent; color:var(--t2); border:1px solid var(--wire2); font-family:var(--font-ui); font-size:14px; font-weight:500; cursor:pointer; transition:border-color 0.15s, color 0.15s; display:inline-flex; align-items:center; gap:8px; text-decoration:none; touch-action:manipulation; }
    .btn-hero-secondary:hover { border-color:rgba(37,211,102,0.4); color:var(--wa); }
    .hero-stats { display:flex; gap:48px; flex-wrap:wrap; justify-content:center; animation:fadeUp 0.4s 0.3s ease both; position:relative; z-index:1; }
    .hero-stat { text-align:center; }
    .hero-stat-value { font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--gold); letter-spacing:-1px; line-height:1; font-variant-numeric:tabular-nums; }
    .hero-stat-label { font-family:var(--font-mono); font-size:9px; color:var(--t5); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }

    /* Sections */
    .features-section,.how-section,.sources-section,.wa-section { padding:80px 32px; max-width:1400px; margin:0 auto; }
    .section-eyebrow { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
    .section-title { font-family:var(--font-disp); font-size:clamp(22px,3vw,34px); font-weight:800; color:var(--t1); letter-spacing:-0.5px; margin-bottom:12px; }
    .section-title span { color:var(--gold); }
    .section-desc { font-size:15px; color:var(--t3); max-width:500px; line-height:1.8; margin-bottom:48px; }
    .features-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1px; background:var(--wire); border:1px solid var(--wire); border-radius:10px; overflow:hidden; }
    .feature-card { background:var(--ink2); padding:28px; transition:background 0.2s; animation:fadeUp 0.4s ease both; }
    .feature-card:hover { background:var(--ink3); }
    .feature-icon { font-size:22px; margin-bottom:16px; }
    .feature-title { font-family:var(--font-disp); font-size:15px; font-weight:700; color:var(--t1); margin-bottom:8px; }
    .feature-desc { font-size:13px; color:var(--t3); line-height:1.7; }
    .steps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:24px; margin-top:40px; }
    .step-card { text-align:center; padding:28px 20px; }
    .step-num { width:40px; height:40px; border-radius:50%; background:var(--gold); color:var(--ink); font-family:var(--font-mono); font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; box-shadow:0 0 14px var(--gold-glow); }
    .step-title { font-family:var(--font-disp); font-size:14px; font-weight:700; color:var(--t1); margin-bottom:8px; }
    .step-desc { font-size:12px; color:var(--t3); line-height:1.7; }
    .sources-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:28px; }
    .source-chip { padding:8px 16px; border-radius:4px; background:var(--ink3); border:1px solid var(--wire2); font-family:var(--font-mono); font-size:11px; font-weight:400; color:var(--t3); transition:border-color 0.15s, color 0.15s; }
    .source-chip:hover { border-color:var(--gold); color:var(--gold); }
    .wa-card { background:rgba(37,211,102,0.04); border:1px solid rgba(37,211,102,0.15); border-radius:10px; padding:48px; display:flex; align-items:center; gap:48px; flex-wrap:wrap; position:relative; overflow:hidden; }
    .wa-card-left { flex:1; min-width:280px; }
    .wa-card-icon { font-size:40px; margin-bottom:14px; }
    .wa-card-title { font-family:var(--font-disp); font-size:24px; font-weight:800; color:var(--t1); letter-spacing:-0.3px; margin-bottom:10px; }
    .wa-card-title span { color:var(--wa); }
    .wa-card-desc { font-size:14px; color:var(--t3); line-height:1.8; max-width:440px; margin-bottom:24px; }
    .wa-perks-inline { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
    .wa-perk-inline { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--t2); }
    .wa-perk-dot { width:5px; height:5px; border-radius:50%; background:var(--wa); flex-shrink:0; }
    .wa-join-big { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:6px; background:var(--wa); color:white; border:none; font-family:var(--font-ui); font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.15s; box-shadow:0 4px 18px rgba(37,211,102,0.3); text-decoration:none; touch-action:manipulation; }
    .wa-join-big:hover { opacity:0.9; transform:translateY(-2px); }
    .wa-card-right { flex-shrink:0; }
    .wa-big-icon { width:100px; height:100px; border-radius:22px; background:linear-gradient(135deg,var(--wa),var(--wa2)); display:flex; align-items:center; justify-content:center; font-size:48px; box-shadow:0 8px 32px rgba(37,211,102,0.35); }

    /* ══════════════════════════════════════════
       MAIN DASHBOARD
    ══════════════════════════════════════════ */
    .main { max-width:1400px; margin:0 auto; padding:28px 32px; }
    .page-header { margin-bottom:24px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
    .page-title { font-family:var(--font-disp); font-size:24px; font-weight:800; color:var(--t1); letter-spacing:-0.5px; }
    .page-title span { color:var(--gold); }
    .page-sub { font-family:var(--font-mono); font-size:11px; color:var(--t5); margin-top:4px; }
    .search-filter-row { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; align-items:flex-start; }
    .search-wrap { position:relative; flex:1; min-width:260px; }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--t5); font-size:13px; pointer-events:none; }
    .search-input { width:100%; padding:10px 12px 10px 36px; background:var(--ink3); border:1px solid var(--wire2); border-radius:6px; color:var(--t1); font-family:var(--font-ui); font-size:14px; outline:none; transition:border-color 0.15s, box-shadow 0.15s; }
    .search-input::placeholder { color:var(--t5); }
    .search-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
    .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .cat-tab { padding:8px 14px; border-radius:5px; border:1px solid var(--wire2); background:transparent; color:var(--t4); font-family:var(--font-ui); font-size:11px; font-weight:500; cursor:pointer; transition:color 0.15s, border-color 0.15s, background 0.15s; white-space:nowrap; touch-action:manipulation; }
    .cat-tab:hover, .cat-tab:focus-visible { border-color:var(--gold); color:var(--gold); outline:none; }
    .cat-tab.active { background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:700; }
    .loading { display:flex; flex-direction:column; align-items:center; gap:14px; padding:80px; color:var(--t4); }
    .spinner { width:28px; height:28px; border:2px solid var(--wire2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; }

    /* ══════════════════════════════════════════
       COMMODITY CARDS
    ══════════════════════════════════════════ */
    .commodity-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1px; background:var(--wire); border:1px solid var(--wire); border-radius:10px; overflow:hidden; margin-bottom:32px; }
    .commodity-card {
      background:var(--ink2);
      padding:20px;
      cursor:pointer;
      color:inherit;
      animation:fadeUp 0.35s ease both;
      position:relative;
      transition:background 0.15s;
    }
    .commodity-card:hover { background:var(--ink3); }
    .commodity-card.selected { background:var(--ink3); outline:2px solid var(--gold); outline-offset:-2px; }
    .commodity-card:focus-visible { outline:2px solid var(--gold); outline-offset:-2px; }

    /* Left accent bar */
    .commodity-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; transition:background 0.15s; }
    .commodity-card.selected::before,.commodity-card:hover::before { background:var(--gold); }

    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:10px; }
    .card-cat-chip { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:5px; }
    .card-name { font-family:var(--font-disp); font-size:16px; font-weight:700; color:var(--t1); line-height:1.2; }
    .card-markets { font-family:var(--font-mono); font-size:10px; color:var(--t5); margin-top:3px; }
    .rec-badge { font-family:var(--font-mono); font-size:9px; font-weight:700; padding:3px 9px; border-radius:3px; flex-shrink:0; white-space:nowrap; letter-spacing:1px; text-transform:uppercase; }
    .rec-sell    { background:var(--up-bg);   color:var(--up);   border:1px solid rgba(52,211,153,0.25); }
    .rec-wait    { background:var(--down-bg); color:var(--down); border:1px solid rgba(248,113,113,0.25); }
    .rec-pending { background:var(--gold-dim); color:var(--gold); border:1px solid rgba(240,180,41,0.2); }

    .price-block { margin-bottom:12px; }
    .price-row { display:flex; align-items:baseline; gap:8px; margin-bottom:2px; }
    .price-value { font-family:var(--font-mono); font-size:28px; font-weight:700; color:var(--t1); line-height:1; letter-spacing:-1px; font-variant-numeric:tabular-nums; }
    .price-trend-arrow { font-size:16px; line-height:1; }
    .price-trend-arrow.up     { color:var(--up); }
    .price-trend-arrow.down   { color:var(--down); }
    .price-trend-arrow.stable { color:var(--t4); }
    .price-meta { font-family:var(--font-mono); font-size:11px; color:var(--t4); }

    .rec-reason { font-size:12px; line-height:1.5; padding:8px 11px; border-radius:5px; margin-bottom:10px; }
    .rec-reason.sell    { background:var(--up-bg);   border-left:2px solid var(--up);   color:rgba(52,211,153,0.9); }
    .rec-reason.wait    { background:var(--down-bg); border-left:2px solid var(--down); color:rgba(248,113,113,0.9); }
    .rec-reason.pending { background:var(--gold-dim); border-left:2px solid var(--gold); color:rgba(240,180,41,0.85); }

    .pred-summary { font-family:var(--font-mono); font-size:11px; padding:6px 10px; border-radius:4px; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .pred-summary.up     { background:var(--down-bg); color:rgba(248,113,113,0.9); border:1px solid rgba(248,113,113,0.12); }
    .pred-summary.down   { background:var(--up-bg);   color:rgba(52,211,153,0.9);  border:1px solid rgba(52,211,153,0.12); }
    .pred-summary.stable { background:var(--gold-dim); color:rgba(240,180,41,0.8); border:1px solid rgba(240,180,41,0.1); }

    .sources-divider { height:1px; background:var(--wire); margin-bottom:10px; }
    .sources-table { width:100%; border-collapse:collapse; margin-bottom:10px; }
    .sources-table td { padding:4px 0; font-family:var(--font-mono); font-size:11px; border-bottom:1px solid rgba(255,255,255,0.03); }
    .sources-table tr:last-child td { border-bottom:none; }
    .td-source { color:var(--t5); width:72px; font-weight:700; }
    .td-market { color:var(--t3); }
    .td-best   { color:var(--up); font-weight:700; }
    .td-price  { color:var(--t1); font-weight:700; text-align:right; font-variant-numeric:tabular-nums; }
    .td-type   { text-align:right; }
    .type-tag  { font-family:var(--font-mono); font-size:9px; color:var(--t5); background:var(--ink4); padding:1px 6px; border-radius:2px; border:1px solid var(--wire); }
    .card-date { font-family:var(--font-mono); font-size:10px; color:var(--t5); margin-bottom:12px; }

    .card-actions { display:flex; flex-direction:column; gap:6px; }
    .voir-btn { width:100%; padding:9px; border-radius:5px; font-family:var(--font-ui); font-size:12px; font-weight:600; cursor:pointer; transition:color 0.15s, border-color 0.15s, background 0.15s; border:1px solid var(--wire2); background:transparent; color:var(--t4); touch-action:manipulation; }
    .voir-btn:hover, .voir-btn:focus-visible { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); outline:none; }
    .voir-btn.active { background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:700; }

    /* Share button */
    .share-btn { width:100%; padding:8px; border-radius:5px; font-family:var(--font-ui); font-size:11px; font-weight:600; cursor:pointer; transition:color 0.15s, border-color 0.15s; border:1px solid rgba(96,165,250,0.2); background:rgba(96,165,250,0.04); color:rgba(147,197,253,0.7); display:flex; align-items:center; justify-content:center; gap:6px; touch-action:manipulation; }
    .share-btn:hover, .share-btn:focus-visible { border-color:rgba(96,165,250,0.45); color:#93C5FD; outline:none; }

    /* Revenue calc */
    .calc-section { margin-top:12px; padding-top:12px; border-top:1px solid var(--wire); }
    .calc-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .calc-input-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .calc-input { flex:1; padding:7px 10px; background:var(--ink); border:1px solid var(--wire2); border-radius:5px; color:var(--t1); font-family:var(--font-mono); font-size:12px; outline:none; min-width:0; transition:border-color 0.15s; font-variant-numeric:tabular-nums; }
    .calc-input:focus { border-color:var(--gold); }
    .calc-unit { font-family:var(--font-mono); font-size:11px; color:var(--t4); white-space:nowrap; }
    .calc-results { display:flex; flex-direction:column; gap:5px; }
    .calc-row { display:flex; justify-content:space-between; align-items:center; padding:7px 10px; background:var(--ink); border-radius:4px; border:1px solid var(--wire); }
    .calc-row.best-market { border-color:rgba(52,211,153,0.25); background:var(--up-bg); }
    .calc-market { font-family:var(--font-mono); font-size:10px; color:var(--t3); }
    .calc-earning { font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--t1); font-variant-numeric:tabular-nums; }
    .calc-earning.best { color:var(--up); }
    .calc-best-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--up); background:var(--up-bg); padding:1px 6px; border-radius:2px; }

    /* ══════════════════════════════════════════
       SHARE MODAL — fixed centered on viewport
    ══════════════════════════════════════════ */
    .share-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeUp 0.2s ease;
      overscroll-behavior: contain;
    }
    .share-modal { background:var(--ink3); border:1px solid var(--wire2); border-radius:10px; padding:22px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px var(--wire); overscroll-behavior:contain; }
    .share-modal-title { font-family:var(--font-disp); font-size:15px; font-weight:700; color:var(--t1); margin-bottom:3px; }
    .share-modal-sub { font-family:var(--font-mono); font-size:10px; color:var(--t4); margin-bottom:14px; }
    .share-preview-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .share-preview { border-radius:7px; overflow:hidden; margin-bottom:14px; border:1px solid var(--wire2); background:var(--ink); max-height:380px; overflow-y:auto; overscroll-behavior:contain; }
    .share-preview::-webkit-scrollbar { width:4px; }
    .share-preview::-webkit-scrollbar-track { background:var(--ink3); }
    .share-preview::-webkit-scrollbar-thumb { background:var(--ink5); border-radius:2px; }
    .share-preview canvas { display:block; width:100%; height:auto; }
    .share-actions { display:flex; gap:8px; }
    .share-download-btn { flex:1; padding:10px; border-radius:5px; background:rgba(96,165,250,0.9); color:white; border:none; font-family:var(--font-ui); font-size:12px; font-weight:700; cursor:pointer; transition:opacity 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; touch-action:manipulation; }
    .share-download-btn:hover { opacity:0.85; }
    .share-close-btn { padding:10px 16px; border-radius:5px; background:transparent; color:var(--t4); border:1px solid var(--wire2); font-family:var(--font-ui); font-size:12px; font-weight:600; cursor:pointer; transition:border-color 0.15s, color 0.15s; touch-action:manipulation; }
    .share-close-btn:hover { border-color:var(--wire3); color:var(--t2); }

    /* Forecast share button inside detail panel */
    .share-pred-btn { width:100%; padding:9px 14px; border-radius:5px; font-family:var(--font-ui); font-size:11px; font-weight:600; cursor:pointer; transition:color 0.15s, border-color 0.15s; border:1px solid rgba(96,165,250,0.2); background:rgba(96,165,250,0.04); color:rgba(147,197,253,0.7); display:flex; align-items:center; justify-content:center; gap:6px; margin-top:14px; touch-action:manipulation; }
    .share-pred-btn:hover { border-color:rgba(96,165,250,0.4); color:#93C5FD; }
    .star-btn { width:28px; height:28px; border:none; background:transparent; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; border-radius:4px; transition:all 0.15s; padding:0; touch-action:manipulation; }
    .star-btn:hover { background:rgba(240,180,41,0.08); }
    .star-btn.favorited { color:var(--gold); }

    /* ══════════════════════════════════════════
       DETAIL PANEL
    ══════════════════════════════════════════ */
    .detail-panel { background:var(--ink2); border:1px solid var(--wire2); border-radius:10px; padding:24px; margin-bottom:32px; animation:fadeUp 0.2s ease both; }
    .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .detail-title { font-family:var(--font-disp); font-size:18px; font-weight:800; color:var(--t1); letter-spacing:-0.3px; }
    .detail-sub { font-family:var(--font-mono); font-size:10px; color:var(--t4); margin-top:4px; }
    .detail-tabs { display:flex; gap:5px; flex-wrap:wrap; }
    .detail-tab { padding:6px 14px; border-radius:4px; border:1px solid var(--wire2); background:transparent; color:var(--t4); font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.5px; cursor:pointer; transition:color 0.15s, border-color 0.15s, background 0.15s; text-transform:uppercase; touch-action:manipulation; }
    .detail-tab:hover, .detail-tab:focus-visible { border-color:var(--gold); color:var(--gold); outline:none; }
    .detail-tab.active { background:var(--gold); color:var(--ink); border-color:var(--gold); }
    .market-filter { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:16px; }
    .mkt-btn { padding:4px 12px; border-radius:4px; border:1px solid var(--wire2); background:transparent; color:var(--t4); font-family:var(--font-mono); font-size:10px; font-weight:700; cursor:pointer; transition:color 0.15s, border-color 0.15s; text-transform:uppercase; touch-action:manipulation; }
    .mkt-btn:hover { border-color:var(--gold); color:var(--gold); }
    .mkt-btn.active { background:var(--gold-dim); color:var(--gold); border-color:rgba(240,180,41,0.3); }
    .pred-months { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--wire); border:1px solid var(--wire); border-radius:8px; overflow:hidden; margin-bottom:20px; }
    .pred-month-card { background:var(--ink3); padding:16px; }
    .pred-month-name { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
    .pred-month-price { font-family:var(--font-mono); font-size:20px; font-weight:700; margin-bottom:4px; line-height:1; font-variant-numeric:tabular-nums; }
    .pred-month-price.up     { color:var(--down); }
    .pred-month-price.down   { color:var(--up); }
    .pred-month-price.stable { color:var(--t1); }
    .pred-month-change { font-family:var(--font-mono); font-size:11px; margin-bottom:7px; font-weight:700; }
    .pred-month-change.up     { color:var(--down); }
    .pred-month-change.down   { color:var(--up); }
    .pred-month-change.stable { color:var(--t4); }
    .pred-month-driver { font-size:11px; color:var(--t4); line-height:1.4; }
    .pred-confidence { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .pred-conf-bar-wrap { flex:1; background:var(--ink); border-radius:1px; height:2px; overflow:hidden; }
    .pred-conf-bar { height:100%; border-radius:1px; background:var(--gold); }
    .pred-conf-label { font-family:var(--font-mono); font-size:9px; color:var(--t5); white-space:nowrap; }
    .pred-factors { margin-top:20px; }
    .pred-factors-title { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
    .factor-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--wire); }
    .factor-row:last-child { border-bottom:none; }
    .factor-icon { width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
    .factor-icon.positive { background:var(--up-bg); }
    .factor-icon.negative { background:var(--down-bg); }
    .factor-icon.neutral  { background:var(--ink4); }
    .factor-name   { font-family:var(--font-disp); font-size:13px; font-weight:700; color:var(--t2); margin-bottom:2px; }
    .factor-desc   { font-size:12px; color:var(--t4); line-height:1.5; }
    .factor-impact { font-family:var(--font-mono); font-size:10px; font-weight:700; margin-top:3px; }
    .factor-impact.positive { color:var(--up); }
    .factor-impact.negative { color:var(--down); }
    .factor-impact.neutral  { color:var(--t5); }
    .pred-disclaimer { margin-top:16px; padding:10px 14px; background:var(--ink3); border-radius:5px; font-family:var(--font-mono); font-size:10px; color:var(--t5); line-height:1.6; border:1px solid var(--wire); }
    .comparison-list { display:flex; flex-direction:column; gap:12px; max-width:600px; }
    .comparison-row { display:flex; align-items:center; gap:12px; }
    .comp-market { width:140px; flex-shrink:0; }
    .comp-market-name { font-family:var(--font-disp); font-size:13px; color:var(--t1); font-weight:700; display:block; }
    .comp-source-tag { font-family:var(--font-mono); font-size:9px; color:var(--t5); }
    .comp-bar-wrap { flex:1; background:var(--ink4); border-radius:2px; height:6px; overflow:hidden; max-width:180px; }
    .comp-bar { height:100%; border-radius:2px; }
    .comp-price-wrap { display:flex; align-items:center; gap:8px; min-width:120px; justify-content:flex-end; }
    .comp-price { font-family:var(--font-mono); font-size:13px; color:var(--t1); font-weight:700; font-variant-numeric:tabular-nums; }
    .comp-tag { font-family:var(--font-mono); font-size:9px; font-weight:700; padding:2px 7px; border-radius:2px; text-transform:uppercase; letter-spacing:0.5px; }
    .comp-tag.best  { background:var(--up-bg);   color:var(--up);   border:1px solid rgba(52,211,153,0.2); }
    .comp-tag.worst { background:var(--down-bg); color:var(--down); border:1px solid rgba(248,113,113,0.2); }
    .insight-box { margin-top:16px; background:var(--gold-dim); border:1px solid rgba(240,180,41,0.12); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--t2); max-width:600px; line-height:1.6; }
    .trend-table { width:100%; border-collapse:collapse; max-width:680px; }
    .trend-table th { padding:8px 12px; font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-align:left; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--wire); background:var(--ink3); }
    .trend-table td { padding:9px 12px; font-family:var(--font-mono); font-size:12px; border-bottom:1px solid var(--wire); color:var(--t3); font-variant-numeric:tabular-nums; }
    .trend-table tr:last-child td { border-bottom:none; }
    .trend-table tr:hover td { background:var(--ink3); }
    .trend-price { color:var(--t1); font-weight:700; }
    .trend-change.up   { color:var(--down); font-weight:700; }
    .trend-change.down { color:var(--up);   font-weight:700; }
    .trend-change.flat { color:var(--t5); }
    .history-wrap { max-height:380px; overflow-y:auto; border-radius:6px; border:1px solid var(--wire); overscroll-behavior:contain; }
    .history-wrap::-webkit-scrollbar { width:5px; }
    .history-wrap::-webkit-scrollbar-track { background:var(--ink3); }
    .history-wrap::-webkit-scrollbar-thumb { background:var(--ink5); border-radius:2px; }
    .history-table { width:100%; border-collapse:collapse; }
    .history-table th { padding:8px 12px; font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-align:left; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--wire); background:var(--ink2); position:sticky; top:0; }
    .history-table td { padding:8px 12px; font-family:var(--font-mono); font-size:11px; border-bottom:1px solid var(--wire); color:var(--t4); font-variant-numeric:tabular-nums; }
    .history-table tr:last-child td { border-bottom:none; }
    .history-table tr:hover td { background:var(--ink3); }
    .h-price { color:var(--t1); font-weight:700; }
    .year-comp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1px; background:var(--wire); border:1px solid var(--wire); border-radius:8px; overflow:hidden; margin-bottom:16px; }
    .year-comp-card { background:var(--ink3); padding:14px; }
    .year-comp-card.current-year { background:var(--gold-dim); }
    .year-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .year-price { font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--t1); margin-bottom:4px; font-variant-numeric:tabular-nums; }
    .year-vs-now { font-family:var(--font-mono); font-size:11px; font-weight:700; }
    .year-vs-now.higher { color:var(--down); }
    .year-vs-now.lower  { color:var(--up); }
    .year-vs-now.same   { color:var(--t5); }
    .year-months { font-family:var(--font-mono); font-size:9px; color:var(--t5); margin-top:4px; }
    .year-insight { background:var(--gold-dim); border:1px solid rgba(240,180,41,0.15); border-radius:6px; padding:12px 16px; font-size:13px; color:var(--t2); line-height:1.7; }

    /* ══════════════════════════════════════════
       PAYWALL / AUTH
    ══════════════════════════════════════════ */
    .gate-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:var(--ink); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
    .gate-card { background:var(--ink2); border:1px solid var(--wire2); border-radius:10px; padding:36px 32px; width:100%; max-width:400px; box-shadow:0 0 60px rgba(0,0,0,0.5); }
    .gate-logo { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .gate-logo-mark { width:38px; height:38px; background:var(--gold); border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--ink); box-shadow:0 0 12px var(--gold-glow); }
    .gate-logo-name { font-family:var(--font-disp); font-size:18px; font-weight:800; color:var(--t1); }
    .gate-logo-name span { color:var(--gold); }
    .gate-logo-sub { font-family:var(--font-mono); font-size:9px; color:var(--t5); margin-top:1px; letter-spacing:0.8px; text-transform:uppercase; }
    .gate-title { font-family:var(--font-disp); font-size:18px; font-weight:800; color:var(--t1); margin-bottom:8px; }
    .gate-sub { font-size:13px; color:var(--t3); margin-bottom:22px; line-height:1.7; }
    .gate-form-group { margin-bottom:14px; }
    .gate-label { display:block; font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
    .gate-input { width:100%; padding:11px 13px; background:var(--ink); border:1px solid var(--wire2); border-radius:6px; color:var(--t1); font-family:var(--font-ui); font-size:16px; outline:none; transition:border-color 0.15s, box-shadow 0.15s; autocomplete:off; }
    .gate-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
    .gate-input::placeholder { color:var(--t5); }
    .gate-btn { width:100%; padding:12px; border-radius:6px; background:var(--gold); color:var(--ink); border:none; font-family:var(--font-ui); font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.15s; margin-top:6px; box-shadow:0 4px 18px var(--gold-glow); touch-action:manipulation; }
    .gate-btn:hover { opacity:0.9; transform:translateY(-1px); }
    .gate-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
    .gate-note { font-family:var(--font-mono); font-size:10px; color:var(--t5); text-align:center; margin-top:12px; line-height:1.6; }
    .gate-error { font-family:var(--font-mono); font-size:11px; color:var(--down); margin-top:10px; padding:9px 12px; background:var(--down-bg); border-radius:5px; border:1px solid rgba(248,113,113,0.2); }

    /* AUTH MODAL — replaces full-screen gate */

    .auth-btn { width:100%; padding:11px; border-radius:6px; background:var(--gold); color:var(--ink); border:none; font-family:var(--font-ui); font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.15s; margin-top:4px; box-shadow:0 4px 16px var(--gold-glow); touch-action:manipulation; }

    /* WELCOME POPUP — shown after new signup */

    .welcome-modal { background:var(--ink2); border:1px solid rgba(52,211,153,0.2); border-radius:12px; padding:28px; width:100%; max-width:400px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.6); text-align:center; overscroll-behavior:contain; }

    .welcome-btn-free:hover { border-color:var(--wire3); color:var(--t2); }

    /* CONTACT PAGE */
    .contact-page { max-width:640px; margin:0 auto; padding:48px 32px; animation:fadeUp 0.3s ease both; }

    .contact-card:hover { border-color:var(--gold); }

    .contact-card-icon.wa  { background:rgba(37,211,102,0.1); border:1px solid rgba(37,211,102,0.2); }
    .contact-card-icon.pay { background:var(--gold-dim); border:1px solid rgba(240,180,41,0.2); }
    .contact-card-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }

    .contact-card-arrow { font-size:18px; color:var(--t5); margin-left:auto; flex-shrink:0; }
    .renewal-banner { background:linear-gradient(90deg,rgba(240,180,41,0.07),rgba(240,180,41,0.04)); border-bottom:1px solid rgba(240,180,41,0.12); padding:8px 32px; }
    .renewal-banner-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .renewal-banner-text { font-family:var(--font-mono); font-size:11px; color:rgba(240,180,41,0.8); }
    .renewal-banner-close { width:24px; height:24px; border-radius:50%; background:transparent; border:1px solid var(--wire); color:var(--t5); font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .expired-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(6px); }
    .expired-modal { background:var(--ink2); border:1px solid var(--wire2); border-radius:10px; padding:28px; width:100%; max-width:380px; max-height:90vh; overflow-y:auto; text-align:center; overscroll-behavior:contain; }
    .expired-icon { font-size:36px; margin-bottom:12px; }
    .expired-title { font-family:var(--font-disp); font-size:18px; font-weight:800; color:var(--t1); margin-bottom:8px; }
    .expired-sub { font-size:13px; color:var(--t3); line-height:1.7; margin-bottom:18px; }
    .expired-wave { background:var(--gold-dim); border:1px solid rgba(240,180,41,0.2); border-radius:7px; padding:14px; margin-bottom:18px; }
    .expired-wave-label { font-family:var(--font-mono); font-size:9px; color:var(--t4); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
    .expired-wave-number { font-family:var(--font-mono); font-size:22px; font-weight:700; color:var(--gold); }
    .expired-wave-amount { font-family:var(--font-mono); font-size:10px; color:var(--t4); margin-top:4px; }
    .expired-dismiss { width:100%; padding:10px; border-radius:6px; background:transparent; color:var(--t4); border:1px solid var(--wire2); font-family:var(--font-ui); font-size:13px; font-weight:600; cursor:pointer; transition:border-color 0.15s, color 0.15s; }

    .upgrade-bar { background:var(--gold-dim); border:1px solid rgba(240,180,41,0.12); border-radius:7px; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .upgrade-bar-text { font-size:12px; color:var(--t3); }
    .upgrade-bar-btn { padding:6px 14px; border-radius:4px; background:var(--gold); color:var(--ink); border:none; font-family:var(--font-mono); font-size:10px; font-weight:700; cursor:pointer; letter-spacing:0.5px; text-transform:uppercase; touch-action:manipulation; }
    .upgrade-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:400; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(6px); }
    .upgrade-modal { background:var(--ink2); border:1px solid var(--wire2); border-radius:10px; padding:28px; width:100%; max-width:400px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.5); overscroll-behavior:contain; }
    .upgrade-modal-title { font-family:var(--font-disp); font-size:18px; font-weight:800; color:var(--t1); margin-bottom:8px; }

    .upgrade-modal-wave-number { font-family:var(--font-mono); font-size:24px; font-weight:700; color:var(--gold); }

    .upgrade-modal-plan.recommended { border-color:rgba(240,180,41,0.3); background:var(--gold-dim); }
    .upgrade-modal-plan-label { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t5); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }

    .btn-secondary:hover { border-color:var(--wire3); color:var(--t2); }

    /* ══════════════════════════════════════════
       REPORT MODAL
    ══════════════════════════════════════════ */
    .report-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(6px); }
    .report-modal { background:var(--ink2); border:1px solid var(--wire2); border-radius:10px; padding:26px; width:100%; max-width:420px; animation:fadeUp 0.2s ease; }
    .report-modal-title { font-family:var(--font-disp); font-size:16px; font-weight:800; color:var(--t1); margin-bottom:4px; }
    .report-modal-sub { font-family:var(--font-mono); font-size:10px; color:var(--t4); margin-bottom:20px; }
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .form-input { width:100%; padding:9px 12px; background:var(--ink); border:1px solid var(--wire2); border-radius:6px; color:var(--t1); font-family:var(--font-ui); font-size:16px; outline:none; transition:border-color 0.15s; }

    .report-success-icon { font-size:36px; margin-bottom:12px; }
    .report-success-title { font-family:var(--font-disp); font-size:16px; font-weight:800; color:var(--up); margin-bottom:6px; }
    .report-success-sub { font-size:13px; color:var(--t3); }
    .report-notice { font-family:var(--font-mono); font-size:10px; color:var(--t5); margin-top:12px; line-height:1.6; padding:8px 10px; background:var(--ink3); border-radius:4px; border:1px solid var(--wire); }

    /* ══════════════════════════════════════════
       WA POPUP
    ══════════════════════════════════════════ */
    .wa-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:600; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(6px); overscroll-behavior:contain; }
    .wa-popup { background:var(--ink2); border:1px solid rgba(37,211,102,0.2); border-radius:12px; padding:28px 24px; width:100%; max-width:380px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.6); position:relative; animation:waPop 0.3s cubic-bezier(0.34,1.56,0.64,1); overscroll-behavior:contain; }
    .wa-close { position:absolute; top:12px; right:14px; width:26px; height:26px; border-radius:50%; background:transparent; border:1px solid var(--wire); color:var(--t4); font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; touch-action:manipulation; }

    .wa-title span { color:var(--wa); }
    .wa-desc { font-size:13px; color:var(--t3); line-height:1.7; margin-bottom:18px; }

    .empty   { padding:60px; text-align:center; color:var(--t4); font-family:var(--font-mono); font-size:12px; }

    /* ══════════════════════════════════════════

    ══════════════════════════════════════════ */

    .footer-markets { font-family:var(--font-mono); font-size:10px; color:var(--t5); margin-top:3px; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */

      .nav-btn { padding:5px 10px; font-size:11px; }

    }

    /* ══════════════════════════════════════════
       PLANNING PAGE
    ══════════════════════════════════════════ */

  c.fillStyle='#F1F5F9';c.font='bold 48px "Space Mono",monospace'

  c.fillStyle='#64748B';c.font='500 13px "Space Mono",monospace'
  c.fillText('FCFA / '+unit,28,254)
  // Pred signal
  const pclr=predDir==='up'?'rgba(248,113,113,0.9)':predDir==='down'?'rgba(52,211,153,0.9)':'rgba(240,180,41,0.8)'
  const pbg=predDir==='up'?'rgba(248,113,113,0.08)':predDir==='down'?'rgba(52,211,153,0.08)':'rgba(240,180,41,0.06)'
  c.fillStyle=pbg;drawRR(c,28,270,W-56,32,4);c.fill()
  const parrow=predDir==='up'?'▲ HAUSSE PREVUE':predDir==='down'?'▼ BAISSE PREVUE':'→ STABLE'
  c.fillStyle=pclr;c.font='bold 11px "Space Mono",monospace';c.textAlign='center'
  c.fillText(parrow,W/2,291)
  // Markets label
  c.strokeStyle='rgba(255,255,255,0.07)';c.lineWidth=1

  c.fillStyle='#3D4E63';c.font='700 9px "Space Mono",monospace';c.textAlign='left'
  c.fillText('PRIX PAR MARCHE',28,336)
  // Markets list
  const sorted=[...group].sort((a,b)=>a.price-b.price)
  const bestP=sorted[0].price
  const SMAP={'wfp_hdx':'WFP','auchan_scrape':'AUCHAN','senpoisson_scrape':'SENPOISSON','thiaroye_scrape':'THIAROYE','parknadio_scrape':'PARK NADIO','manual':'MANUEL'}
  sorted.forEach((p,i)=>{

    c.fillStyle=isBest?'#34D399':'#F1F5F9';c.font='bold 13px "Syne",sans-serif';c.textAlign='left'
    c.fillText((isBest?'★ ':'')+p.market_name,40,y+5)
    c.fillStyle='#3D4E63';c.font='500 10px "Space Mono",monospace'
    c.fillText((SMAP[p.source]||p.source)+' · '+(p.price_type==='retail'?'DETAIL':'GROS'),40,y+20)
    c.fillStyle=isBest?'#34D399':'#F1F5F9';c.font='700 14px "Space Mono",monospace';c.textAlign='right'
    c.fillText(Math.round(p.price).toLocaleString()+' FCFA',W-40,y+8)
    if(i<sorted.length-1){c.strokeStyle='rgba(255,255,255,0.04)';c.lineWidth=1;c.beginPath();c.moveTo(40,y+30);c.lineTo(W-40,y+30);c.stroke()}
  })
  // Footer
  const fY=H-20
  c.strokeStyle='rgba(255,255,255,0.05)';c.lineWidth=1
  c.beginPath();c.moveTo(28,fY-14);c.lineTo(W-28,fY-14);c.stroke()
  c.fillStyle='rgba(61,78,99,0.8)';c.font='500 10px "Space Mono",monospace';c.textAlign='center'
  c.fillText('jangprix-web.vercel.app',W/2,fY)
  return cv
}

function generateForecastCard(productName,unit,months){
  const W=560,H=500,DPR=2
  const cv=document.createElement('canvas')
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'
  const c=cv.getContext('2d');c.scale(DPR,DPR)
  c.fillStyle='#080C14';c.fillRect(0,0,W,H)
  c.strokeStyle='rgba(255,255,255,0.04)';c.lineWidth=1
  for(let x=0;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke()}
  for(let y=0;y<H;y+=40){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}
  // Blue top bar
  c.fillStyle='#60A5FA';c.fillRect(0,0,W,3)
  // Logo
  drawRR(c,24,18,32,32,6);c.fillStyle='#F0B429';c.fill()
  c.fillStyle='#080C14';c.font='bold 11px "Space Mono",monospace';c.textAlign='center';c.fillText('JP',40,39)
  c.fillStyle='#F1F5F9';c.font='bold 16px "Syne",sans-serif';c.textAlign='left';c.fillText('Jang Prix',64,36)
  c.fillStyle='#3D4E63';c.font='500 9px "Space Mono",monospace';c.fillText('PREVISION 3 MOIS',64,50)
  c.fillStyle='#60A5FA';c.font='700 9px "Space Mono",monospace';c.fillText('PREVISION 3 MOIS',28,90)
  c.fillStyle='#F1F5F9';c.font='bold 28px "Syne",sans-serif';c.fillText(productName,28,122)
  c.strokeStyle='rgba(255,255,255,0.07)';c.lineWidth=1
  c.beginPath();c.moveTo(28,138);c.lineTo(W-28,138);c.stroke()
  const colW=(W-56-16)/3
  months.forEach((m,i)=>{
    const x=28+i*(colW+8),y=152
    const dc=m.dir==='up'?'#F87171':m.dir==='down'?'#34D399':'#F0B429'
    const db=m.dir==='up'?'rgba(248,113,113,0.07)':m.dir==='down'?'rgba(52,211,153,0.07)':'rgba(240,180,41,0.05)'
    c.fillStyle=db;drawRR(c,x,y,colW,200,6);c.fill()
    c.strokeStyle=dc.replace('rgb','rgba').replace(')',',0.2)');c.lineWidth=1;drawRR(c,x,y,colW,200,6);c.stroke()
    c.fillStyle='#3D4E63';c.font='700 9px "Space Mono",monospace';c.textAlign='center'
    const mn=m.monthName.split(' ')[0].toUpperCase().slice(0,3)+' '+m.monthName.split(' ').pop()
    c.fillText(mn,x+colW/2,y+20)
    c.fillStyle=dc;c.font='700 18px "Space Mono",monospace';c.fillText(m.pp.toLocaleString(),x+colW/2,y+52)
    c.fillStyle='#64748B';c.font='500 9px "Space Mono",monospace';c.fillText('FCFA/'+unit,x+colW/2,y+68)
    const arrow=m.dir==='up'?'▲ +'+m.chg+'%':m.dir==='down'?'▼ '+m.chg+'%':'→ stable'
    c.fillStyle=dc;c.font='700 11px "Space Mono",monospace';c.fillText(arrow,x+colW/2,y+92)
    c.fillStyle='rgba(255,255,255,0.06)';drawRR(c,x+12,y+108,colW-24,3,1);c.fill()
    c.fillStyle=dc;drawRR(c,x+12,y+108,(colW-24)*m.conf/100,3,1);c.fill()
    c.fillStyle='#3D4E63';c.font='500 9px "Space Mono",monospace';c.fillText('FIABILITE '+m.conf+'%',x+colW/2,y+130)
    const dw=m.driver.split(' ')
    let l1='',l2='',split=false
    dw.forEach(w=>{if(!split&&(l1+' '+w).trim().length<=20){l1=(l1+' '+w).trim()}else{split=true;l2=(l2+' '+w).trim()}})
    c.fillStyle='#64748B';c.font='500 9px "Space Mono",monospace'
    c.fillText(l1,x+colW/2,y+155);if(l2)c.fillText(l2,x+colW/2,y+168)
  })
  c.strokeStyle='rgba(255,255,255,0.05)';c.lineWidth=1
  c.beginPath();c.moveTo(28,H-28);c.lineTo(W-28,H-28);c.stroke()
  c.fillStyle='rgba(61,78,99,0.7)';c.font='500 9px "Space Mono",monospace';c.textAlign='center'
  c.fillText('Previsions WFP VAM 2000-2025 · Indicatif uniquement · jangprix-web.vercel.app',W/2,H-14)
  return cv
}

// Portal helper — renders children at document.body so modals always sit above scroll
function Portal({children}){
  const el=React.useRef(null)
  if(!el.current){el.current=document.createElement('div')}
  React.useEffect(()=>{
    document.body.appendChild(el.current)
    return()=>{if(el.current.parentNode)el.current.parentNode.removeChild(el.current)}
  },[])
  return ReactDOM.createPortal(children,el.current)
}

// Share modal — always centered on viewport via portal
function ShareModal({canvas,title,onClose}){
  const ref=React.useRef(null)
  React.useEffect(()=>{
    if(ref.current&&canvas){
      ref.current.innerHTML=''
      const clone=canvas.cloneNode(true)
      clone.style.width='100%';clone.style.height='auto'
      ref.current.appendChild(clone)
    }
  },[canvas])
  // Close on Escape
  React.useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose()}
    document.addEventListener('keydown',h)
    return()=>document.removeEventListener('keydown',h)
  },[onClose])
  function handleShare(){
    if(navigator.share&&canvas.toBlob){
      canvas.toBlob(async blob=>{
        const file=new File([blob],title+'.png',{type:'image/png'})
        try{await navigator.share({files:[file],title:'Jang Prix - '+title})}
        catch(e){dl()}
      })
    } else dl()
  }
  function dl(){
    const a=document.createElement('a')
    a.download=title.replace(/\s+/g,'-').toLowerCase()+'-jangprix.png'
    a.href=canvas.toDataURL('image/png')
    a.click()
  }
  return(
    <Portal>
      <div className="share-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}} role="dialog" aria-modal="true" aria-label="Carte partageable">
        <div className="share-modal">
          <div className="share-modal-title">Aperçu de la carte</div>
          <div className="share-modal-sub">VOICI CE QUI SERA PARTAGE — VERIFIEZ AVANT DE TELECHARGER</div>
          <div className="share-preview-label">Aperçu</div>
          <div className="share-preview" ref={ref}></div>
          <div className="share-actions">
            <button className="share-download-btn" onClick={handleShare}>
              {'share' in navigator ? '📤 Partager maintenant' : '⬇ Telecharger l\'image'}
            </button>
            <button className="share-close-btn" onClick={onClose}>Fermer</button>
          </div>
        </div>
      </div>
    </Portal>
  )
}

function AuthModal({onLogin, onClose}){
  const[tab,setTab]=React.useState('signup') // 'signup' | 'login'
  const[name,setName]=React.useState('')
  const[phone,setPhone]=React.useState('')
  const[countryCode,setCountryCode]=React.useState('+221')
  const[loading,setLoading]=React.useState(false)
  const[error,setError]=React.useState('')

  // Close on Escape
  React.useEffect(()=>{
    const h=e=>{if(e.key==='Escape'&&onClose)onClose()}
    document.addEventListener('keydown',h)
    return()=>document.removeEventListener('keydown',h)
  },[onClose])

  function cleanPhone(){
    // Strip spaces, dashes, brackets from phone input
    return phone.trim().replace(/[\s\-\(\)]/g,'')
  }

  function fullPhone(){
    const p=cleanPhone()
    // If user typed country code themselves, don't double-add
    if(p.startsWith('+'))return p
    return countryCode+p
  }

  async function handleSignup(){
    const tn=name.trim(),fp=fullPhone()
    if(!tn){setError('Veuillez entrer votre prénom.');return}
    if(cleanPhone().length<5){setError('Numéro invalide. Vérifiez le format.');return}
    setLoading(true);setError('')
    try{
      let sub=await getSubscriber(fp)
      const isNew=!sub
      if(!sub)sub=await registerFreeUser(tn,fp)
      saveSession(sub);onLogin(sub,isNew)
    }catch(e){setError('Erreur de connexion. Réessayez.')}
    setLoading(false)
  }

  async function handleLogin(){
    const fp=fullPhone()
    if(cleanPhone().length<5){setError('Numéro invalide. Vérifiez le format.');return}
    setLoading(true);setError('')
    try{
      const sub=await getSubscriber(fp)
      if(!sub){setError('Numéro introuvable. Créez un compte d\'abord.');setLoading(false);return}
      saveSession(sub);onLogin(sub)
    }catch(e){setError('Erreur de connexion. Réessayez.')}
    setLoading(false)
  }

  function switchTab(t){setTab(t);setError('');setPhone('');setName('')}

  return(
    <Portal>
      <div className="auth-overlay" onClick={e=>{if(e.target===e.currentTarget&&onClose)onClose()}} role="dialog" aria-modal="true" aria-label="Connexion Jàng Prix">
        <div className="auth-modal">
          {onClose&&<button className="auth-close" onClick={onClose} aria-label="Fermer">×</button>}
          <div className="auth-logo">
            <div className="auth-logo-mark">JP</div>
            <div><div className="auth-logo-name">Jang <span>Prix</span></div></div>
          </div>

          <div className="auth-tabs" role="tablist">
            <button role="tab" aria-selected={tab==='signup'} className={'auth-tab'+(tab==='signup'?' active':'')} onClick={()=>switchTab('signup')}>Créer un compte</button>
            <button role="tab" aria-selected={tab==='login'}  className={'auth-tab'+(tab==='login' ?' active':'')} onClick={()=>switchTab('login')}>Se connecter</button>
          </div>

          {tab==='signup'&&(
            <>
              <div className="auth-form-group">
                <label className="auth-label" htmlFor="auth-name">Prénom</label>
                <input id="auth-name" className="auth-input" type="text" placeholder="ex: Mamadou…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSignup()} autoComplete="given-name" autoFocus />
              </div>
              <div className="auth-form-group">
                <label className="auth-label" htmlFor="auth-phone-signup">Numéro de téléphone</label>
                <div className="auth-phone-row">
                  <select className="auth-country" value={countryCode} onChange={e=>setCountryCode(e.target.value)} aria-label="Indicatif pays">
                    {COUNTRY_CODES.map(c=><option key={c.code+c.name} value={c.code}>{c.flag} {c.code}</option>)}
                  </select>
                  <input id="auth-phone-signup" className="auth-input" type="tel" placeholder="77 545 98 89" value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSignup()} autoComplete="tel-national" inputMode="tel" />
                </div>
              </div>
              {error&&<div className="auth-error" role="alert">{error}</div>}
              <button className="auth-btn" onClick={handleSignup} disabled={loading} aria-busy={loading}>{loading?'Création…':'Commencer mon essai gratuit →'}</button>
              <div style={{background:'var(--up-bg)',border:'1px solid rgba(52,211,153,0.2)',borderRadius:6,padding:'8px 12px',marginTop:10,marginBottom:6,textAlign:'center'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:700,color:'var(--up)'}}>14 JOURS D'ACCES COMPLET GRATUIT</div>
                <div style={{fontSize:11,color:'var(--t3)',marginTop:3}}>Prix en direct · Previsions · Tendances · Historique</div>
              </div>
              <div className="auth-note">Aucun mot de passe. Aucun paiement requis. Vos donnees sont confidentielles.</div>
              <div className="auth-switch">Déjà un compte ? <button onClick={()=>switchTab('login')}>Se connecter</button></div>
            </>
          )}

          {tab==='login'&&(
            <>

                <label className="auth-label" htmlFor="auth-phone-login">Numéro de téléphone</label>

                  <select className="auth-country" value={countryCode} onChange={e=>setCountryCode(e.target.value)} aria-label="Indicatif pays">

              </div>
              {error&&<div className="auth-error" role="alert">{error}</div>}
              <button className="auth-btn" onClick={handleLogin} disabled={loading} aria-busy={loading}>{loading?'Connexion…':'Se connecter →'}</button>

              <div className="auth-switch">Pas encore de compte ? <button onClick={()=>switchTab('signup')}>Créer un compte</button></div>
            </>
          )}
        </div>
      </div>
    </Portal>
  )

async function sq(t,p){const r=await fetch(SUPABASE_URL+'/rest/v1/'+t+(p||''),{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});return r.json()}

const SOURCE_LABEL={'wfp_hdx':'WFP','auchan_scrape':'Auchan','fao_giews':'FAO','manual':'Manuel','senpoisson_scrape':'SenPoisson','thiaroye_scrape':'Thiaroye','parknadio_scrape':'Park Nadio'}
const CAT_LABEL={'cereals and tubers':'Cereales','pulses and nuts':'Legumineuses','vegetables':'Legumes','fruits and vegetables':'Fruits & Legumes','fruits':'Fruits','livestock':'Betail','fish':'Poisson','seafood':'Fruits de mer','meat':'Viande','poultry':'Volaille'}
const NAMES_FR={'Millet':'Mil','Rice (imported)':'Riz importe','Rice (local)':'Riz local','Rice (ordinary, first quality)':'Riz 1ere qualite','Rice (ordinary, second quality)':'Riz 2eme qualite','Rice (broken)':'Riz brise','Rice (broken, imported)':'Riz brise importe','Maize (imported)':'Mais importe','Maize (local)':'Mais local','Sorghum':'Sorgho','Sorghum (imported)':'Sorgho importe','Beans (niebe)':'Niebe','Groundnuts (shelled)':'Arachides decortiquees','Groundnuts (unshelled)':'Arachides non decortiquees','Tomatoes':'Tomates','Onions':'Oignons','Onions (imported)':'Oignons importes','Potatoes':'Pommes de terre','Beef (with bones)':'Boeuf (avec os)','Beaf meet (with bones)':'Boeuf (avec os)','Sugar':'Sucre','Vegetable oil':'Huile vegetale'}
function fr(n){return NAMES_FR[n]||n}

const SS={0:{r:false,h:false},1:{r:false,h:false},2:{r:false,h:false},3:{r:false,h:false},4:{r:false,h:false,l:true},5:{r:true,h:false,l:true},6:{r:true,h:false},7:{r:true,h:false},8:{r:true,h:false},9:{r:false,h:true},10:{r:false,h:true},11:{r:false,h:true}}
const TAB=new Date('2026-05-27'),RAM_S=new Date('2026-02-17'),RAM_E=new Date('2026-03-18')
function nearTab(d,w=6){const diff=(TAB-d)/86400000;return diff>0&&diff<w*7}
function inRam(d){return d>=RAM_S&&d<=RAM_E}
function gsf(cat,m){
  const s=SS[m]||{}
  if(cat==='cereals and tubers'){if(s.l)return{pct:12,dir:'up',driver:'Soudure (stocks bas)',conf:78};if(s.r)return{pct:6,dir:'up',driver:'Pluies limitent transport',conf:65};if(s.h)return{pct:-15,dir:'down',driver:'Arrivee des recoltes',conf:85};return{pct:-3,dir:'stable',driver:'Saison seche stable',conf:60}}
  if(cat==='pulses and nuts'){if(s.l)return{pct:8,dir:'up',driver:'Soudure (stocks reduits)',conf:72};if(s.h)return{pct:-12,dir:'down',driver:'Recolte arachides',conf:80};if(s.r)return{pct:4,dir:'up',driver:'Acces reduit marches',conf:60};return{pct:0,dir:'stable',driver:'Periode stable',conf:55}}
  if(cat==='vegetables'){if(s.r)return{pct:18,dir:'up',driver:'Pluies reduisent offre',conf:75};if(s.h)return{pct:-20,dir:'down',driver:'Pic production Niayes',conf:88};return{pct:5,dir:'stable',driver:'Demande urbaine stable',conf:58}}
  if(cat==='fish'||cat==='seafood'){if(s.r)return{pct:15,dir:'up',driver:'Pluies limitent peche',conf:70};if(m>=1&&m<=4)return{pct:-10,dir:'down',driver:'Haute saison de peche',conf:72};return{pct:3,dir:'stable',driver:'Demande stable poisson',conf:55}}
  if(cat==='meat'||cat==='poultry'){if(nearTab(new Date(new Date().getFullYear(),m,1)))return{pct:25,dir:'up',driver:'Approche de Tabaski',conf:85};if(inRam(new Date(new Date().getFullYear(),m,15)))return{pct:10,dir:'up',driver:'Ramadan',conf:70};return{pct:2,dir:'stable',driver:'Demande stable viande',conf:50}}
  return{pct:0,dir:'stable',driver:'Facteurs saisonniers',conf:50}
}
function histAvg(history,m){const r=history.filter(h=>h.price_date&&new Date(h.price_date).getMonth()===m);return r.length?r.reduce((s,h)=>s+h.price,0)/r.length:null}
function buildPred(cp,cat,history){
  const now=new Date()
  return Array.from({length:3},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i+1,1),m=d.getMonth()
    const sf=gsf(cat,m),ha=histAvg(history,m)
    let pp,conf=sf.conf
    if(ha&&history.length>12){pp=Math.round(ha*0.6+cp*(1+sf.pct/100)*0.4);conf=Math.min(conf+10,92)}
    else pp=Math.round(cp*(1+sf.pct/100))
    const chg=Math.round(((pp-cp)/cp)*100),dir=chg>5?'up':chg<-5?'down':'stable'
    const s=SS[m]||{},facs=[]
    if(s.r)facs.push({name:'Saison des pluies',desc:'Les pluies limitent le transport.',impact:'negative',icon:'🌧'})
    if(s.h)facs.push({name:'Periode de recolte',desc:'Nouvelles recoltes augmentent offre.',impact:'positive',icon:'🌾'})
    if(s.l)facs.push({name:'Periode de soudure',desc:'Les stocks s\'epuisent.',impact:'negative',icon:'📉'})
    if(nearTab(d)&&(cat==='livestock'||cat==='meat'||cat==='poultry'))facs.push({name:'Approche Tabaski',desc:'Forte hausse de la demande.',impact:'negative',icon:'🐑'})
    if(inRam(d))facs.push({name:'Ramadan',desc:'Hausse de consommation.',impact:'negative',icon:'🌙'})
    if(!facs.length)facs.push({name:'Marche stable',desc:'Aucun facteur saisonnier majeur.',impact:'neutral',icon:'📊'})
    return{monthName:d.toLocaleDateString('en-US',{month:'long',year:'numeric'}),pp,chg,dir,conf,driver:sf.driver,facs}
  })
}
function getRec(avg,hist){
  if(!hist||hist.length<6)return{label:'EN ATTENTE',cls:'rec-pending',reason:'Donnees insuffisantes.',reasonCls:'pending'}
  const old=hist.slice(-12,-1).map(h=>h.price),mean=old.reduce((a,b)=>a+b,0)/old.length,pct=((avg-mean)/mean)*100
  if(pct>8)return{label:'VENDRE',cls:'rec-sell',reason:'Prix '+Math.round(pct)+'% au-dessus de la moyenne saisonniere.',reasonCls:'sell'}
  if(pct<-8)return{label:'ATTENDRE',cls:'rec-wait',reason:'Prix '+Math.abs(Math.round(pct))+'% sous la moyenne saisonniere.',reasonCls:'wait'}
  return{label:'VENDRE',cls:'rec-sell',reason:'Prix dans la normale. Bonnes conditions pour vendre.',reasonCls:'sell'}
}
function getTabDays(){const d=Math.ceil((TAB-new Date())/86400000);return d>0&&d<=120?d:null}

function Ticker({prices,commodities}){
  const items=React.useMemo(()=>{
    if(!prices.length||!commodities.length)return[]
    const bc={}
    prices.forEach(p=>{if(!bc[p.commodity_id])bc[p.commodity_id]=[];bc[p.commodity_id].push(p)})
    return Object.entries(bc).slice(0,20).map(([cid,g])=>{
      const c=commodities.find(x=>x.id===parseInt(cid));if(!c)return null
      const avg=Math.round(g.reduce((s,p)=>s+p.price,0)/g.length),sf=gsf(c.category,(new Date().getMonth()+1)%12)
      return{name:fr(c.name_fr),price:avg,unit:c.unit||'kg',dir:sf.dir,pct:sf.pct}
    }).filter(Boolean)
  },[prices,commodities])
  if(!items.length)return null
  const doubled=[...items,...items]
  return(
    <div className="ticker-wrap" aria-hidden="true">
      <div className="ticker-label">COURS</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((it,i)=>(
            <div key={i} className={'ticker-item '+it.dir}>
              <span className="t-name">{it.name}</span>
              <span className="t-price">{it.price.toLocaleString()}</span>
              <span style={{fontSize:9,color:'var(--t5)'}}>FCFA/{it.unit}</span>
              <span className="t-arrow">{it.dir==='up'?'▲':it.dir==='down'?'▼':'—'}</span>
              <span className="t-change">{it.dir==='up'?'+'+it.pct+'%':it.dir==='down'?it.pct+'%':'—'}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

/div><div className="report-notice">Les prix sont verifies avant publication. Numero confidentiel.</div><div className="modal-actions"><button type="button" className="btn-secondary" onClick={onClose}>Annuler</button><button type="button" className="btn-primary" onClick={submit} disabled={!price||!market||submitting} aria-busy={submitting}>{submitting?'Envoi\u2026':'Envoyer'}</button></div></>)}</div></div>)
}

function RevenueCalc({group,unit}){
  const[qty,setQty]=React.useState('')
  const sorted=[...group].sort((a,b)=>b.price-a.price)
  const q=parseFloat(qty),showResults=qty&&q>0
  return(
    <div className="calc-section">
      <div className="calc-label">Calculateur de revenus</div>
      <div className="calc-input-row">
        <input className="calc-input" type="number" min="0" placeholder="Quantite a vendre" value={qty} onChange={e=>setQty(e.target.value)} inputMode="decimal" aria-label="Quantite a vendre"/>
        <span className="calc-unit">{unit||'kg'}</span>
      </div>
      {showResults&&(
        <div className="calc-results">
          {sorted.map((p,i)=>{
            const earning=Math.round(p.price*q),isBest=i===0
            return(
              <div key={p.id} className={'calc-row'+(isBest?' best-market':'')}>
                <div>
                  <div className="calc-market">{p.market_name} · {SOURCE_LABEL[p.source]||p.source}</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--t5)',marginTop:2}}>{Math.round(p.price).toLocaleString()} FCFA/{unit||'kg'}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span className={'calc-earning'+(isBest?' best':'')}>{earning.toLocaleString()} FCFA</span>
                  {isBest&&<span className="calc-best-label">BEST</span>}
                </div>
              </div>
            )
          })}
          {sorted.length>1&&(
            <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--t5)',textAlign:'center',paddingTop:5}}>
              Ecart: <strong style={{color:'var(--t3)'}}>{(Math.round(sorted[0].price*q)-Math.round(sorted[sorted.length-1].price*q)).toLocaleString()} FCFA</strong>
            </div>
          )}
        </div>
      )}
    </div>
  )
}

            <div className="plan-sum">
              <div className="plan-sum-label">Risque prix</div>

            <div className="plan-sum">

            <div className="plan-cal-grid">

                    <div className="plan-cal-bar" style={{height:h+'px',background:isPeak?'var(--gold)':isPlant?'#378ADD':isBuy?'#60A5FA':'var(--ink4)',border:isPeak?'1px solid rgba(240,180,41,0.4)':'none'}}></div>
                    <div className="plan-cal-price" style={{color:isPeak?'var(--gold)':isPlant?'#60A5FA':isBuy?'#60A5FA':'var(--t5)'}}>{p}</div>

                <div className="plan-phase-sub">{crop.growReason}</div>
              </div>
              <div className="plan-phase p-gold">
                <div className="plan-phase-tag">Vendre</div>
                <div className="plan-phase-val">{MONTHS_FR[crop.sellMonths[0]]} – {MONTHS_FR[crop.sellMonths[crop.sellMonths.length-1]]}</div>
                <div className="plan-phase-sub">{crop.sellReason}</div>
              </div>
            </div>
          ):(
            <div className="plan-phases">
              <div className="plan-phase p-blue">
                <div className="plan-phase-tag">Meilleur achat</div>
                <div className="plan-phase-val">Oct – Déc</div>

              <div className="plan-phase p-green">
                <div className="plan-phase-tag">Revente optimale</div>
                <div className="plan-phase-val">{MONTHS_FR[crop.peakMonths[0]]} – {MONTHS_FR[crop.peakMonths[crop.peakMonths.length-1]]}</div>

            </div>

          {mode==='farmer'&&(

                    <div className="plan-calc-label">Cout total (FCFA)</div>

                  <div className="plan-calc-field">
                    <div className="plan-calc-label">Quantite a vendre (kg)</div>
                    <input className="plan-calc-input" type="number" min="0" value={qty} onChange={e=>setQty(e.target.value)} placeholder="ex: 500" inputMode="decimal"/>

                </div>

                  <div className="plan-calc-results">
                    <div className={'plan-calc-res '+(margin>0?'pos':'neg')}>

                    </div>
                    <div className="plan-calc-res neu">
                      <div className="plan-calc-res-label">Prix seuil</div>
                      <div className="plan-calc-res-val gold">{breakeven>0?breakeven+' F/kg':'—'}</div>
                    </div>
                    <div className={'plan-calc-res '+(margin>50?'pos':margin>0?'neu':'neg')}>
                      <div className="plan-calc-res-label">Marge estimee</div>
                      <div className={'plan-calc-res-val '+(margin>50?'green':margin>0?'gold':'red')}>{margin!==0?'+'+margin+'%':'—'}</div>
                    </div>
                  </div>
                )}
              </div>
            </>
          )}

          <div className="plan-two-col">
            <div className="plan-block">
              <div className="plan-block-title">
                {mode==='farmer'?'Meilleur marche pour vendre':'Meilleur marche pour acheter'}
