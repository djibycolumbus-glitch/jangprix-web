<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jàng Prix — Prix Agricoles Dakar</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #0F172A;
      --bg-end: #1E293B;
      --card-start: #1E293B;
      --card-end: #0F172A;
      --text-primary: #F8FAFC;
      --text-secondary: #CBD5E1;
      --text-muted: #94A3B8;
      --up: #22C55E;
      --down: #EF4444;
      --stable: #FACC15;
      --accent: #FACC15;
      --border: rgba(248,250,252,0.08);
      --border-hover: rgba(250,203,21,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
    }
    .logo-block { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--stable), #F59E0B);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px; color: #0F172A;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 15px rgba(250,204,21,0.4);
    }
    .logo-name {
      font-size: 20px; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .logo-name span { color: var(--stable); }
    .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; color: var(--up);
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(34,197,94,0.1);
      padding: 6px 12px; border-radius: 20px;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--up);
      animation: livePulse 2s infinite;
    }
    @keyframes livePulse {
      0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)}
      50%{opacity:0.7;box-shadow:0 0 0 6px rgba(34,197,94,0)}
    }
    .header-date { font-size: 12px; color: var(--text-muted); }
    .header-zone { font-size: 12px; color: rgba(148,163,184,0.6); }

    /* ── TABASKI BANNER ── */
    .tabaski-banner {
      background: linear-gradient(90deg, rgba(250,204,21,0.1), rgba(245,158,11,0.08), rgba(250,204,21,0.1));
      border-bottom: 1px solid rgba(250,204,21,0.2);
      padding: 10px 32px;
    }
    .tabaski-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .tabaski-label {
      font-size: 10px; font-weight: 800; color: var(--stable);
      text-transform: uppercase; letter-spacing: 1.5px;
      background: rgba(250,204,21,0.12); padding: 3px 10px;
      border-radius: 20px; border: 1px solid rgba(250,204,21,0.25);
    }
    .tabaski-days { font-size: 22px; font-weight: 800; color: var(--stable); line-height: 1; }
    .tabaski-jours { font-size: 13px; color: rgba(250,204,21,0.7); }
    .tabaski-tip { font-size: 12px; color: rgba(250,204,21,0.5); }

    /* ── TICKER ── */
    .ticker-wrap {
      background: rgba(15,23,42,0.6);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      padding: 0;
      height: 38px;
      display: flex;
      align-items: center;
    }
    .ticker-label {
      background: linear-gradient(135deg, var(--stable), #F59E0B);
      color: #0F172A;
      font-size: 10px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0 14px;
      height: 100%;
      display: flex; align-items: center;
      flex-shrink: 0;
      z-index: 2;
    }
    .ticker-track-wrap {
      flex: 1; overflow: hidden; position: relative;
    }
    .ticker-track-wrap::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 40px;
      background: linear-gradient(to right, rgba(15,23,42,0.9), transparent);
      z-index: 1; pointer-events: none;
    }
    .ticker-track-wrap::after {
      content: '';
      position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
      background: linear-gradient(to left, rgba(15,23,42,0.9), transparent);
      z-index: 1; pointer-events: none;
    }
    .ticker-track {
      display: flex;
      animation: tickerScroll 40s linear infinite;
      width: max-content;
    }
    .ticker-track:hover { animation-play-state: paused; }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-item {
      display: flex; align-items: center; gap: 6px;
      padding: 0 20px;
      font-size: 12px; font-weight: 600;
      white-space: nowrap;
      border-right: 1px solid var(--border);
      height: 38px;
    }
    .ticker-item .t-name { color: var(--text-secondary); }
    .ticker-item .t-price { color: var(--text-primary); font-weight: 700; }
    .ticker-item .t-arrow { font-size: 11px; }
    .ticker-item.up .t-arrow, .ticker-item.up .t-change { color: var(--up); }
    .ticker-item.down .t-arrow, .ticker-item.down .t-change { color: var(--down); }
    .ticker-item.stable .t-arrow, .ticker-item.stable .t-change { color: var(--stable); }
    .ticker-item .t-change { font-size: 11px; }

    /* ── STATS BAR ── */
    .stats-bar {
      background: rgba(30,41,59,0.5);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }
    .stats-inner { max-width:1400px; margin:0 auto; display:flex; flex-wrap:wrap; }
    .stat-item { padding: 16px 48px 16px 0; position: relative; }
    .stat-item:not(:last-child)::after {
      content:''; position:absolute; right:24px; top:50%;
      transform:translateY(-50%); width:1px; height:24px;
      background: var(--border);
    }
    .stat-value {
      font-size: 26px; font-weight: 800; color: var(--stable);
      line-height: 1; letter-spacing: -0.5px;
    }
    .stat-label {
      font-size: 11px; color: var(--text-muted);
      margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500;
    }

    /* ── MAIN ── */
    .main { max-width: 1400px; margin: 0 auto; padding: 32px; }

    .page-header { margin-bottom: 28px; }
    .page-title {
      font-size: 28px; font-weight: 800; color: var(--text-primary);
      letter-spacing: -0.8px; line-height: 1.2;
    }
    .page-title span { color: var(--stable); }
    .page-sub { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

    /* ── SEARCH & FILTERS ── */
    .search-filter-row {
      display: flex; gap: 14px; margin-bottom: 28px;
      flex-wrap: wrap; align-items: flex-start;
    }
    .search-wrap { position: relative; flex: 1; min-width: 280px; }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px; pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(30,41,59,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(8px);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: rgba(250,204,21,0.5);
      box-shadow: 0 0 0 3px rgba(250,204,21,0.08);
    }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-tab {
      padding: 9px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(30,41,59,0.6);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .cat-tab:hover {
      border-color: rgba(250,204,21,0.4);
      color: var(--stable);
      background: rgba(250,204,21,0.06);
      transform: scale(1.03);
      box-shadow: 0 0 12px rgba(250,204,21,0.15);
    }
    .cat-tab.active {
      background: linear-gradient(135deg, var(--stable), #F59E0B);
      color: #0F172A;
      border-color: transparent;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(250,204,21,0.35);
    }

    /* ── LOADING ── */
    .loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:100px; color:var(--text-muted); }
    .spinner {
      width:36px; height:36px;
      border:2px solid var(--border);
      border-top-color: var(--stable);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── COMMODITY GRID ── */
    .commodity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    /* ── COMMODITY CARD ── */
    .commodity-card {
      background: linear-gradient(135deg, var(--card-start) 0%, var(--card-end) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .commodity-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(250,204,21,0.3), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .commodity-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(250,203,21,0.5);
      border-color: rgba(250,204,21,0.35);
    }
    .commodity-card:hover::before { opacity: 1; }
    .commodity-card.selected {
      border-color: rgba(250,204,21,0.5);
      box-shadow: 0 8px 30px rgba(250,203,21,0.4);
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; gap:10px; }
    .card-cat-chip {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      background: rgba(148,163,184,0.1); padding: 3px 9px;
      border-radius: 20px; border: 1px solid var(--border);
      display: inline-block; margin-bottom: 6px;
    }
    .card-name {
      font-size: 17px; font-weight: 700;
      color: var(--text-primary); line-height: 1.2;
    }
    .card-markets { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .rec-badge {
      font-size: 10px; font-weight: 800;
      padding: 4px 11px; border-radius: 20px;
      flex-shrink: 0; white-space: nowrap;
      letter-spacing: 0.6px; text-transform: uppercase;
    }
    .rec-sell {
      background: rgba(34,197,94,0.15);
      color: var(--up);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .rec-wait {
      background: rgba(239,68,68,0.15);
      color: var(--down);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .rec-pending {
      background: rgba(250,204,21,0.1);
      color: var(--stable);
      border: 1px solid rgba(250,204,21,0.2);
    }

    /* Price */
    .price-block { margin-bottom: 14px; }
    .price-row { display:flex; align-items:center; gap:10px; margin-bottom:3px; flex-wrap:wrap; }
    .price-value {
      font-size: 32px; font-weight: 800;
      color: var(--text-primary); line-height: 1;
      letter-spacing: -1px;
    }
    .price-trend-arrow {
      font-size: 20px; font-weight: 800;
      line-height: 1;
    }
    .price-trend-arrow.up { color: var(--up); }
    .price-trend-arrow.down { color: var(--down); }
    .price-trend-arrow.stable { color: var(--stable); }
    .price-meta { font-size: 13px; color: var(--text-muted); }
    .price-prev { font-size: 12px; color: #94A3B8; margin-top: 2px; text-decoration: line-through; }

    /* Reason */
    .rec-reason {
      font-size: 12px; line-height: 1.5;
      padding: 9px 13px; border-radius: 8px;
      margin-bottom: 12px;
    }
    .rec-reason.sell { background:rgba(34,197,94,0.08); border-left:2px solid var(--up); color:rgba(34,197,94,0.9); }
    .rec-reason.wait { background:rgba(239,68,68,0.08); border-left:2px solid var(--down); color:rgba(239,68,68,0.9); }
    .rec-reason.pending { background:rgba(250,204,21,0.07); border-left:2px solid var(--stable); color:rgba(250,204,21,0.8); }

    /* Prediction pill */
    .pred-summary {
      font-size: 12px; padding: 7px 12px;
      border-radius: 8px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px; font-weight: 500;
    }
    .pred-summary.up { background:rgba(239,68,68,0.08); color:rgba(239,68,68,0.9); border:1px solid rgba(239,68,68,0.15); }
    .pred-summary.down { background:rgba(34,197,94,0.08); color:rgba(34,197,94,0.9); border:1px solid rgba(34,197,94,0.15); }
    .pred-summary.stable { background:rgba(250,204,21,0.07); color:rgba(250,204,21,0.85); border:1px solid rgba(250,204,21,0.15); }

    /* Sources table */
    .sources-divider { height:1px; background:var(--border); margin-bottom:12px; }
    .sources-table { width:100%; border-collapse:collapse; margin-bottom:12px; }
    .sources-table td { padding:5px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.04); }
    .sources-table tr:last-child td { border-bottom:none; }
    .td-source { color:var(--text-muted); width:70px; font-weight:600; }
    .td-market { color:var(--text-secondary); }
    .td-price { color:var(--text-primary); font-weight:700; text-align:right; }
    .td-type { text-align:right; }
    .type-tag {
      font-size:10px; color:var(--text-muted);
      background:rgba(148,163,184,0.1); padding:2px 7px;
      border-radius:20px; border:1px solid var(--border);
    }
    .card-date { font-size:11px; color:rgba(148,163,184,0.5); margin-bottom:14px; }

    /* Card buttons */
    .card-actions { display:flex; flex-direction:column; gap:7px; }
    .voir-btn {
      width:100%; padding:10px;
      border-radius:9px;
      font-family:'Inter',sans-serif;
      font-size:13px; font-weight:600;
      cursor:pointer;
      transition:all 0.2s;
      border:1px solid var(--border);
      background:rgba(30,41,59,0.6);
      color:var(--text-muted);
    }
    .voir-btn:hover {
      border-color:rgba(250,204,21,0.4);
      color:var(--stable);
      background:rgba(250,204,21,0.07);
      box-shadow:0 0 12px rgba(250,204,21,0.15);
    }
    .voir-btn.active {
      background:linear-gradient(135deg, var(--stable), #F59E0B);
      color:#0F172A; border-color:transparent;
      box-shadow:0 4px 15px rgba(250,204,21,0.35);
    }
    .report-btn {
      width:100%; padding:8px;
      border-radius:9px;
      font-family:'Inter',sans-serif;
      font-size:12px; font-weight:500;
      cursor:pointer;
      transition:all 0.2s;
      border:1px solid var(--border);
      background:transparent; color:var(--text-muted);
    }
    .report-btn:hover { border-color:rgba(250,204,21,0.3); color:var(--stable); background:rgba(250,204,21,0.05); }

    /* ── REVENUE CALCULATOR ── */
    .calc-section { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
    .calc-label { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px; }
    .calc-input-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .calc-input {
      flex:1; padding:8px 11px;
      background:rgba(15,23,42,0.6); border:1px solid var(--border);
      border-radius:8px; color:var(--text-primary);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; min-width:0;
      transition:border-color 0.2s;
    }
    .calc-input:focus { border-color:rgba(250,204,21,0.4); }
    .calc-unit { font-size:12px; color:var(--text-muted); white-space:nowrap; }
    .calc-results { display:flex; flex-direction:column; gap:6px; }
    .calc-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 12px; background:rgba(15,23,42,0.5);
      border-radius:8px; border:1px solid var(--border);
    }
    .calc-row.best-market { border-color:rgba(34,197,94,0.3); background:rgba(34,197,94,0.06); }
    .calc-market { font-size:12px; color:var(--text-secondary); }
    .calc-earning { font-size:14px; font-weight:700; color:var(--text-primary); }
    .calc-earning.best { color:var(--up); }
    .calc-best-label { font-size:10px; font-weight:700; color:var(--up); background:rgba(34,197,94,0.1); padding:2px 7px; border-radius:20px; }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.98));
      border: 1px solid rgba(250,204,21,0.2);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 40px;
      box-shadow: 0 8px 40px rgba(250,203,21,0.08);
      animation: fadeUp 0.25s ease both;
      backdrop-filter: blur(10px);
    }
    .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:14px; }
    .detail-title { font-size:20px; font-weight:800; color:var(--text-primary); letter-spacing:-0.5px; }
    .detail-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
    .detail-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .detail-tab {
      padding:7px 16px; border-radius:20px;
      border:1px solid var(--border);
      background:rgba(30,41,59,0.6); color:var(--text-muted);
      font-size:12px; font-weight:600; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all 0.2s;
    }
    .detail-tab:hover { border-color:rgba(250,204,21,0.4); color:var(--stable); }
    .detail-tab.active { background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; border-color:transparent; box-shadow:0 4px 12px rgba(250,204,21,0.3); }

    .market-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
    .mkt-btn {
      padding:5px 14px; border-radius:20px;
      border:1px solid var(--border); background:rgba(30,41,59,0.6);
      color:var(--text-muted); font-size:11px; font-weight:600;
      cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s;
    }
    .mkt-btn:hover { border-color:rgba(250,204,21,0.3); color:var(--stable); }
    .mkt-btn.active { background:rgba(250,204,21,0.12); color:var(--stable); border-color:rgba(250,204,21,0.3); }

    /* Prediction months */
    .pred-months { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
    .pred-month-card {
      background:rgba(15,23,42,0.6); border:1px solid var(--border);
      border-radius:12px; padding:16px; transition:border-color 0.2s;
    }
    .pred-month-card:hover { border-color:rgba(250,204,21,0.25); }
    .pred-month-name { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px; }
    .pred-month-price { font-size:22px; font-weight:800; margin-bottom:4px; line-height:1; letter-spacing:-0.5px; }
    .pred-month-price.up { color:var(--down); }
    .pred-month-price.down { color:var(--up); }

const SOURCE_LABEL={'wfp_hdx':'WFP','auchan_scrape':'Auchan','fao_giews':'FAO','manual':'Manuel','senpoisson_scrape':'SenPoisson','thiaroye_scrape':'Thiaroye','parknadio_scrape':'Park Nadio'}
const CAT_LABEL={'cereals and tubers':'Céréales','pulses and nuts':'Légumineuses','vegetables':'Légumes','fruits and vegetables':'Fruits & Légumes','fruits':'Fruits','livestock':'Bétail','fish':'Poisson','seafood':'Fruits de mer','meat':'Viande','poultry':'Volaille'}
const NAMES_FR={
  'Millet':'Mil','Rice (imported)':'Riz importé','Rice (local)':'Riz local',
  'Rice (ordinary, first quality)':'Riz 1ère qualité','Rice (ordinary, second quality)':'Riz 2ème qualité',
  'Rice (broken)':'Riz brisé','Rice (broken, imported)':'Riz brisé importé',
  'Maize (imported)':'Maïs importé','Maize (local)':'Maïs local',
  'Sorghum':'Sorgho','Sorghum (imported)':'Sorgho importé',
  'Beans (niebe)':'Niébé','Groundnuts (shelled)':'Arachides décortiquées',
  'Groundnuts (unshelled)':'Arachides non décortiquées','Tomatoes':'Tomates',
  'Onions':'Oignons','Onions (imported)':'Oignons importés',
  'Potatoes':'Pommes de terre','Beef (with bones)':'Bœuf (avec os)',
  'Beaf meet (with bones)':'Bœuf (avec os)','Sugar':'Sucre','Vegetable oil':'Huile végétale'
}
function fr(n){return NAMES_FR[n]||n}

const SENEGAL_SEASONS={0:{rain:false,harvest:false},1:{rain:false,harvest:false},2:{rain:false,harvest:false},3:{rain:false,harvest:false},4:{rain:false,harvest:false,lean:true},5:{rain:true,harvest:false,lean:true},6:{rain:true,harvest:false},7:{rain:true,harvest:false},8:{rain:true,harvest:false},9:{rain:false,harvest:true},10:{rain:false,harvest:true},11:{rain:false,harvest:true}}
const TABASKI_2026=new Date('2026-06-27')
const RAMADAN_2026_START=new Date('2026-02-17')
const RAMADAN_2026_END=new Date('2026-03-18')
function isNearTabaski(d,w=6){const diff=(TABASKI_2026-d)/86400000;return diff>0&&diff<w*7}
function isRamadan(d){return d>=RAMADAN_2026_START&&d<=RAMADAN_2026_END}

function getCategorySeasonalFactor(category,month){
  const s=SENEGAL_SEASONS[month]||{}
  if(category==='cereals and tubers'){
    if(s.lean)return{pct:+12,driver:'Soudure (stocks bas)',direction:'up',confidence:78}
    if(s.rain)return{pct:+6,driver:'Pluies limitent transport',direction:'up',confidence:65}
    if(s.harvest)return{pct:-15,driver:'Arrivée des récoltes',direction:'down',confidence:85}
    return{pct:-3,driver:'Saison sèche stable',direction:'stable',confidence:60}
  }
  if(category==='pulses and nuts'){
    if(s.lean)return{pct:+8,driver:'Soudure (stocks réduits)',direction:'up',confidence:72}
    if(s.harvest)return{pct:-12,driver:'Récolte d\'arachides',direction:'down',confidence:80}
    if(s.rain)return{pct:+4,driver:'Accès réduit aux marchés',direction:'up',confidence:60}
    return{pct:0,driver:'Période stable',direction:'stable',confidence:55}
  }
  if(category==='vegetables'){
    if(s.rain)return{pct:+18,driver:'Pluies réduisent l\'offre maraîchère',direction:'up',confidence:75}
    if(s.harvest)return{pct:-20,driver:'Pic de production Niayes',direction:'down',confidence:88}
    return{pct:+5,driver:'Demande urbaine stable',direction:'stable',confidence:58}
  }
  if(category==='fish'||category==='seafood'){
    if(s.rain)return{pct:+15,driver:'Pluies limitent la pêche artisanale',direction:'up',confidence:70}
    if(month>=1&&month<=4)return{pct:-10,driver:'Haute saison de pêche',direction:'down',confidence:72}
    return{pct:+3,driver:'Demande stable en poisson',direction:'stable',confidence:55}
  }
  if(category==='meat'||category==='poultry'){
    if(isNearTabaski(new Date(new Date().getFullYear(),month,1)))return{pct:+25,driver:'Approche de Tabaski',direction:'up',confidence:85}
    if(isRamadan(new Date(new Date().getFullYear(),month,15)))return{pct:+10,driver:'Ramadan',direction:'up',confidence:70}
    return{pct:+2,driver:'Demande stable en viande',direction:'stable',confidence:50}
  }
  return{pct:0,driver:'Facteurs saisonniers',direction:'stable',confidence:50}
}

function getHistoricalSeasonalAvg(history,targetMonth){
  const r=history.filter(h=>h.price_date&&new Date(h.price_date).getMonth()===targetMonth)
  return r.length?r.reduce((s,h)=>s+h.price,0)/r.length:null
}

function buildPrediction(currentPrice,category,history){
  const now=new Date()
  return Array.from({length:3},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i+1,1)
    const m=d.getMonth()
    const monthName=d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
    const seasonal=getCategorySeasonalFactor(category,m)
    const histAvg=getHistoricalSeasonalAvg(history,m)
    let predictedPrice,confidence=seasonal.confidence
    if(histAvg&&history.length>12){
      predictedPrice=Math.round(histAvg*0.6+currentPrice*(1+seasonal.pct/100)*0.4)
      confidence=Math.min(seasonal.confidence+10,92)
    } else {
      predictedPrice=Math.round(currentPrice*(1+seasonal.pct/100))
    }
    const changePct=Math.round(((predictedPrice-currentPrice)/currentPrice)*100)
    const direction=changePct>5?'up':changePct<-5?'down':'stable'
    const s=SENEGAL_SEASONS[m]||{}
    const factors=[]
    if(s.rain)factors.push({name:'Saison des pluies',desc:'Les pluies limitent le transport et réduisent l\'offre.',impact:'negative',icon:'🌧'})
    if(s.harvest)factors.push({name:'Période de récolte',desc:'Nouvelles récoltes augmentent l\'offre.',impact:'positive',icon:'🌾'})
    if(s.lean)factors.push({name:'Période de soudure',desc:'Les stocks s\'épuisent.',impact:'negative',icon:'📉'})
    if(isNearTabaski(d)&&(category==='livestock'||category==='meat'||category==='poultry'))factors.push({name:'Approche de Tabaski',desc:'Forte hausse de la demande.',impact:'negative',icon:'🐑'})
    if(isRamadan(d))factors.push({name:'Ramadan',desc:'Hausse de consommation.',impact:'negative',icon:'🌙'})
    if(!factors.length)factors.push({name:'Marché stable',desc:'Aucun facteur saisonnier majeur.',impact:'neutral',icon:'📊'})
    return{monthName,predictedPrice,changePct,direction,confidence,driver:seasonal.driver,factors}
  })
}

function getRec(avg,hist){
  if(!hist||hist.length<6)return{label:'EN ATTENTE',cls:'rec-pending',reason:'Données insuffisantes pour une recommandation.',reasonCls:'pending'}
  const old=hist.slice(-12,-1).map(h=>h.price)
  const mean=old.reduce((a,b)=>a+b,0)/old.length
  const pct=((avg-mean)/mean)*100
  if(pct>8)return{label:'VENDRE',cls:'rec-sell',reason:'Prix '+Math.round(pct)+'% au-dessus de la moyenne saisonnière.',reasonCls:'sell'}
  if(pct<-8)return{label:'ATTENDRE',cls:'rec-wait',reason:'Prix '+Math.abs(Math.round(pct))+'% sous la moyenne saisonnière.',reasonCls:'wait'}
  return{label:'VENDRE',cls:'rec-sell',reason:'Prix dans la normale saisonnière. Bonnes conditions pour vendre.',reasonCls:'sell'}
}

function getTabaski(){
  const d=Math.ceil((TABASKI_2026-new Date())/86400000)
  return d>0&&d<=120?d:null
}

/* ── TICKER ── */
function Ticker({prices,commodities}){
  const items=React.useMemo(()=>{
    if(!prices.length||!commodities.length)return[]
    const byCom={}
    prices.forEach(p=>{
      if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]
      byCom[p.commodity_id].push(p)
    })
    return Object.entries(byCom).slice(0,20).map(([cid,group])=>{
      const c=commodities.find(x=>x.id===parseInt(cid))
      if(!c)return null
      const avg=Math.round(group.reduce((s,p)=>s+p.price,0)/group.length)
      const seasonal=getCategorySeasonalFactor(c.category,(new Date().getMonth()+1)%12)
      return{name:fr(c.name_fr),price:avg,unit:c.unit||'kg',direction:seasonal.direction,pct:seasonal.pct}
    }).filter(Boolean)
  },[prices,commodities])

  if(!items.length)return null

  const doubled=[...items,...items]

  return(
    <div className="ticker-wrap">
      <div className="ticker-label">MARCHÉS</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item,i)=>(
            <div key={i} className={'ticker-item '+item.direction}>
              <span className="t-name">{item.name}</span>
              <span className="t-price">{item.price.toLocaleString('fr-FR')}</span>
              <span className="t-meta" style={{fontSize:10,color:'rgba(148,163,184,0.5)'}}>FCFA/{item.unit}</span>
              <span className="t-arrow">{item.direction==='up'?'▲':item.direction==='down'?'▼':'—'}</span>
              <span className="t-change">{item.direction==='up'?'+'+item.pct+'%':item.direction==='down'?item.pct+'%':'stable'}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

/* ── PREDICTION TAB ── */
function PredictionTab({commodity,currentPrice,history}){
  const months=buildPrediction(currentPrice,commodity.category,history)
  return(
    <div>
      <div className="pred-months">
        {months.map((m,i)=>(
          <div key={i} className="pred-month-card">
            <div className="pred-month-name">{m.monthName}</div>
            <div className={'pred-month-price '+m.direction}>{m.predictedPrice.toLocaleString('fr-FR')} FCFA</div>
            <div className={'pred-month-change '+m.direction}>
              {m.direction==='up'?'▲ +'+m.changePct+'%':m.direction==='down'?'▼ '+m.changePct+'%':'→ Stable (±'+Math.abs(m.changePct)+'%)'}
            </div>
            <div className="pred-month-driver">{m.driver}</div>
            <div className="pred-confidence">
              <div className="pred-conf-bar-wrap"><div className="pred-conf-bar" style={{width:m.confidence+'%'}}/></div>
              <span className="pred-conf-label">Fiabilité {m.confidence}%</span>
            </div>
          </div>
        ))}
      </div>
      <div className="pred-factors">
        <div className="pred-factors-title">Facteurs — mois prochain</div>
        {months[0].factors.map((f,i)=>(
          <div key={i} className="factor-row">
            <div className={'factor-icon '+f.impact}>{f.icon}</div>
            <div>
              <div className="factor-name">{f.name}</div>
              <div className="factor-desc">{f.desc}</div>
              <div className={'factor-impact '+f.impact}>
                {f.impact==='positive'?'↓ Impact positif':f.impact==='negative'?'↑ Impact négatif':'→ Impact neutre'}
              </div>
            </div>
          </div>
        ))}
      </div>
      <div className="pred-disclaimer">Prévisions basées sur WFP VAM (2000–2025), cycles saisonniers et calendrier agricole sénégalais. Indicatif uniquement.</div>
    </div>
  )
}

/* ── DETAIL PANEL ── */
function DetailPanel({selected,history,histLoading}){
  const[activeTab,setActiveTab]=React.useState('predict')
  const[marketFilter,setMarketFilter]=React.useState('all')
  const markets=[...new Set((selected.group||[]).map(p=>p.market_name).filter(Boolean))]
  const filteredGroup=(selected.group||[]).filter(p=>marketFilter==='all'||p.market_name===marketFilter)
  const filteredHistory=history.filter(p=>marketFilter==='all'||p.market_name===marketFilter)
  const sortedGroup=[...filteredGroup].sort((a,b)=>a.price-b.price)
  const min=sortedGroup[0]?.price||0, max=sortedGroup[sortedGroup.length-1]?.price||0
  const avg=filteredGroup.reduce((s,p)=>s+p.price,0)/(filteredGroup.length||1)
  const monthlyMap={}
  filteredHistory.forEach(h=>{const m=h.price_date&&h.price_date.slice(0,7);if(!monthlyMap[m])monthlyMap[m]=[];monthlyMap[m].push(h.price)})
  const monthly=Object.entries(monthlyMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12).map(([month,prices])=>({month,avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length)}))
  const fmtMonth=m=>{if(!m)return'';const[y,mo]=m.split('-');return['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][parseInt(mo)-1]+' '+y}
  return(
    <div className="detail-panel">
      <div className="detail-header">
        <div>
          <div className="detail-title">{fr(selected.commodity.name_fr)}</div>
          <div className="detail-sub">{markets.length} marché(s) · {history.length} enregistrements historiques</div>
        </div>
        <div className="detail-tabs">
          {[['predict','Prévision 3 mois'],['compare','Comparer marchés'],['years','Années'],['trend','Tendance'],['history','Historique']].map(([k,l])=>(
            <button type="button" key={k} className={'detail-tab'+(activeTab===k?' active':'')} onClick={e=>{e.preventDefault();setActiveTab(k)}}>{l}</button>
          ))}
        </div>
      </div>
      {markets.length>1&&(
        <div className="market-filter">
          <button type="button" className={'mkt-btn'+(marketFilter==='all'?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter('all')}}>Tous</button>
          {markets.map(m=><button type="button" key={m} className={'mkt-btn'+(marketFilter===m?' active':'')} onClick={e=>{e.preventDefault();setMarketFilter(m)}}>{m}</button>)}
        </div>
      )}
      {activeTab==='predict'&&(histLoading?<div className="no-data"><div className="spinner" style={{margin:'0 auto 12px'}}></div>Chargement...</div>:<PredictionTab commodity={selected.commodity} currentPrice={avg} history={filteredHistory}/>)}
      {activeTab==='compare'&&(filteredGroup.length<2?<div className="no-data">Un seul marché disponible.</div>:(
        <>
          <div className="comparison-list">
            {sortedGroup.map(p=>{
              const pct=max>min?((p.price-min)/(max-min))*100:50
              return(
                <div key={p.id} className="comparison-row">
                  <div className="comp-market">
                    <span className="comp-market-name">{p.market_name}</span>
                    <span className="comp-source-tag">{SOURCE_LABEL[p.source]||p.source} · {p.price_type==='retail'?'Détail':'Gros'}</span>
                  </div>
                  <div className="comp-bar-wrap"><div className="comp-bar" style={{width:Math.max(pct,5)+'%',background:p.price===min?'#22C55E':p.price===max?'#EF4444':'#FACC15'}}/></div>
                  <div className="comp-price-wrap">
                    <span className="comp-price">{Math.round(p.price).toLocaleString('fr-FR')} F</span>
                    {p.price===min&&<span className="comp-tag best">Meilleur</span>}
                    {p.price===max&&<span className="comp-tag worst">Plus cher</span>}
                  </div>
                </div>
              )
            })}
          </div>
          <div className="insight-box">Écart de <strong>{Math.round(max-min).toLocaleString('fr-FR')} FCFA/{selected.commodity.unit||'kg'}</strong> entre {sortedGroup[0].market_name} et {sortedGroup[sortedGroup.length-1].market_name}.</div>
        </>
      ))}
      {activeTab==='years'&&(histLoading?<div className="no-data"><div className="spinner" style={{margin:'0 auto 12px'}}></div>Chargement...</div>:filteredHistory.length===0?<div className="no-data">Pas de données historiques.</div>:(()=>{
        const now=new Date(),cy=now.getFullYear(),cm=now.getMonth()
        const byYear={}
        filteredHistory.forEach(h=>{if(!h.price_date)return;const d=new Date(h.price_date),y=d.getFullYear(),m=d.getMonth();if(m>cm)return;if(!byYear[y])byYear[y]=[];byYear[y].push(h.price)})
        const years=Object.entries(byYear).filter(([y])=>parseInt(y)>=cy-5).sort((a,b)=>b[0]-a[0]).map(([year,prices])=>({year:parseInt(year),avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length),count:prices.length}))
        if(years.length<2)return <div className="no-data">Pas assez de données.</div>
        const cyd=years.find(y=>y.year===cy),lyd=years.find(y=>y.year===cy-1)
        return(
          <div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>{years.length} années disponibles</div>
            <div className="year-comp-grid">
              {years.map(y=>{
                const isCurrent=y.year===cy
                const vsNow=cyd&&!isCurrent?Math.round(((cyd.avg-y.avg)/y.avg)*100):null
                const dir=vsNow===null?'same':vsNow>5?'higher':vsNow<-5?'lower':'same'
                return(
                  <div key={y.year} className={'year-comp-card'+(isCurrent?' current-year':'')}>
                    <div className="year-label">{y.year}{isCurrent?' (en cours)':''}</div>
                    <div className="year-price">{y.avg.toLocaleString('fr-FR')} FCFA</div>
                    <div className={'year-vs-now '+dir}>{vsNow===null?'Année en cours':vsNow>0?'Cette année: +'+vsNow+'%':vsNow<0?'Cette année: '+vsNow+'%':'Similaire'}</div>
                    <div className="year-months">{y.count} relevés</div>
                  </div>
                )
              })}
            </div>
            {cyd&&lyd&&<div className="year-insight">{cyd.avg>lyd.avg?<span><strong>{fr(selected.commodity.name_fr)}</strong> est <strong style={{color:'#EF4444'}}>+{Math.round(((cyd.avg-lyd.avg)/lyd.avg)*100)}% plus cher</strong> cette année vs {cy-1}.</span>:cyd.avg<lyd.avg?<span><strong>{fr(selected.commodity.name_fr)}</strong> est <strong style={{color:'#22C55E'}}>{Math.round(((lyd.avg-cyd.avg)/lyd.avg)*100)}% moins cher</strong> cette année vs {cy-1}.</span>:<span>Prix similaires à l'an dernier.</span>}</div>}
          </div>
        )
      })())}
      {activeTab==='trend'&&(histLoading?<div className="no-data"><div className="spinner" style={{margin:'0 auto 12px'}}></div>Chargement...</div>:monthly.length===0?<div className="no-data">Pas de données.</div>:(
        <table className="trend-table">
          <thead><tr><th>Mois</th><th>Prix moyen</th><th>Variation</th><th>Marchés</th></tr></thead>
          <tbody>
            {monthly.map((row,i)=>{
              const prev=monthly[i+1],change=prev?Math.round(((row.avg-prev.avg)/prev.avg)*100):null
              const cls=change===null?'flat':change>0?'up':'down'
              const sign=change===null?'—':change>0?'+'+change+'%':change+'%'
              const mktNames=[...new Set(filteredHistory.filter(h=>h.price_date&&h.price_date.startsWith(row.month)).map(h=>h.market_name).filter(Boolean))]
              return(
                <tr key={row.month}>
                  <td>{fmtMonth(row.month)}</td>
                  <td className="trend-price">{row.avg.toLocaleString('fr-FR')} FCFA</td>
                  <td className={'trend-change '+cls}>{sign}</td>
                  <td style={{fontSize:11,color:'var(--text-muted)'}}>{mktNames.join(', ')||'—'}</td>
                </tr>
              )
            })}
          </tbody>
        </table>
      ))}
      {activeTab==='history'&&(histLoading?<div className="no-data"><div className="spinner" style={{margin:'0 auto 12px'}}></div>Chargement...</div>:filteredHistory.length===0?<div className="no-data">Pas d'historique.</div>:(
        <>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>{filteredHistory.length} enregistrements</div>
          <div className="history-wrap">
            <table className="history-table">
              <thead><tr><th>Date</th><th>Marché</th><th>Prix</th><th>Source</th><th>Type</th></tr></thead>
              <tbody>
                {[...filteredHistory].sort((a,b)=>b.price_date.localeCompare(a.price_date)).map((h,i)=>(
                  <tr key={i}>
                    <td>{new Date(h.price_date).toLocaleDateString('fr-FR')}</td>
                    <td>{h.market_name}</td>
                    <td className="h-price">{Math.round(h.price).toLocaleString('fr-FR')} FCFA</td>
                    <td>{SOURCE_LABEL[h.source]||h.source}</td>
                    <td><span className="type-tag">{h.price_type==='retail'?'Détail':'Gros'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      ))}
    </div>
  )
}

function ReportModal({commodity,onClose}){
  const[price,setPrice]=React.useState('')
  const[market,setMarket]=React.useState('')
  const[phone,setPhone]=React.useState('')
  const[notes,setNotes]=React.useState('')
  const[submitting,setSubmitting]=React.useState(false)
  const[success,setSuccess]=React.useState(false)
  const MARKETS=['Thiaroye','Tilène','Dakar','Pikine','Rufisque','Keur Massar','Castors','Gueule Tapée','Soumbédioune','Ouakam','Autre']
  async function handleSubmit(){
    if(!price||!market)return
    setSubmitting(true)
    try{
      await fetch(SUPABASE_URL+'/rest/v1/reports',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({commodity_id:commodity.id,market_name:market,price:parseFloat(price),unit:commodity.unit||'kg',reporter_phone:phone||null,notes:notes||null})})

  return(
    <div className="report-modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="report-modal">
        {success?(
          <div className="report-success">

        ):(
          <>
            <div className="report-modal-title">Signaler un prix</div>
            <div className="report-modal-sub">{fr(commodity.name_fr)} · Partagez le prix observé sur le marché</div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Prix observé</label><input className="form-input" type="number" min="0" placeholder="ex: 350" value={price} onChange={e=>setPrice(e.target.value)}/></div>
              <div className="form-group" style={{maxWidth:80}}><label className="form-label">Unité</label><input className="form-input" value={commodity.unit||'kg'} readOnly style={{color:'var(--text-muted)'}}/></div>
            </div>
            <div className="form-group"><label className="form-label">Marché</label><select className="form-select" value={market} onChange={e=>setMarket(e.target.value)}><option value="">Choisir...</option>{MARKETS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
            <div className="form-group"><label className="form-label">Téléphone (optionnel)</label><input className="form-input" type="tel" placeholder="ex: 77 123 45 67" value={phone} onChange={e=>setPhone(e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Remarques (optionnel)</label><input className="form-input" placeholder="ex: prix de gros, qualité moyenne..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>
            <div className="report-notice">Les prix signalés sont vérifiés avant publication. Votre numéro est confidentiel.</div>
            <div className="modal-actions">
              <button type="button" className="btn-secondary" onClick={onClose}>Annuler</button>
              <button type="button" className="btn-primary" onClick={handleSubmit} disabled={!price||!market||submitting}>{submitting?'Envoi...':'Envoyer'}</button>
            </div>
          </>
        )}
      </div>
    </div>
  )
}

      setCommodities(cd||[])
      setLoading(false)

  },[])

    if(selected&&selected.commodity_id===item.commodity_id){setSelected(null);setHistory([]);return}
    setSelected(item);setHistory([]);setHistLoading(true)
    Promise.all([sq('markets','?select=*'),sq('prices','?commodity_id=eq.'+item.commodity_id+'&order=price_date.desc&limit=500&select=price,price_date,market_id,source,price_type')]).then(([md,pd])=>{

    if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]

        </div>

                  <div className="card-header">
                    <div>
                      <div className="card-cat-chip">{CAT_LABEL[c.category]||c.category}</div>
                      <div className="card-name">{fr(c.name_fr)}</div>
                      <div className="card-markets">{group.map(p=>p.market_name).filter(Boolean).join(', ')}</div>
                    </div>
                    <div className={'rec-badge '+rec.cls}>{rec.label}</div>
                  </div>

                  <div className="price-block">
                    <div className="price-row">
                      <span className="price-value">{Math.round(avg).toLocaleString('fr-FR')}</span>
                      <span className={'price-trend-arrow '+predSummary.direction}>{trendArrow}</span>
                      <div>
                        <div className="price-meta">FCFA / {c.unit||'kg'}</div>
                      </div>
                    </div>
                  </div>

                  <div className={'rec-reason '+rec.reasonCls}>{rec.reason}</div>

                  <div className={'pred-summary '+predSummary.direction}>
                    <span>{predArrow}</span>
                    <span>{predText}</span>
                  </div>

                  <div className="sources-divider"></div>

                  <table className="sources-table">
                    <tbody>
                      {group.map(p=>(
                        <tr key={p.id}>
                          <td className="td-source">{SOURCE_LABEL[p.source]||p.source}</td>
                          <td className="td-market">{p.market_name}</td>
                          <td className="td-price">{Math.round(p.price).toLocaleString('fr-FR')} F</td>
                          <td className="td-type"><span className="type-tag">{p.price_type==='retail'?'Détail':'Gros'}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  <div className="card-date">Mis à jour le {new Date(group[0].price_date).toLocaleDateString('fr-FR')}</div>

                  <RevenueCalculator group={group} unit={c.unit||'kg'}/>

                  <div className="card-actions" style={{marginTop:14}} onClick={e=>e.stopPropagation()}>
                    <button type="button" className={'voir-btn'+(isSel?' active':'')}
                      onClick={e=>{e.preventDefault();handleSelect({commodity_id:parseInt(cid),commodity:c,group})}}>
                      {isSel?'Masquer les détails ↑':'Analyse complète + Prévision →'}
                    </button>
                    <button type="button" className="report-btn"
                      onClick={e=>{e.preventDefault();setReportingCommodity(c)}}>
                      + Signaler un prix sur le terrain
                    </button>
                  </div>
                </div>
              )
            })}
          </div>
        )}

        {selected&&(
          <div id="dp">
            <DetailPanel selected={selected} history={history} histLoading={histLoading}/>
          </div>
        )}
      </main>

      {reportingCommodity&&<ReportModal commodity={reportingCommodity} onClose={()=>setReportingCommodity(null)}/>}

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand">Jàng Prix</div>
          <div className="footer-right">
            <div className="footer-sources">Sources : WFP VAM · Auchan Sénégal · FAO GIEWS · SenPoisson · Thiaroye · Park Nadio</div>
            <div className="footer-markets" style={{color:'#94A3B8'}}>Marchés : Dakar · Thiaroye · Pikine · Rufisque · Keur Massar · Niayes · Soumbédioune</div>
            <div className="footer-note">Les prix sont indicatifs. Vérifiez toujours sur place avant de vendre.</div>
          </div>
        </div>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
