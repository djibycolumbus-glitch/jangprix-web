              </div>
              {crop.markets.map((m,i)=>{
                const prices=crop.markets.map(x=>x.price)
                const maxP=Math.max(...prices),minP=Math.min(...prices)
                const pct=maxP>minP?((m.price-minP)/(maxP-minP))*100:50
                const isBest=mode==='farmer'?(m.price-m.transport)===Math.max(...crop.markets.map(x=>x.price-x.transport)):m.price===minP
                const netPrice=m.price-m.transport
                return(
                  <div key={i} className="plan-mkt-row">
                    <div className="plan-mkt-name">{m.market_name||m.name}</div>
                    <div className="plan-mkt-bar-wrap"><div className="plan-mkt-bar" style={{width:Math.max(pct,5)+'%',background:isBest?(mode==='farmer'?'var(--up)':'#60A5FA'):'var(--ink5)'}}></div></div>
                    <div className="plan-mkt-price">{m.price} F</div>
                    <div className="plan-mkt-net">net {netPrice} F</div>
                    <div className={'plan-mkt-tag '+(isBest?(mode==='farmer'?'pmt-best':'pmt-buy'):'pmt-mid')}>{isBest?(mode==='farmer'?'Top':'Moins cher'):'—'}</div>
                  </div>
                )
              })}
              <div style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--t5)',marginTop:8}}>Prix net = prix marche - cout transport estime</div>
            </div>

            <div className="plan-block">
              <div className="plan-block-title">
                Tendance des prix · 5 ans
                <span className="plan-badge pb-green">+{crop.vol5yr}%/AN</span>
              </div>
              {[...crop.trend].reverse().map((t,i)=>{
                const prev=crop.trend[crop.trend.length-2-i]
                const chg=prev?Math.round(((t.avg-prev.avg)/prev.avg)*100):null
                return(
                  <div key={i} className="plan-trend-row">
                    <div className="plan-trend-yr">{t.yr}{t.yr===2025?' (en cours)':''}</div>
                    <div className="plan-trend-avg">{t.avg} FCFA/kg</div>
                    <div className={'plan-trend-chg '+(chg===null?'':chg>0?'ptc-up':'ptc-dn')}>{chg===null?'base':chg>0?'+'+chg+'%':chg+'%'}</div>
                  </div>
                )
              })}
            </div>
          </div>

          <div className="plan-two-col">
            <div className="plan-block">
              <div className="plan-block-title">
                Risques a surveiller
                <span className="plan-badge pb-gold">{crop.risks.length} FACTEURS</span>
              </div>
              {crop.risks.map((r,i)=>(
                <div key={i} className="plan-risk-row">
                  <div className="plan-risk-dot" style={{background:r.color}}></div>
                  <div>
                    <div className="plan-risk-name">{r.name}</div>
                    <div className="plan-risk-desc">{r.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            <div className="plan-block">
              <div className="plan-block-title">
                Comparer les cultures
                {!isPaid&&<span className="plan-badge pb-gold">PAYANT</span>}
              </div>
              <div className="plan-cmp-grid">
                {Object.entries(CROP_DATA).slice(0,3).map(([k,c])=>{
                  const isActive=k===cropKey
                  const locked=!c.free&&!isPaid&&!isActive
                  const peakP=Math.round(c.peakMonths.reduce((s,m)=>s+c.monthlyPrices[m],0)/c.peakMonths.length)
                  return(
                    <div key={k} className={'plan-cmp-card'+(isActive?' active-cmp':locked?' locked-cmp':'')}>
                      <div className="plan-cmp-name">{c.name}{isActive&&<span className="plan-cmp-you">Selectionne</span>}</div>
                      {!locked?(
                        <>
                          <div className="plan-cmp-row"><div className="plan-cmp-key">Prix pic</div><div className={'plan-cmp-val '+(isActive?'gold':'green')}>{peakP} F</div></div>
                          <div className="plan-cmp-row"><div className="plan-cmp-key">Duree</div><div className="plan-cmp-val">{c.grow}j</div></div>
                          <div className="plan-cmp-row"><div className="plan-cmp-key">Risque</div><div className={'plan-cmp-val '+(c.volatility==='FAIBLE'?'green':c.volatility==='MOYEN'?'gold':'red')}>{c.volatility}</div></div>
                        </>
                      ):(
                        <div style={{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--t5)',marginTop:6}}>🔒 Abonnement requis</div>
                      )}
                    </div>
                  )
                })}
              </div>
            </div>
          </div>

          <div className="plan-export-row">
            <button className="plan-export-btn png" onClick={exportPNG}>
              <span>📥</span> Telecharger PNG
            </button>
            <button className="plan-export-btn wa" onClick={shareWA}>
              <span>💬</span> Partager sur WhatsApp
            </button>
            <div className="plan-updated">Donnees WFP · Mises a jour {new Date().toLocaleDateString()}</div>
          </div>
        </>
      ):(
        <div className="locked-feature">
          <div style={{fontSize:28,marginBottom:10}}>🔒</div>
          <div style={{fontFamily:'var(--font-disp)',fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:8}}>{crop.name} — Culture payante</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--t4)',lineHeight:1.6,marginBottom:14}}>Envoyez <strong style={{color:'var(--gold)'}}>3 500 FCFA</strong> via Wave au <strong style={{color:'var(--gold)'}}>{WAVE_NUMBER}</strong></div>
          <button className="plan-lock-btn" onClick={onUpgrade}>Debloquer toutes les cultures →</button>
        </div>
      )}
    </div>
  )
}

function App(){
  const[page,setPage]=React.useState('home')
  const[subscriber,setSubscriber]=React.useState(null)
  const[showGate,setShowGate]=React.useState(false)
  const[showAuthModal,setShowAuthModal]=React.useState(false)
  const[showWelcome,setShowWelcome]=React.useState(false)
  const[showExpired,setShowExpired]=React.useState(false)
  const[prices,setPrices]=React.useState([])
  const[commodities,setCommodities]=React.useState([])
  const[selected,setSelected]=React.useState(null)
  const[history,setHistory]=React.useState([])
  const[histLoading,setHistLoading]=React.useState(false)
  const[loading,setLoading]=React.useState(true)
  const[category,setCategory]=React.useState('all')
  const[search,setSearch]=React.useState('')
  const[showFavorites,setShowFavorites]=React.useState(false)
  const[favorites,setFavorites]=React.useState(getFavorites())
  const[shareCardData,setShareCardData]=React.useState(null)

  React.useEffect(()=>{
    if(!GATE_IS_LIVE){setShowGate(false);return}
    const saved=loadSession()
    if(saved){setSubscriber(saved);const st=getAccessStatus(saved);if(st.expired)setShowExpired(true)}
    else setShowGate(true)
  },[])

  function handleLogin(sub, isNew=false){
    setSubscriber(sub)
    setShowGate(false)
    setShowAuthModal(false)
    const st=getAccessStatus(sub)
    if(st.expired)setShowExpired(true)
    // Show welcome popup for brand new signups only
    if(isNew&&GATE_IS_LIVE)setShowWelcome(true)
    setPage('dashboard')
    window.scrollTo({top:0,behavior:'smooth'})
  }

  function handleEnterDashboard(){
    // If already logged in, go straight to dashboard
    if(subscriber){setPage('dashboard');window.scrollTo({top:0,behavior:'smooth'});return}
    // If gate is live and no session, show auth modal
    if(GATE_IS_LIVE){setShowAuthModal(true);return}
    // Gate not live yet — just go to dashboard
    setPage('dashboard');window.scrollTo({top:0,behavior:'smooth'})
  }
  const accessStatus=subscriber?getAccessStatus(subscriber):{level:'free',expired:false,daysLeft:null}
  const isPaid=GATE_IS_LIVE?(accessStatus.level==='paid'):true

  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1)
  const yesterdayStr=yesterday.toISOString().split('T')[0]

  React.useEffect(()=>{
    Promise.all([sq('prices','?select=id,price,price_date,source,price_type,commodity_id,market_id&order=price_date.desc&limit=600'),sq('commodities','?select=*'),sq('markets','?select=*')]).then(([pd,cd,md])=>{
      const mMap={};if(md)md.forEach(m=>mMap[m.id]=m)
      const enriched=(pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Inconnu'}))
      const filtered=GATE_IS_LIVE&&!isPaid?enriched.filter(p=>p.price_date&&p.price_date.split('T')[0]<=yesterdayStr):enriched
      const latest={};filtered.forEach(p=>{const k=p.commodity_id+'_'+p.market_id;if(!latest[k])latest[k]=p})
      setPrices(Object.values(latest));setCommodities(cd||[]);setLoading(false)
    })
  },[isPaid])

  function handleSelect(item){
    if(selected&&selected.commodity_id===item.commodity_id){setSelected(null);setHistory([]);return}
    setSelected(item);setHistory([]);setHistLoading(true)
    Promise.all([sq('markets','?select=*'),sq('prices','?commodity_id=eq.'+item.commodity_id+'&order=price_date.desc&limit=500&select=price,price_date,market_id,source,price_type')]).then(([md,pd])=>{
      const mMap={};if(md)md.forEach(m=>mMap[m.id]=m)
      setHistory((pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Marche'})))
      setHistLoading(false)
      setTimeout(()=>{const el=document.getElementById('dp');if(el)el.scrollIntoView({behavior:'smooth'})},200)
    })
  }

  function toggleFavorite(e,commodityId){
    e.preventDefault();e.stopPropagation()
    if(isFavorite(commodityId)){removeFavorite(commodityId)}else{addFavorite(commodityId)}
    setFavorites(getFavorites())
  }

  const tabDays=getTabDays()
  const byCom={}
  prices.forEach(p=>{
    const c=commodities.find(x=>x.id===p.commodity_id);if(!c)return
    if(showFavorites&&!favorites.includes(p.commodity_id))return
    if(category!=='all'&&c.category!==category)return
    if(search&&!fr(c.name_fr).toLowerCase().includes(search.toLowerCase()))return
    if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]
    byCom[p.commodity_id].push(p)
  })

  const today=new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'})
  const allMkts=[...new Set(prices.map(p=>p.market_name).filter(Boolean))]
  const comCount=[...new Set(prices.map(p=>p.commodity_id))].length
  const sources=[...new Set(prices.map(p=>p.source))]
  const lastDate=prices.length?new Date(Math.max(...prices.map(p=>new Date(p.price_date)))).toLocaleDateString():'—'
  const stats={products:comCount||40,markets:allMkts.length||6,sources:sources.length||6}

  return(
    <div>
      {showGate&&<LoginGate onLogin={handleLogin}/>}
      {showAuthModal&&!showGate&&<AuthModal onLogin={handleLogin} onClose={()=>setShowAuthModal(false)}/>}
      {showWelcome&&subscriber&&<WelcomePopup name={subscriber.name} onClose={()=>setShowWelcome(false)}/>}
      {showExpired&&!showGate&&<ExpiredPopup onDismiss={()=>setShowExpired(false)}/>}
      {GATE_IS_LIVE&&accessStatus.daysLeft!==null&&accessStatus.daysLeft>0&&accessStatus.daysLeft<=7&&<RenewalBanner daysLeft={accessStatus.daysLeft}/>}

      <header className="header">
        <div className="header-inner">
          <div className="logo-block" onClick={()=>{setPage('home');window.scrollTo({top:0,behavior:'smooth'})}} role="link" tabIndex={0} onKeyDown={e=>e.key==='Enter'&&(setPage('home'),window.scrollTo({top:0,behavior:'smooth'}))} aria-label="Jang Prix accueil">
            <div className="logo-mark" aria-hidden="true">JP</div>
            <div><div className="logo-name">Jang <span>Prix</span></div><div className="logo-sub">Intelligence marches agricoles</div></div>
          </div>
          <div className="header-right">
            <button className={'nav-btn'+(page==='home'?' active':'')} onClick={()=>{setPage('home');window.scrollTo({top:0,behavior:'smooth'})}}>Accueil</button>
            <button className={'nav-btn'+(page==='dashboard'?' active':'')} onClick={handleEnterDashboard}>Prix du marche</button>
            <button className={'nav-btn'+(page==='planning'?' active':'')} onClick={()=>{setPage('planning');window.scrollTo({top:0,behavior:'smooth'})}}>Calendrier</button>
            <button className={'nav-btn'+(page==='contact'?' active':'')} onClick={()=>{setPage('contact');window.scrollTo({top:0,behavior:'smooth'})}}>Contact</button>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}><button className="nav-btn wa-nav">💬 WhatsApp</button></a>
            {GATE_IS_LIVE&&subscriber&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {isPaid?<span className="user-badge-paid">⭐ {subscriber.name}</span>:<span className="user-badge-free">{subscriber.name}</span>}
                <button
                  className="nav-btn"
                  style={{fontSize:10,padding:'4px 10px',color:'var(--t5)',borderColor:'var(--wire)'}}
                  onClick={()=>{localStorage.removeItem('jp_sub');window.location.reload()}}
                  aria-label="Se deconnecter"
                  title="Se deconnecter"
                >
                  Déco
                </button>
              </div>
            )}
            {(!GATE_IS_LIVE||isPaid)&&<div className="live-badge" role="status"><span className="live-dot" aria-hidden="true"></span>EN DIRECT</div>}
            <div className="header-date" aria-label={'Date: '+today}>{today}</div>
          </div>
        </div>
      </header>

      {page==='home'&&<HomePage onEnter={handleEnterDashboard} onPlan={()=>{setPage('planning');window.scrollTo({top:0,behavior:'smooth'})}} stats={stats}/>}
      {page==='planning'&&<PlanningPage isPaid={isPaid} onUpgrade={()=>setShowAuthModal(true)}/>}
      {page==='contact'&&<ContactPage onAuth={()=>setShowAuthModal(true)}/>}

      {page==='dashboard'&&(
        <div style={{animation:'fadeUp 0.3s ease both'}}>
          {tabDays&&<div className="tabaski-banner" role="status"><div className="tabaski-inner"><span className="tabaski-label">Tabaski 2026</span><span className="tabaski-days">{tabDays}</span><span className="tabaski-jours">jours restants</span><span className="tabaski-tip">{tabDays>60?'— Prix en hausse progressive.':tabDays>30?'— Bonne periode pour vendre.':'— Vendez maintenant.'}</span></div></div>}
          <Ticker prices={prices} commodities={commodities}/>
          <div className="stats-bar"><div className="stats-inner">{[{l:'Produits suivis',v:comCount},{l:'Marches couverts',v:allMkts.length},{l:'Sources de donnees',v:sources.length},{l:'Derniere mise a jour',v:lastDate}].map(s=>(<div key={s.l} className="stat-item"><div className="stat-value">{s.v}</div><div className="stat-label">{s.l}</div></div>))}</div></div>

          <main className="main">
            <div className="page-header">
              <h2 className="page-title">Prix du <span>Marche</span></h2>
              {GATE_IS_LIVE&&!isPaid&&<span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--t5)',textTransform:'uppercase',letterSpacing:'0.8px'}}>· Prix d'hier</span>}
            </div>
            <p className="page-sub">Donnees en temps reel depuis les marches de Dakar et environs</p>

            {GATE_IS_LIVE&&!isPaid&&<UpgradePrompt/>}

            <div className="search-filter-row">
              <div className="search-wrap">
                <span className="search-icon" aria-hidden="true">🔍</span>
                <input className="search-input" type="search" placeholder="Rechercher un produit… ex: mil, riz, thiof" value={search} onChange={e=>setSearch(e.target.value)} aria-label="Rechercher un produit" autoComplete="off" spellCheck="false"/>
              </div>
              <div className="filter-tabs" role="group" aria-label="Filtrer par categorie">
                <button type="button" className={'cat-tab'+(showFavorites?' active':'')} onClick={e=>{e.preventDefault();setShowFavorites(!showFavorites)}} aria-pressed={showFavorites}>⭐ Mes Favoris</button>
                {[['all','Tout'],['cereals and tubers','Cereales'],['pulses and nuts','Legumineuses'],['fruits and vegetables','Fruits & Legumes'],['vegetables','Legumes'],['fruits','Fruits'],['fish','Poisson'],['seafood','Fruits de mer'],['meat','Viande'],['poultry','Volaille']].map(([k,l])=>(
                  <button type="button" key={k} className={'cat-tab'+(category===k&&!showFavorites?' active':'')} onClick={e=>{e.preventDefault();setShowFavorites(false);setCategory(k)}} aria-pressed={category===k&&!showFavorites}>{l}</button>
                ))}
              </div>
            </div>

            {loading?(
              <div className="commodity-grid" aria-busy="true" aria-label="Chargement des prix…">
                {Array.from({length:6}).map((_,i)=>(
                  <div key={i} className="commodity-card" style={{animationDelay:(i*0.06)+'s',cursor:'default'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
                      <div>
                        <div style={{width:60,height:9,background:'var(--ink4)',borderRadius:3,marginBottom:8,animation:'pulse 1.5s infinite'}}/>
                        <div style={{width:110,height:16,background:'var(--ink4)',borderRadius:3,animation:'pulse 1.5s infinite'}}/>
                      </div>
                      <div style={{width:56,height:20,background:'var(--ink4)',borderRadius:3,animation:'pulse 1.5s infinite'}}/>
                    </div>
                    <div style={{width:140,height:28,background:'var(--ink4)',borderRadius:3,marginBottom:10,animation:'pulse 1.5s infinite'}}/>
                    <div style={{width:'100%',height:32,background:'var(--ink4)',borderRadius:4,marginBottom:10,animation:'pulse 1.5s infinite'}}/>
                    <div style={{width:'100%',height:24,background:'var(--ink4)',borderRadius:4,marginBottom:14,animation:'pulse 1.5s infinite'}}/>
                    {[0,1].map(j=><div key={j} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--wire)'}}>
                      <div style={{width:50,height:10,background:'var(--ink4)',borderRadius:2,animation:'pulse 1.5s infinite'}}/>
                      <div style={{width:80,height:10,background:'var(--ink4)',borderRadius:2,animation:'pulse 1.5s infinite'}}/>
                      <div style={{width:60,height:10,background:'var(--ink4)',borderRadius:2,animation:'pulse 1.5s infinite'}}/>
                    </div>)}
                  </div>
                ))}
              </div>
            ):Object.keys(byCom).length===0?(
              <div className="empty">{showFavorites?'Aucun produit dans vos favoris. Cliquez sur ☆ pour en ajouter.':'Aucun produit trouve'+(search?' pour "'+search+'"':'')+'.'}</div>
            ):(
              <div className="commodity-grid" role="list">
                {Object.entries(byCom).map(([cid,group],idx)=>{
                  const c=commodities.find(x=>x.id===parseInt(cid));if(!c)return null
                  const avg=group.reduce((s,p)=>s+p.price,0)/group.length
                  const isSel=selected&&selected.commodity_id===parseInt(cid)
                  const rec=getRec(avg,null)
                  const sf=gsf(c.category,(new Date().getMonth()+1)%12)
                  const arrow=sf.dir==='up'?'▲':sf.dir==='down'?'▼':'→'

                  const sortedGroup=[...group].sort((a,b)=>a.price-b.price)

                  return(

                          <button type="button" className={'star-btn'+(isFavorite(parseInt(cid))?'favorited':'')} onClick={(e)=>toggleFavorite(e,parseInt(cid))} title={isFavorite(parseInt(cid))?'Retirer des favoris':'Ajouter aux favoris'} aria-label={isFavorite(parseInt(cid))?'Favorisé':'Non favorisé'} aria-pressed={isFavorite(parseInt(cid))}>{isFavorite(parseInt(cid))?'★':'☆'}</button>

                        </div>
                      </div>
                      <div className="price-block">
                        <div className="price-row">
                          <span className="price-value">{Math.round(avg).toLocaleString()}</span>
                          <span className={'price-trend-arrow '+sf.dir} aria-hidden="true">{arrow}</span>
                          <span className="price-meta">FCFA&nbsp;/&nbsp;{c.unit||'kg'}</span>
                        </div>
                      </div>
                      <div className={'rec-reason '+rec.reasonCls}>{rec.reason}</div>
                      <div className={'pred-summary '+sf.dir}><span aria-hidden="true">{arrow}</span><span>{predText}</span></div>
                      <div className="sources-divider"></div>
                      <table className="sources-table" aria-label="Prix par marche">
                        <tbody>
                          <tr>
                            <td className="td-source">{SOURCE_LABEL[bestMkt.source]||bestMkt.source}</td>
                            <td className="td-best">★ {bestMkt.market_name}</td>
                            <td className="td-price">{Math.round(bestMkt.price).toLocaleString()} F</td>
                            <td className="td-type"><span className="type-tag">{bestMkt.price_type==='retail'?'Detail':'Gros'}</span></td>
                          </tr>
                          {otherMkts.map(p=>(
                            <tr key={p.id}>
                              <td className="td-source">{SOURCE_LABEL[p.source]||p.source}</td>
                              <td className="td-market">{p.market_name}</td>
                              <td className="td-price">{Math.round(p.price).toLocaleString()} F</td>
                              <td className="td-type"><span className="type-tag">{p.price_type==='retail'?'Detail':'Gros'}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      <div className="card-date">Mis a jour le {new Date(group[0].price_date).toLocaleDateString()}</div>
                      <RevenueCalc group={group} unit={c.unit||'kg'}/>
                      <div className="card-actions" style={{marginTop:12}} onClick={e=>e.stopPropagation()} onKeyDown={e=>e.stopPropagation()}>
                        <button type="button" className={'voir-btn'+(isSel?' active':'')} onClick={e=>{e.preventDefault();handleSelect({commodity_id:parseInt(cid),commodity:c,group})}}>
                          {isSel?'Masquer les details ↑':'Analyse complete + Prevision →'}
                        </button>
                        <button type="button" className="share-btn" onClick={e=>{e.preventDefault();setShareCardData({canvas:generatePriceCard(fr(c.name_fr),avg,c.unit||'kg',group,rec,sf.dir),title:fr(c.name_fr)})}} aria-label={'Partager la carte prix de '+fr(c.name_fr)}>
                          📤 Partager cette carte
                        </button>
                      </div>
                    </article>
                  )
                })}
              </div>
            )}
            {selected&&<div id="dp"><DetailPanel selected={selected} history={history} histLoading={histLoading} isPaid={isPaid}/></div>}
          </main>
          {shareCardData&&<ShareModal canvas={shareCardData.canvas} title={shareCardData.title} onClose={()=>setShareCardData(null)}/>}
        </div>
      )}

      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand">Jang Prix</div>
          <div className="footer-right">
            <div className="footer-sources">Sources : WFP VAM · Auchan Senegal · FAO GIEWS · SenPoisson · Thiaroye · Park Nadio</div>
            <div className="footer-markets">Marches : Dakar · Thiaroye · Pikine · Rufisque · Keur Massar · Niayes · Soumbedioune</div>
            <div className="footer-note">Les prix sont indicatifs. Verifiez toujours sur place avant de vendre.</div>
          </div>
        </div>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
