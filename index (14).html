<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jàng Prix — Prix Agricoles Dakar</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-start: #0F172A; --bg-end: #1E293B;
      --card-start: #1E293B; --card-end: #0F172A;
      --text-primary: #F8FAFC; --text-secondary: #CBD5E1; --text-muted: #94A3B8;
      --up: #22C55E; --down: #EF4444; --stable: #FACC15; --accent: #FACC15;
      --border: rgba(248,250,252,0.08); --border-hover: rgba(250,203,21,0.3);
      --wa: #25D366; --wa-dark: #128C7E;
    }
    html { scroll-behavior: smooth; }
    body { background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); background-attachment: fixed; color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{opacity:0.7;box-shadow:0 0 0 6px rgba(34,197,94,0)} }
    @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes waPulse { 0%,100%{box-shadow:0 8px 24px rgba(37,211,102,0.4)} 50%{box-shadow:0 8px 36px rgba(37,211,102,0.65)} }
    @keyframes waBigPulse { 0%,100%{box-shadow:0 12px 40px rgba(37,211,102,0.4)} 50%{box-shadow:0 12px 60px rgba(37,211,102,0.65)} }
    @keyframes waOverlayIn { from{opacity:0}to{opacity:1} }
    @keyframes waPopupIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

    /* HEADER */
    .header { background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width:1400px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; height:64px; }
    .logo-block { display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; }
    .logo-mark { width:38px; height:38px; background:linear-gradient(135deg,var(--stable),#F59E0B); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:#0F172A; box-shadow:0 4px 15px rgba(250,204,21,0.4); }
    .logo-name { font-size:20px; font-weight:800; color:var(--text-primary); letter-spacing:-0.5px; }
    .logo-name span { color:var(--stable); }
    .logo-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .nav-btn { padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:rgba(30,41,59,0.6); color:var(--text-muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .nav-btn:hover { border-color:var(--border-hover); color:var(--stable); }
    .nav-btn.active { background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; border-color:transparent; box-shadow:0 4px 12px rgba(250,204,21,0.3); }
    .nav-btn.wa-nav { color:var(--wa); border-color:rgba(37,211,102,0.25); background:rgba(37,211,102,0.06); }
    .nav-btn.wa-nav:hover { background:rgba(37,211,102,0.12); border-color:rgba(37,211,102,0.4); }
    .live-badge { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:700; color:var(--up); letter-spacing:1px; text-transform:uppercase; background:rgba(34,197,94,0.1); padding:6px 12px; border-radius:20px; border:1px solid rgba(34,197,94,0.25); }
    .live-dot { width:7px; height:7px; border-radius:50%; background:var(--up); animation:livePulse 2s infinite; }
    .header-date { font-size:12px; color:var(--text-muted); }

    /* HOMEPAGE */
    .homepage { animation: fadeUp 0.4s ease both; }
    .hero { min-height:calc(100vh - 64px); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:60px 32px 40px; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:800px; height:800px; border-radius:50%; background:radial-gradient(circle, rgba(250,204,21,0.06) 0%, transparent 70%); pointer-events:none; }
    .hero-eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--stable); background:rgba(250,204,21,0.08); border:1px solid rgba(250,204,21,0.2); padding:6px 14px; border-radius:20px; margin-bottom:28px; animation:fadeUp 0.4s 0.1s ease both; }
    .hero-title { font-size:clamp(36px,6vw,68px); font-weight:900; color:var(--text-primary); letter-spacing:-2px; line-height:1.05; margin-bottom:20px; animation:fadeUp 0.4s 0.15s ease both; }
    .hero-title span { color:var(--stable); }
    .hero-title-sub { display:block; font-size:clamp(20px,3vw,36px); font-weight:400; color:var(--text-muted); letter-spacing:-0.5px; margin-top:8px; }
    .hero-desc { font-size:clamp(14px,1.8vw,17px); color:var(--text-muted); max-width:580px; line-height:1.7; margin-bottom:36px; animation:fadeUp 0.4s 0.2s ease both; }
    .hero-cta-row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:60px; animation:fadeUp 0.4s 0.25s ease both; }
    .btn-hero-primary { padding:15px 32px; border-radius:12px; background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; border:none; font-family:'Inter',sans-serif; font-size:15px; font-weight:800; cursor:pointer; transition:all 0.2s; box-shadow:0 6px 24px rgba(250,204,21,0.4); display:inline-flex; align-items:center; gap:8px; }
    .btn-hero-primary:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(250,204,21,0.55); }
    .btn-hero-secondary { padding:15px 28px; border-radius:12px; background:rgba(30,41,59,0.8); color:var(--text-secondary); border:1px solid var(--border); font-family:'Inter',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; text-decoration:none; }
    .btn-hero-secondary:hover { border-color:rgba(37,211,102,0.4); color:var(--wa); background:rgba(37,211,102,0.05); }
    .hero-stats { display:flex; gap:40px; flex-wrap:wrap; justify-content:center; animation:fadeUp 0.4s 0.3s ease both; }
    .hero-stat { text-align:center; }
    .hero-stat-value { font-size:28px; font-weight:900; color:var(--stable); letter-spacing:-1px; line-height:1; }
    .hero-stat-label { font-size:11px; color:var(--text-muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.8px; font-weight:500; }
    .features-section,.how-section,.sources-section,.wa-section { padding:80px 32px; max-width:1400px; margin:0 auto; }
    .section-eyebrow { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--stable); margin-bottom:12px; }
    .section-title { font-size:clamp(24px,3vw,36px); font-weight:800; color:var(--text-primary); letter-spacing:-0.8px; margin-bottom:14px; }
    .section-title span { color:var(--stable); }
    .section-desc { font-size:15px; color:var(--text-muted); max-width:520px; line-height:1.7; margin-bottom:48px; }
    .features-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .feature-card { background:linear-gradient(135deg,var(--card-start),var(--card-end)); border:1px solid var(--border); border-radius:16px; padding:28px; transition:all 0.25s; position:relative; overflow:hidden; animation:fadeUp 0.4s ease both; }
    .feature-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(250,204,21,0.2),transparent); opacity:0; transition:opacity 0.25s; }
    .feature-card:hover { border-color:rgba(250,204,21,0.2); transform:translateY(-4px); box-shadow:0 12px 32px rgba(250,203,21,0.12); }
    .feature-card:hover::before { opacity:1; }
    .feature-icon { width:48px; height:48px; border-radius:12px; background:rgba(250,204,21,0.1); border:1px solid rgba(250,204,21,0.15); display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:18px; }
    .feature-title { font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
    .feature-desc { font-size:13px; color:var(--text-muted); line-height:1.6; }
    .steps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:24px; margin-top:48px; }
    .step-card { text-align:center; padding:32px 20px; }
    .step-num { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; font-size:18px; font-weight:900; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; box-shadow:0 4px 16px rgba(250,204,21,0.3); }
    .step-title { font-size:15px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
    .step-desc { font-size:13px; color:var(--text-muted); line-height:1.6; }
    .sources-grid { display:flex; flex-wrap:wrap; gap:12px; margin-top:32px; }
    .source-chip { padding:10px 20px; border-radius:20px; background:rgba(30,41,59,0.8); border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text-secondary); transition:all 0.2s; }
    .source-chip:hover { border-color:rgba(250,204,21,0.3); color:var(--stable); background:rgba(250,204,21,0.05); }
    .wa-card { background:linear-gradient(135deg,rgba(37,211,102,0.08) 0%,rgba(18,140,126,0.06) 100%); border:1px solid rgba(37,211,102,0.2); border-radius:20px; padding:48px; display:flex; align-items:center; gap:48px; flex-wrap:wrap; position:relative; overflow:hidden; }
    .wa-card::before { content:''; position:absolute; top:-80px; right:-80px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,rgba(37,211,102,0.08),transparent 70%); pointer-events:none; }
    .wa-card-left { flex:1; min-width:280px; }
    .wa-card-icon { font-size:48px; margin-bottom:16px; }
    .wa-card-title { font-size:26px; font-weight:800; color:var(--text-primary); letter-spacing:-0.5px; margin-bottom:10px; }
    .wa-card-title span { color:var(--wa); }
    .wa-card-desc { font-size:14px; color:var(--text-muted); line-height:1.7; max-width:460px; margin-bottom:24px; }
    .wa-perks-inline { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
    .wa-perk-inline { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-secondary); }
    .wa-perk-dot { width:6px; height:6px; border-radius:50%; background:var(--wa); flex-shrink:0; }
    .wa-join-big { display:inline-flex; align-items:center; gap:10px; padding:14px 28px; border-radius:12px; background:linear-gradient(135deg,var(--wa),var(--wa-dark)); color:white; border:none; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 6px 20px rgba(37,211,102,0.35); text-decoration:none; }
    .wa-join-big:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(37,211,102,0.5); }
    .wa-card-right { flex-shrink:0; }
    .wa-big-icon { width:120px; height:120px; border-radius:28px; background:linear-gradient(135deg,var(--wa),var(--wa-dark)); display:flex; align-items:center; justify-content:center; font-size:56px; box-shadow:0 12px 40px rgba(37,211,102,0.4); animation:waBigPulse 3s ease-in-out infinite; }

    /* TABASKI */
    .tabaski-banner { background:linear-gradient(90deg,rgba(250,204,21,0.1),rgba(245,158,11,0.08),rgba(250,204,21,0.1)); border-bottom:1px solid rgba(250,204,21,0.2); padding:10px 32px; }
    .tabaski-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .tabaski-label { font-size:10px; font-weight:800; color:var(--stable); text-transform:uppercase; letter-spacing:1.5px; background:rgba(250,204,21,0.12); padding:3px 10px; border-radius:20px; border:1px solid rgba(250,204,21,0.25); }
    .tabaski-days { font-size:22px; font-weight:800; color:var(--stable); line-height:1; }
    .tabaski-jours { font-size:13px; color:rgba(250,204,21,0.7); }
    .tabaski-tip { font-size:12px; color:rgba(250,204,21,0.5); }

    /* TICKER */
    .ticker-wrap { background:rgba(15,23,42,0.6); border-bottom:1px solid var(--border); overflow:hidden; height:38px; display:flex; align-items:center; }
    .ticker-label { background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:0 14px; height:100%; display:flex; align-items:center; flex-shrink:0; }
    .ticker-track-wrap { flex:1; overflow:hidden; position:relative; }
    .ticker-track-wrap::before { content:''; position:absolute; left:0; top:0; bottom:0; width:40px; background:linear-gradient(to right,rgba(15,23,42,0.9),transparent); z-index:1; pointer-events:none; }
    .ticker-track-wrap::after { content:''; position:absolute; right:0; top:0; bottom:0; width:40px; background:linear-gradient(to left,rgba(15,23,42,0.9),transparent); z-index:1; pointer-events:none; }
    .ticker-track { display:flex; animation:tickerScroll 40s linear infinite; width:max-content; }
    .ticker-track:hover { animation-play-state:paused; }
    .ticker-item { display:flex; align-items:center; gap:6px; padding:0 20px; font-size:12px; font-weight:600; white-space:nowrap; border-right:1px solid var(--border); height:38px; }
    .ticker-item .t-name { color:var(--text-secondary); }
    .ticker-item .t-price { color:var(--text-primary); font-weight:700; }
    .ticker-item.up .t-arrow,.ticker-item.up .t-change { color:var(--up); }
    .ticker-item.down .t-arrow,.ticker-item.down .t-change { color:var(--down); }
    .ticker-item.stable .t-arrow,.ticker-item.stable .t-change { color:var(--stable); }

    /* STATS BAR */
    .stats-bar { background:rgba(30,41,59,0.5); border-bottom:1px solid var(--border); padding:0 32px; }
    .stats-inner { max-width:1400px; margin:0 auto; display:flex; flex-wrap:wrap; }
    .stat-item { padding:16px 48px 16px 0; position:relative; }
    .stat-item:not(:last-child)::after { content:''; position:absolute; right:24px; top:50%; transform:translateY(-50%); width:1px; height:24px; background:var(--border); }
    .stat-value { font-size:26px; font-weight:800; color:var(--stable); line-height:1; letter-spacing:-0.5px; }
    .stat-label { font-size:11px; color:var(--text-muted); margin-top:3px; text-transform:uppercase; letter-spacing:0.8px; font-weight:500; }

    /* MAIN */
    .main { max-width:1400px; margin:0 auto; padding:32px; }
    .page-header { margin-bottom:28px; }
    .page-title { font-size:28px; font-weight:800; color:var(--text-primary); letter-spacing:-0.8px; }
    .page-title span { color:var(--stable); }
    .page-sub { font-size:14px; color:var(--text-muted); margin-top:6px; }
    .search-filter-row { display:flex; gap:14px; margin-bottom:28px; flex-wrap:wrap; align-items:flex-start; }
    .search-wrap { position:relative; flex:1; min-width:280px; }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:15px; pointer-events:none; }
    .search-input { width:100%; padding:12px 14px 12px 42px; background:rgba(30,41,59,0.8); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .search-input::placeholder { color:var(--text-muted); }
    .search-input:focus { border-color:rgba(250,204,21,0.5); box-shadow:0 0 0 3px rgba(250,204,21,0.08); }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .cat-tab { padding:9px 18px; border-radius:20px; border:1px solid var(--border); background:rgba(30,41,59,0.6); color:var(--text-muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .cat-tab:hover { border-color:rgba(250,204,21,0.4); color:var(--stable); background:rgba(250,204,21,0.06); transform:scale(1.03); box-shadow:0 0 12px rgba(250,204,21,0.15); }
    .cat-tab.active { background:linear-gradient(135deg,var(--stable),#F59E0B); color:#0F172A; border-color:transparent; font-weight:700; box-shadow:0 4px 15px rgba(250,204,21,0.35); }
    .loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:100px; color:var(--text-muted); }
    .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--stable); border-radius:50%; animation:spin 0.8s linear infinite; }

    /* CARDS */
    .commodity-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; margin-bottom:40px; }
    .commodity-card { background:linear-gradient(135deg,var(--card-start) 0%,var(--card-end) 100%); border:1px solid var(--border); border-radius:16px; padding:22px; transition:transform 0.25s ease,box-shadow 0.25s ease,border-color 0.25s ease; cursor:pointer; color:inherit; animation:fadeUp 0.4s ease both; position:relative; overflow:hidden; }
    .commodity-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(250,204,21,0.3),transparent); opacity:0; transition:opacity 0.25s; }
    .commodity-card:hover { transform:translateY(-6px); box-shadow:0 8px 20px rgba(250,203,21,0.5); border-color:rgba(250,204,21,0.35); }
    .commodity-card:hover::before { opacity:1; }
    .commodity-card.selected { border-color:rgba(250,204,21,0.5); box-shadow:0 8px 30px rgba(250,203,21,0.4); }
    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; gap:10px; }
    .card-cat-chip { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; background:rgba(148,163,184,0.1); padding:3px 9px; border-radius:20px; border:1px solid var(--border); display:inline-block; margin-bottom:6px; }
    .card-name { font-size:17px; font-weight:700; color:var(--text-primary); line-height:1.2; }
    .card-markets { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .rec-badge { font-size:10px; font-weight:800; padding:4px 11px; border-radius:20px; flex-shrink:0; white-space:nowrap; letter-spacing:0.6px; text-transform:uppercase; }
    .rec-sell { background:rgba(34,197,94,0.15); color:var(--up); border:1px solid rgba(34,197,94,0.3); }
    .rec-wait { background:rgba(239,68,68,0.15); color:var(--down); border:1px solid rgba(239,68,68,0.3); }
    .rec-pending { background:rgba(250,204,21,0.1); color:var(--stable); border:1px solid rgba(250,204,21,0.2); }
    .price-block { margin-bottom:14px; }
    .price-row { display:flex; align-items:center; gap:10px; margin-bottom:3px; flex-wrap:wrap; }
    .price-value { font-size:32px; font-weight:800; color:var(--text-primary); line-height:1; letter-spacing:-1px; }
    .price-trend-arrow { font-size:20px; font-weight:800; line-height:1; }
    .price-trend-arrow.up { color:var(--up); }
    .price-trend-arrow.down { color:var(--down); }
    .price-trend-arrow.stable { color:var(--stable); }
    .price-meta { font-size:13px; color:var(--text-muted); }
    .rec-reason { font-size:12px; line-height:1.5; padding:9px 13px; border-radius:8px; margin-bottom:12px; }
    .rec-reason.sell { background:rgba(34,197,94,0.08); border-left:2px solid var(--up); color:rgba(34,197,94,0.9); }
    .rec-reason.wait { background:rgba(239,68,68,0.08); border-left:2px solid var(--down); color:rgba(239,68,68,0.9); }
    .rec-reason.pending { background:rgba(250,204,21,0.07); border-left:2px solid var(--stable); color:rgba(250,204,21,0.8); }
    .pred-summary { font-size:12px; padding:7px 12px; border-radius:8px; margin-bottom:14px; display:flex; align-items:center; gap:7px; font-weight:500; }
    .pred-summary.up { background:rgba(239,68,68,0.08); color:rgba(239,68,68,0.9); border:1px solid rgba(239,68,68,0.15); }
    .pred-summary.down { background:rgba(34,197,94,0.08); color:rgba(34,197,94,0.9); border:1px solid rgba(34,197,94,0.15); }
    .pred-summary.stable { background:rgba(250,204,21,0.07); color:rgba(250,204,21,0.85); border:1px solid rgba(250,204,21,0.15); }
    .sources-divider { height:1px; background:var(--border); margin-bottom:12px; }
    .sources-table { width:100%; border-collapse:collapse; margin-bottom:12px; }

function buildPred(cp,cat,history){
  const now=new Date()
  return Array.from({length:3},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i+1,1),m=d.getMonth()
    const sf=gsf(cat,m),ha=histAvg(history,m)
    let pp,conf=sf.conf
    if(ha&&history.length>12){pp=Math.round(ha*0.6+cp*(1+sf.pct/100)*0.4);conf=Math.min(conf+10,92)}

    const bc={}
    prices.forEach(p=>{if(!bc[p.commodity_id])bc[p.commodity_id]=[];bc[p.commodity_id].push(p)})
    return Object.entries(bc).slice(0,20).map(([cid,g])=>{
      const c=commodities.find(x=>x.id===parseInt(cid));if(!c)return null
      const avg=Math.round(g.reduce((s,p)=>s+p.price,0)/g.length),sf=gsf(c.category,(new Date().getMonth()+1)%12)
      return{name:fr(c.name_fr),price:avg,unit:c.unit||'kg',dir:sf.dir,pct:sf.pct}
    }).filter(Boolean)
  },[prices,commodities])
  if(!items.length)return null
  const doubled=[...items,...items]
  return(
    <div className="ticker-wrap">
      <div className="ticker-label">MARCHÉS</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((it,i)=>(
            <div key={i} className={'ticker-item '+it.dir}>
              <span className="t-name">{it.name}</span>
              <span className="t-price">{it.price.toLocaleString()}</span>
              <span style={{fontSize:10,color:'rgba(148,163,184,0.5)'}}>FCFA/{it.unit}</span>
              <span className="t-arrow">{it.dir==='up'?'▲':it.dir==='down'?'▼':'—'}</span>
              <span className="t-change">{it.dir==='up'?'+'+it.pct+'%':it.dir==='down'?it.pct+'%':'stable'}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

function RevenueCalc({group,unit}){
  const[qty,setQty]=React.useState('')
  const sorted=[...group].sort((a,b)=>b.price-a.price)
  const q=parseFloat(qty)
  const showResults=qty&&q>0
  return(
    <div className="calc-section">
      <div className="calc-label">Calculateur de revenus</div>
      <div className="calc-input-row">
        <input className="calc-input" type="number" min="0" placeholder="Quantite a vendre" value={qty} onChange={e=>setQty(e.target.value)}/>
        <span className="calc-unit">{unit||'kg'}</span>
      </div>
      {showResults&&(
        <div className="calc-results">
          {sorted.map((p,i)=>{
            const earning=Math.round(p.price*q)
            const isBest=i===0
            return(
              <div key={p.id} className={'calc-row'+(isBest?' best-market':'')}>
                <div>
                  <div className="calc-market">{p.market_name} - {SOURCE_LABEL[p.source]||p.source}</div>
                  <div style={{fontSize:11,color:'rgba(148,163,184,0.5)'}}>{Math.round(p.price).toLocaleString()} FCFA/{unit||'kg'}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className={'calc-earning'+(isBest?' best':'')}>{earning.toLocaleString()} FCFA</span>
                  {isBest&&<span className="calc-best-label">Meilleur</span>}
                </div>
              </div>
            )
          })}
          {sorted.length>1&&(
            <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',paddingTop:6}}>
              Difference: <strong style={{color:'var(--text-secondary)'}}>{(Math.round(sorted[0].price*q)-Math.round(sorted[sorted.length-1].price*q)).toLocaleString()} FCFA</strong>
            </div>
          )}
        </div>
      )}
    </div>
  )
}

            <div className="wa-perks-inline">
              {['Alertes de prix en temps réel chaque matin','Signaux de hausse et baisse avant les marchés','Conseils de vente hebdomadaires','Communauté active d\'agriculteurs de Dakar'].map((p,i)=>(
                <div key={i} className="wa-perk-inline"><div className="wa-perk-dot"></div><span>{p}</span></div>
              ))}
            </div>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" className="wa-join-big">💬 Rejoindre gratuitement</a>
          </div>
          <div className="wa-card-right"><div className="wa-big-icon">💬</div></div>
        </div>
      </section>

      {/* FINAL CTA */}
      <section style={{padding:'48px 32px',textAlign:'center',maxWidth:600,margin:'0 auto'}}>
        <div style={{fontSize:28,fontWeight:800,color:'var(--text-primary)',letterSpacing:'-0.5px',marginBottom:12}}>Prêt à <span style={{color:'var(--stable)'}}>mieux vendre</span> ?</div>
        <div style={{fontSize:14,color:'var(--text-muted)',marginBottom:28}}>Accédez gratuitement aux prix de tous les marchés de Dakar maintenant.</div>
        <button className="btn-hero-primary" onClick={onEnter} style={{margin:'0 auto'}}>📊 Voir les prix maintenant</button>
      </section>

      {popup&&<WaPopup onClose={closePopup}/>}
    </div>
  )
}

function App(){
  const[page,setPage]=React.useState('home')
  const[subscriber,setSubscriber]=React.useState(null)
  const[showGate,setShowGate]=React.useState(false)
  const[showExpired,setShowExpired]=React.useState(false)
  const[prices,setPrices]=React.useState([])
  const[commodities,setCommodities]=React.useState([])
  const[selected,setSelected]=React.useState(null)
  const[history,setHistory]=React.useState([])
  const[histLoading,setHistLoading]=React.useState(false)
  const[loading,setLoading]=React.useState(true)
  const[category,setCategory]=React.useState('all')
  const[search,setSearch]=React.useState('')
  const[reportingCommodity,setReportingCommodity]=React.useState(null)

  React.useEffect(()=>{
    if(!GATE_IS_LIVE){setShowGate(false);return}
    const saved=loadSession()
    if(saved){setSubscriber(saved);const st=getAccessStatus(saved);if(st.expired)setShowExpired(true)}
    else setShowGate(true)
  },[])

  function handleLogin(sub){setSubscriber(sub);setShowGate(false);const st=getAccessStatus(sub);if(st.expired)setShowExpired(true)}

  const accessStatus=subscriber?getAccessStatus(subscriber):{level:'free',expired:false,daysLeft:null}
  const isPaid=GATE_IS_LIVE?(accessStatus.level==='paid'):true

  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1)
  const yesterdayStr=yesterday.toISOString().split('T')[0]

  React.useEffect(()=>{
    Promise.all([sq('prices','?select=id,price,price_date,source,price_type,commodity_id,market_id&order=price_date.desc&limit=2000'),sq('commodities','?select=*'),sq('markets','?select=*')]).then(([pd,cd,md])=>{
      const mMap={};if(md)md.forEach(m=>mMap[m.id]=m)
      const enriched=(pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Inconnu'}))
      const filtered=GATE_IS_LIVE&&!isPaid?enriched.filter(p=>p.price_date&&p.price_date.split('T')[0]<=yesterdayStr):enriched
      const latest={};filtered.forEach(p=>{const k=p.commodity_id+'_'+p.market_id;if(!latest[k])latest[k]=p})
      setPrices(Object.values(latest));setCommodities(cd||[]);setLoading(false)
    })
  },[isPaid])

  function handleSelect(item){
    if(selected&&selected.commodity_id===item.commodity_id){setSelected(null);setHistory([]);return}
    setSelected(item);setHistory([]);setHistLoading(true)
    Promise.all([sq('markets','?select=*'),sq('prices','?commodity_id=eq.'+item.commodity_id+'&order=price_date.desc&limit=500&select=price,price_date,market_id,source,price_type')]).then(([md,pd])=>{
      const mMap={};if(md)md.forEach(m=>mMap[m.id]=m)
      setHistory((pd||[]).map(p=>({...p,market_name:(mMap[p.market_id]||{}).name||'Marché'})))
      setHistLoading(false)
      setTimeout(()=>{const el=document.getElementById('dp');if(el)el.scrollIntoView({behavior:'smooth'})},200)
    })
  }

  const tabDays=getTabDays()
  const byCom={}
  prices.forEach(p=>{
    const c=commodities.find(x=>x.id===p.commodity_id);if(!c)return
    if(category!=='all'&&c.category!==category)return
    if(search&&!fr(c.name_fr).toLowerCase().includes(search.toLowerCase()))return
    if(!byCom[p.commodity_id])byCom[p.commodity_id]=[]
    byCom[p.commodity_id].push(p)
  })

  const today=new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'})
  const allMkts=[...new Set(prices.map(p=>p.market_name).filter(Boolean))]
  const comCount=[...new Set(prices.map(p=>p.commodity_id))].length
  const sources=[...new Set(prices.map(p=>p.source))]
  const lastDate=prices.length?new Date(Math.max(...prices.map(p=>new Date(p.price_date)))).toLocaleDateString():'—'
  const stats={products:comCount||40,markets:allMkts.length||6,sources:sources.length||6}

  return(
    <div>
      {showGate&&<LoginGate onLogin={handleLogin}/>}
      {showExpired&&!showGate&&<ExpiredPopup onDismiss={()=>setShowExpired(false)}/>}
      {GATE_IS_LIVE&&accessStatus.daysLeft!==null&&accessStatus.daysLeft>0&&accessStatus.daysLeft<=7&&<RenewalBanner daysLeft={accessStatus.daysLeft}/>}
      <header className="header">
        <div className="header-inner">
          <div className="logo-block" onClick={()=>{setPage('home');window.scrollTo({top:0,behavior:'smooth'})}}>
            <div className="logo-mark">JP</div>
            <div><div className="logo-name">Jàng <span>Prix</span></div><div className="logo-sub">Intelligence des marchés agricoles</div></div>
          </div>
          <div className="header-right">
            <button className={'nav-btn'+(page==='home'?' active':'')} onClick={()=>{setPage('home');window.scrollTo({top:0,behavior:'smooth'})}}>Accueil</button>
            <button className={'nav-btn'+(page==='dashboard'?' active':'')} onClick={()=>setPage('dashboard')}>Prix du marché</button>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}><button className="nav-btn wa-nav">💬 WhatsApp</button></a>
            {GATE_IS_LIVE&&subscriber&&(isPaid?<span className="user-badge-paid">⭐ {subscriber.name}</span>:<span className="user-badge-free">{subscriber.name}</span>)}
            <div className="live-badge"><span className="live-dot"></span>EN DIRECT</div>
            <div className="header-date">{today}</div>
          </div>
        </div>
      </header>

      {page==='home'&&<HomePage onEnter={()=>{setPage('dashboard');window.scrollTo({top:0,behavior:'smooth'})}} stats={stats}/>}

      {page==='dashboard'&&(
        <div style={{animation:'fadeUp 0.3s ease both'}}>
          {tabDays&&<div className="tabaski-banner"><div className="tabaski-inner"><span className="tabaski-label">Tabaski 2026</span><span className="tabaski-days">{tabDays}</span><span className="tabaski-jours">jours restants</span><span className="tabaski-tip">{tabDays>60?'— Prix en hausse progressive.':tabDays>30?'— Bonne période pour vendre.':'— Vendez maintenant. Pic imminent.'}</span></div></div>}
          <Ticker prices={prices} commodities={commodities}/>
          <div className="stats-bar"><div className="stats-inner">{[{l:'Produits suivis',v:comCount},{l:'Marchés couverts',v:allMkts.length},{l:'Sources de données',v:sources.length},{l:'Dernière mise à jour',v:lastDate}].map(s=>(<div key={s.l} className="stat-item"><div className="stat-value">{s.v}</div><div className="stat-label">{s.l}</div></div>))}</div></div>
          <main className="main">
            <div className="page-header">
              <h2 className="page-title">Prix du <span>Marché</span>{GATE_IS_LIVE&&!isPaid&&<span style={{fontSize:13,color:'#94A3B8',fontWeight:400,marginLeft:10}}>· Prix d'hier</span>}</h2>
              <p className="page-sub">Données en temps réel depuis les marchés de Dakar et environs</p>
            </div>
            {GATE_IS_LIVE&&!isPaid&&<UpgradePrompt/>}
            <div className="search-filter-row">
              <div className="search-wrap"><span className="search-icon">🔍</span><input className="search-input" type="text" placeholder="Rechercher un produit... ex: mil, riz, thiof, carotte" value={search} onChange={e=>setSearch(e.target.value)}/></div>
              <div className="filter-tabs">{[['all','Tout'],['cereals and tubers','Céréales'],['pulses and nuts','Légumineuses'],['fruits and vegetables','Fruits & Légumes'],['vegetables','Légumes'],['fruits','Fruits'],['fish','Poisson'],['seafood','Fruits de mer'],['meat','Viande'],['poultry','Volaille']].map(([k,l])=>(<button type="button" key={k} className={'cat-tab'+(category===k?' active':'')} onClick={e=>{e.preventDefault();setCategory(k)}}>{l}</button>))}</div>
            </div>
            {loading?(<div className="loading"><div className="spinner"></div><p style={{fontWeight:500}}>Chargement des prix...</p></div>):Object.keys(byCom).length===0?(<div className="empty">Aucun produit trouvé{search?' pour "'+search+'"':''}.</div>):(
              <div className="commodity-grid">
                {Object.entries(byCom).map(([cid,group],idx)=>{
                  const c=commodities.find(x=>x.id===parseInt(cid));if(!c)return null
                  const avg=group.reduce((s,p)=>s+p.price,0)/group.length
                  const isSel=selected&&selected.commodity_id===parseInt(cid)
                  const rec=getRec(avg,null)
                  const sf=gsf(c.category,(new Date().getMonth()+1)%12)
                  const arrow=sf.dir==='up'?'▲':sf.dir==='down'?'▼':'→'
                  const predText=sf.dir==='up'?'Hausse prévue +'+Math.abs(sf.pct)+'% — '+sf.driver:sf.dir==='down'?'Baisse prévue '+sf.pct+'% — '+sf.driver:'Stable — '+sf.driver
                  return(
                    <div key={cid} className={'commodity-card'+(isSel?' selected':'')} style={{animationDelay:(idx*0.04)+'s'}} onClick={()=>handleSelect({commodity_id:parseInt(cid),commodity:c,group})}>
                      <div className="card-header">
                        <div><div className="card-cat-chip">{CAT_LABEL[c.category]||c.category}</div><div className="card-name">{fr(c.name_fr)}</div><div className="card-markets">{group.map(p=>p.market_name).filter(Boolean).join(', ')}</div></div>
                        <div className={'rec-badge '+rec.cls}>{rec.label}</div>
                      </div>
                      <div className="price-block">
                        <div className="price-row">
                          <span className="price-value">{Math.round(avg).toLocaleString()}</span>
                          <span className={'price-trend-arrow '+sf.dir}>{arrow}</span>
                          <div><div className="price-meta">FCFA / {c.unit||'kg'}</div></div>
                        </div>
                      </div>
                      <div className={'rec-reason '+rec.reasonCls}>{rec.reason}</div>
                      <div className={'pred-summary '+sf.dir}><span>{arrow}</span><span>{predText}</span></div>
                      <div className="sources-divider"></div>
                      <table className="sources-table"><tbody>{group.map(p=>(<tr key={p.id}><td className="td-source">{SOURCE_LABEL[p.source]||p.source}</td><td className="td-market">{p.market_name}</td><td className="td-price">{Math.round(p.price).toLocaleString()} F</td><td className="td-type"><span className="type-tag">{p.price_type==='retail'?'Détail':'Gros'}</span></td></tr>))}</tbody></table>
                      <div className="card-date">Mis à jour le {new Date(group[0].price_date).toLocaleDateString()}</div>
                      <RevenueCalc group={group} unit={c.unit||'kg'}/>
                      <div className="card-actions" style={{marginTop:14}} onClick={e=>e.stopPropagation()}>
                        <button type="button" className={'voir-btn'+(isSel?' active':'')} onClick={e=>{e.preventDefault();handleSelect({commodity_id:parseInt(cid),commodity:c,group})}}>
                          {isSel?'Masquer les détails ↑':'Analyse complète + Prévision →'}
                        </button>
                      </div>
                    </div>
                  )
                })}
              </div>
            )}
            {selected&&<div id="dp"><DetailPanel selected={selected} history={history} histLoading={histLoading} isPaid={isPaid}/></div>}
          </main>
          {reportingCommodity&&<ReportModal commodity={reportingCommodity} onClose={()=>setReportingCommodity(null)}/>}
        </div>
      )}

      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand">Jàng Prix</div>
          <div className="footer-right">
            <div className="footer-sources">Sources : WFP VAM · Auchan Sénégal · FAO GIEWS · SenPoisson · Thiaroye · Park Nadio</div>
            <div className="footer-markets">Marchés : Dakar · Thiaroye · Pikine · Rufisque · Keur Massar · Niayes · Soumbédioune</div>
            <div className="footer-note">Les prix sont indicatifs. Vérifiez toujours sur place avant de vendre.</div>
          </div>
        </div>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
