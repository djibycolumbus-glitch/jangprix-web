<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0e1a"/>
  <title>Jàng Prix — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a; --bg2: #0f1629; --bg3: #161e35; --bg4: #1d2844;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
      --accent: #FACC15; --accent2: #F59E0B;
      --green: #22C55E; --red: #EF4444; --blue: #3B82F6;
      --text: #F8FAFC; --text2: #CBD5E1; --text3: #94A3B8; --text4: #475569;
      --paid-bg: rgba(34,197,94,0.08); --paid-border: rgba(34,197,94,0.25);
      --free-bg: rgba(148,163,184,0.06); --free-border: rgba(148,163,184,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse at 50% 0%, rgba(250,204,21,0.06) 0%, transparent 60%); }
    .login-card { background: var(--bg2); border: 1px solid rgba(250,204,21,0.15); border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; animation: fadeUp 0.4s ease; }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .login-logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #0a0e1a; }
    .login-logo-name { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); }
    .login-logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 2px; }
    .login-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text4); margin-bottom: 20px; }
    .login-input { width: 100%; padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 16px; outline: none; letter-spacing: 4px; text-align: center; }
    .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(250,204,21,0.1); }
    .login-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }
    .login-btn { width: 100%; padding: 12px; margin-top: 16px; background: var(--accent); color: #0a0e1a; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .login-btn:hover { background: var(--accent2); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ADMIN LAYOUT */
    .admin-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 50; }
    .admin-header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 56px; }
    .admin-logo { display: flex; align-items: center; gap: 8px; }
    .admin-logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10px; color: #0a0e1a; }
    .admin-logo-text { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
    .admin-logo-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent); background: rgba(250,204,21,0.1); padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; margin-left: 6px; }
    .admin-header-actions { display: flex; gap: 8px; }
    .admin-btn { padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text3); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .admin-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat-card-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--text); }
    .stat-card-label { font-size: 11px; color: var(--text4); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .stat-card-value.accent { color: var(--accent); }
    .stat-card-value.green { color: var(--green); }

    /* FILTERS & SEARCH */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .search-input { flex: 1; min-width: 200px; padding: 9px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
    .search-input::placeholder { color: var(--text4); }
    .search-input:focus { border-color: var(--accent); }
    .filter-btn { padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--border2); color: var(--text2); }
    .filter-btn.active { background: var(--accent); color: #0a0e1a; border-color: var(--accent); font-weight: 600; }

    /* TABLE */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .sub-table { width: 100%; border-collapse: collapse; }
    .sub-table th { padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text4); text-align: left; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg3); }
    .sub-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text2); }
    .sub-table tr:last-child td { border-bottom: none; }
    .sub-table tr:hover td { background: rgba(250,204,21,0.02); }
    .sub-name { font-weight: 600; color: var(--text); }
    .sub-phone { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); }
    .sub-notes { font-size: 11px; color: var(--text4); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* STATUS BADGES */
    .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-paid { background: var(--paid-bg); color: var(--green); border: 0.5px solid var(--paid-border); }
    .badge-free { background: var(--free-bg); color: var(--text3); border: 0.5px solid var(--free-border); }
    .badge-expired { background: rgba(239,68,68,0.08); color: var(--red); border: 0.5px solid rgba(239,68,68,0.25); }
    .badge-expiring { background: rgba(250,204,21,0.08); color: var(--accent); border: 0.5px solid rgba(250,204,21,0.25); }

    /* ACTION BUTTONS */
    .act-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg3); color: var(--text3); font-size: 11px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; margin-right: 4px; }
    .act-btn:hover { border-color: var(--accent); color: var(--accent); }
    .act-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; width: 100%; max-width: 400px; animation: fadeUp 0.25s ease; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text4); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal-btn { flex: 1; padding: 10px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; }
    .modal-btn.primary { background: var(--accent); color: #0a0e1a; }
    .modal-btn.primary:hover { background: var(--accent2); }
    .modal-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn.secondary { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
    .modal-btn.secondary:hover { border-color: var(--border2); color: var(--text2); }
    .modal-btn.danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .modal-btn.danger:hover { background: rgba(239,68,68,0.2); }

    /* PLAN CARDS */
    .plan-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .plan-card { padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); cursor: pointer; transition: all 0.15s; text-align: center; }
    .plan-card:hover { border-color: var(--border2); }
    .plan-card.selected { border-color: var(--accent); background: rgba(250,204,21,0.05); }
    .plan-card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .plan-card-price { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text4); }
    .plan-card-days { font-size: 11px; color: var(--accent); margin-top: 4px; }

    /* NOTE INPUT */
    .note-input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 60px; }
    .note-input:focus { border-color: var(--accent); }
    .note-input::placeholder { color: var(--text4); }
    .note-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }

    /* TOAST */
    .toast { position: fixed; top: 16px; right: 16px; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 300; animation: fadeUp 0.3s ease; }
    .toast.success { background: var(--paid-bg); color: var(--green); border: 1px solid var(--paid-border); }
    .toast.error { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .empty { padding: 60px; text-align: center; color: var(--text4); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 8px; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .sub-table th:nth-child(5), .sub-table td:nth-child(5),
      .sub-table th:nth-child(6), .sub-table td:nth-child(6) { display: none; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://rwidbemcvfkkkloozrjn.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3aWRiZW1jdmZra2tsb296cmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzI4NTYsImV4cCI6MjA5MDMwODg1Nn0.2z9JjrGlwGkH7QMEqHIqMj3O2aotGKTpdW6GYr5RMZM'

// Password stored in memory after login — never hardcoded
let ADMIN_TOKEN = ''

// ── API ──────────────────────────────────────────────────────────────────────
async function verifyPassword(pw) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/verify_admin_password', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ input_password: pw })
  })
  return await r.json()
}

async function dbGetSubscribers() {
  const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/admin_get_subscribers', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ admin_password: ADMIN_TOKEN })
  })
  return await r.json()
}

async function dbUpdateSubscriber(id, fields) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/admin_update_subscriber', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      admin_password: ADMIN_TOKEN,
      subscriber_id: id,
      new_access_level: fields.access_level,
      new_plan: fields.plan || null,
      new_expires_at: fields.expires_at || null,
      new_activated_at: fields.activated_at || null,
      new_notes: fields.notes || null
    })
  })
  if (!r.ok) throw new Error('Update failed')
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function addDays(date, days) {
  const d = new Date(date)
  d.setDate(d.getDate() + days)
  return d
}

function getStatus(sub) {
  if (sub.access_level === 'free') return 'free'
  if (!sub.expires_at) return 'paid'
  const now = new Date()
  const exp = new Date(sub.expires_at)
  const dl = Math.ceil((exp - now) / 86400000)
  if (dl < 0) return 'expired'
  if (dl <= 7) return 'expiring'
  return 'paid'
}

function fmtDate(d) {
  if (!d) return '\u2014'
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })
}

function daysLeft(d) {
  if (!d) return null
  return Math.ceil((new Date(d) - new Date()) / 86400000)
}

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  loggedIn: false,
  loginError: false,
  subscribers: [],
  loading: false,
  search: '',
  filter: 'all',
  modal: null,
  toast: null,
  selectedPlan: 'monthly',
  noteText: ''
}

function setState(patch) {
  Object.assign(state, patch)
  render()
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function loadSubscribers() {
  setState({ loading: true })
  try {
    const data = await dbGetSubscribers()
    setState({ subscribers: Array.isArray(data) ? data : [], loading: false })
  } catch (e) {
    console.error(e)
    setState({ subscribers: [], loading: false })
    showToast('Erreur de chargement', 'error')
  }
}

async function activateUser(sub, plan, notes) {
  const days = plan === 'yearly' ? 365 : 30
  const expires = addDays(new Date(), days).toISOString()
  try {
    await dbUpdateSubscriber(sub.id, {
      access_level: 'paid',
      plan: plan,
      expires_at: expires,
      activated_at: new Date().toISOString(),
      notes: notes || sub.notes || null
    })
    showToast('\u2713 ' + sub.name + ' activ\u00e9 \u2014 ' + (plan === 'yearly' ? '365 jours' : '30 jours'), 'success')
    await loadSubscribers()
  } catch (e) {
    showToast('Erreur: ' + e.message, 'error')
  }
}

async function revokeUser(sub) {
  try {
    await dbUpdateSubscriber(sub.id, {
      access_level: 'free',
      plan: null,
      expires_at: null,
      activated_at: sub.activated_at,
      notes: sub.notes || null
    })
    showToast('\u2713 Acc\u00e8s r\u00e9voqu\u00e9 pour ' + sub.name, 'success')
    await loadSubscribers()
  } catch (e) {
    showToast('Erreur: ' + e.message, 'error')
  }
}

async function saveNote(sub, note) {
  try {
    await dbUpdateSubscriber(sub.id, {
      access_level: sub.access_level,
      plan: sub.plan,
      expires_at: sub.expires_at,
      activated_at: sub.activated_at,
      notes: note
    })
    showToast('\u2713 Note sauvegard\u00e9e', 'success')
    await loadSubscribers()
  } catch (e) {
    showToast('Erreur: ' + e.message, 'error')
  }
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null
function showToast(msg, type) {
  if (toastTimer) clearTimeout(toastTimer)
  setState({ toast: { msg, type } })
  toastTimer = setTimeout(function() { setState({ toast: null }) }, 3000)
}

// ── Computed ─────────────────────────────────────────────────────────────────
function getFiltered() {
  let list = state.subscribers
  if (state.search) {
    const q = state.search.toLowerCase()
    list = list.filter(function(s) {
      return s.name.toLowerCase().includes(q) || s.phone.includes(q) || (s.notes || '').toLowerCase().includes(q)
    })
  }
  if (state.filter === 'paid') list = list.filter(function(s) { const st = getStatus(s); return st === 'paid' || st === 'expiring' })
  if (state.filter === 'free') list = list.filter(function(s) { return getStatus(s) === 'free' })
  if (state.filter === 'expired') list = list.filter(function(s) { return getStatus(s) === 'expired' })
  return list
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('root').innerHTML = state.loggedIn ? renderAdmin() : renderLogin()
  bindEvents()
}

function renderLogin() {
  return '<div class="login-wrap">' +
    '<div class="login-card">' +
      '<div class="login-logo">' +
        '<div class="login-logo-mark">JP</div>' +
        '<div>' +
          '<div class="login-logo-name">J\u00e0ng Prix</div>' +
          '<div class="login-logo-sub">ADMIN \u00b7 ACC\u00c8S RESTREINT</div>' +
        '</div>' +
      '</div>' +
      '<div class="login-title">Panneau d\'administration</div>' +
      '<div class="login-sub">Entrez le mot de passe pour continuer.</div>' +
      '<input class="login-input" type="password" id="pw-input" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" maxlength="40" autocomplete="off"/>' +
      (state.loginError ? '<div class="login-error">Mot de passe incorrect.</div>' : '') +
      '<button class="login-btn" id="login-btn">Acc\u00e9der</button>' +
    '</div>' +
  '</div>'
}

function renderAdmin() {
  const subs = state.subscribers
  const total = subs.length
  const paid = subs.filter(function(s) { const st = getStatus(s); return st === 'paid' || st === 'expiring' }).length
  const free = subs.filter(function(s) { return getStatus(s) === 'free' }).length
  const expired = subs.filter(function(s) { return getStatus(s) === 'expired' }).length
  const monthlyRevenue = subs.filter(function(s) { return s.plan === 'monthly' && (getStatus(s) === 'paid' || getStatus(s) === 'expiring') }).length * 3500 +
    subs.filter(function(s) { return s.plan === 'yearly' && (getStatus(s) === 'paid' || getStatus(s) === 'expiring') }).length * 3000

  const filtered = getFiltered()

  let html = ''

  // HEADER
  html += '<header class="admin-header"><div class="admin-header-inner">' +
    '<div class="admin-logo">' +
      '<div class="admin-logo-mark">JP</div>' +
      '<span class="admin-logo-text">J\u00e0ng Prix</span>' +
      '<span class="admin-logo-badge">ADMIN</span>' +
    '</div>' +
    '<div class="admin-header-actions">' +
      '<button class="admin-btn" id="refresh-btn">\u21bb Actualiser</button>' +
      '<button class="admin-btn" id="logout-btn">D\u00e9connexion</button>' +
    '</div>' +
  '</div></header>'

  html += '<main class="main">'

  // STATS
  html += '<div class="stats-row">' +
    '<div class="stat-card"><div class="stat-card-value">' + total + '</div><div class="stat-card-label">Total abonn\u00e9s</div></div>' +
    '<div class="stat-card"><div class="stat-card-value green">' + paid + '</div><div class="stat-card-label">Payants actifs</div></div>' +
    '<div class="stat-card"><div class="stat-card-value">' + free + '</div><div class="stat-card-label">Gratuits</div></div>' +
    '<div class="stat-card"><div class="stat-card-value accent">' + monthlyRevenue.toLocaleString('fr-FR') + ' F</div><div class="stat-card-label">Revenu mensuel estim\u00e9</div></div>' +
  '</div>'

  // TOOLBAR
  html += '<div class="toolbar">' +
    '<input class="search-input" id="search-input" type="text" placeholder="Rechercher par nom ou t\u00e9l\u00e9phone\u2026" value="' + (state.search || '') + '"/>'

  var filters = [['all', 'Tous (' + total + ')'], ['paid', 'Payants (' + paid + ')'], ['free', 'Gratuits (' + free + ')'], ['expired', 'Expir\u00e9s (' + expired + ')']]
  for (var i = 0; i < filters.length; i++) {
    html += '<button class="filter-btn' + (state.filter === filters[i][0] ? ' active' : '') + '" data-filter="' + filters[i][0] + '">' + filters[i][1] + '</button>'
  }
  html += '</div>'

  // TABLE
  if (state.loading) {
    html += '<div class="empty"><div class="spinner"></div>Chargement\u2026</div>'
  } else if (filtered.length === 0) {
    html += '<div class="empty">Aucun abonn\u00e9 trouv\u00e9' + (state.search ? ' pour "' + state.search + '"' : '') + '.</div>'
  } else {
    html += '<div class="table-wrap"><table class="sub-table">' +
      '<thead><tr><th>Nom</th><th>T\u00e9l\u00e9phone</th><th>Statut</th><th>Plan</th><th>Expire</th><th>Notes</th><th>Actions</th></tr></thead><tbody>'

    for (var j = 0; j < filtered.length; j++) {
      var s = filtered[j]
      var st = getStatus(s)
      var badgeCls = st === 'paid' ? 'badge-paid' : st === 'expiring' ? 'badge-expiring' : st === 'expired' ? 'badge-expired' : 'badge-free'
      var badgeText = st === 'paid' ? 'ACTIF' : st === 'expiring' ? 'EXPIRE BIENT\u00d4T' : st === 'expired' ? 'EXPIR\u00c9' : 'GRATUIT'
      var dl = daysLeft(s.expires_at)
      var expText = st === 'free' ? '\u2014' : dl !== null ? (dl < 0 ? 'Expir\u00e9 il y a ' + Math.abs(dl) + 'j' : dl + 'j restants') : '\u2014'
      var planText = s.plan === 'monthly' ? 'Mensuel' : s.plan === 'yearly' ? 'Annuel' : s.plan === 'trial' ? 'Essai' : '\u2014'

      html += '<tr>' +
        '<td><span class="sub-name">' + s.name + '</span></td>' +
        '<td><span class="sub-phone">' + s.phone + '</span></td>' +
        '<td><span class="badge ' + badgeCls + '">' + badgeText + '</span></td>' +
        '<td>' + planText + '</td>' +
        '<td>' + expText + '</td>' +
        '<td><span class="sub-notes" title="' + (s.notes || '').replace(/"/g, '&quot;') + '">' + (s.notes || '\u2014') + '</span></td>' +
        '<td>' +
          (st === 'free' || st === 'expired' ? '<button class="act-btn" data-action="activate" data-id="' + s.id + '">\u2713 Activer</button>' : '') +
          (st === 'paid' || st === 'expiring' ? '<button class="act-btn danger" data-action="revoke" data-id="' + s.id + '">R\u00e9voquer</button>' : '') +
          '<button class="act-btn" data-action="note" data-id="' + s.id + '">Note</button>' +
        '</td>' +
      '</tr>'
    }
    html += '</tbody></table></div>'
  }

  html += '</main>'

  // MODAL
  if (state.modal) {
    var m = state.modal
    html += '<div class="modal-overlay" id="modal-overlay"><div class="modal">'

    if (m.type === 'activate') {
      html += '<div class="modal-title">Activer ' + m.sub.name + '</div>' +
        '<div class="modal-sub">' + m.sub.phone + '</div>' +
        '<div class="plan-cards">' +
          '<div class="plan-card' + (state.selectedPlan === 'monthly' ? ' selected' : '') + '" data-plan="monthly">' +
            '<div class="plan-card-name">Mensuel</div>' +
            '<div class="plan-card-price">3 500 FCFA</div>' +
            '<div class="plan-card-days">30 jours</div>' +
          '</div>' +
          '<div class="plan-card' + (state.selectedPlan === 'yearly' ? ' selected' : '') + '" data-plan="yearly">' +
            '<div class="plan-card-name">Annuel</div>' +
            '<div class="plan-card-price">36 000 FCFA</div>' +
            '<div class="plan-card-days">365 jours</div>' +
          '</div>' +
        '</div>' +
        '<label class="note-label">Note (optionnel)</label>' +
        '<textarea class="note-input" id="note-input" placeholder="ex: Pay\u00e9 Wave 12 jan\u2026">' + (state.noteText || '') + '</textarea>'
    }

    if (m.type === 'revoke') {
      html += '<div class="modal-title">R\u00e9voquer l\'acc\u00e8s</div>' +
        '<div class="modal-sub">Retirer l\'acc\u00e8s payant de ' + m.sub.name + ' (' + m.sub.phone + ') ?</div>'
    }

    if (m.type === 'note') {
      html += '<div class="modal-title">Modifier la note</div>' +
        '<div class="modal-sub">' + m.sub.name + ' \u00b7 ' + m.sub.phone + '</div>' +
        '<textarea class="note-input" id="note-input" placeholder="Ajouter une note\u2026">' + (m.sub.notes || '') + '</textarea>'
    }

    html += '<div class="modal-actions">' +
      '<button class="modal-btn secondary" id="modal-cancel">Annuler</button>' +
      '<button class="modal-btn ' + (m.type === 'revoke' ? 'danger' : 'primary') + '" id="modal-confirm">' +
        (m.type === 'activate' ? 'Activer' : m.type === 'revoke' ? 'R\u00e9voquer' : 'Sauvegarder') +
      '</button>' +
    '</div>'

    html += '</div></div>'
  }

  // TOAST
  if (state.toast) {
    html += '<div class="toast ' + state.toast.type + '">' + state.toast.msg + '</div>'
  }

  return html
}

// ── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  // LOGIN
  var loginBtn = document.getElementById('login-btn')
  var pwInput = document.getElementById('pw-input')
  if (loginBtn) {
    loginBtn.onclick = handleLogin
  }
  if (pwInput) {
    pwInput.onkeydown = function(e) { if (e.key === 'Enter') handleLogin() }
    setTimeout(function() { if (pwInput) pwInput.focus() }, 50)
  }

  // ADMIN
  var logoutBtn = document.getElementById('logout-btn')
  if (logoutBtn) logoutBtn.onclick = function() { ADMIN_TOKEN = ''; setState({ loggedIn: false, loginError: false, subscribers: [] }) }

  var refreshBtn = document.getElementById('refresh-btn')
  if (refreshBtn) refreshBtn.onclick = loadSubscribers

  var searchInput = document.getElementById('search-input')
  if (searchInput) searchInput.oninput = function(e) { setState({ search: e.target.value }) }

  // FILTER BUTTONS
  document.querySelectorAll('[data-filter]').forEach(function(btn) {
    btn.onclick = function() { setState({ filter: btn.dataset.filter }) }
  })

  // ACTION BUTTONS
  document.querySelectorAll('[data-action]').forEach(function(btn) {
    btn.onclick = function() {
      var sub = state.subscribers.find(function(s) { return s.id === parseInt(btn.dataset.id) })
      if (!sub) return
      if (btn.dataset.action === 'activate') setState({ modal: { type: 'activate', sub: sub }, selectedPlan: 'monthly', noteText: '' })
      if (btn.dataset.action === 'revoke') setState({ modal: { type: 'revoke', sub: sub } })
      if (btn.dataset.action === 'note') setState({ modal: { type: 'note', sub: sub } })
    }
  })

  // MODAL
  var overlay = document.getElementById('modal-overlay')
  if (overlay) overlay.onclick = function(e) { if (e.target === overlay) setState({ modal: null }) }

  var cancelBtn = document.getElementById('modal-cancel')
  if (cancelBtn) cancelBtn.onclick = function() { setState({ modal: null }) }

  var confirmBtn = document.getElementById('modal-confirm')
  if (confirmBtn) confirmBtn.onclick = handleModalConfirm

  // PLAN CARDS
  document.querySelectorAll('[data-plan]').forEach(function(card) {
    card.onclick = function() { setState({ selectedPlan: card.dataset.plan }) }
  })

  // NOTE INPUT live sync
  var noteInput = document.getElementById('note-input')
  if (noteInput) noteInput.oninput = function(e) { state.noteText = e.target.value }
}

async function handleLogin() {
  var pw = document.getElementById('pw-input').value
  var loginBtn = document.getElementById('login-btn')
  if (loginBtn) { loginBtn.disabled = true; loginBtn.textContent = 'V\u00e9rification\u2026' }

  try {
    var valid = await verifyPassword(pw)
    if (valid === true) {
      ADMIN_TOKEN = pw
      setState({ loggedIn: true, loginError: false })
      loadSubscribers()
    } else {
      setState({ loginError: true })
    }
  } catch (e) {
    console.error(e)
    setState({ loginError: true })
  }

  if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = 'Acc\u00e9der' }
}

async function handleModalConfirm() {
  var m = state.modal
  var confirmBtn = document.getElementById('modal-confirm')
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'En cours\u2026' }

  if (m.type === 'activate') {
    var noteInput = document.getElementById('note-input')
    var note = noteInput ? noteInput.value : state.noteText
    await activateUser(m.sub, state.selectedPlan, note)
  }
  if (m.type === 'revoke') {
    await revokeUser(m.sub)
  }
  if (m.type === 'note') {
    var noteInput2 = document.getElementById('note-input')
    var note2 = noteInput2 ? noteInput2.value : state.noteText
    await saveNote(m.sub, note2)
  }

  setState({ modal: null })
}

// ── Init ─────────────────────────────────────────────────────────────────────
render()
</script>
</body>
</html>
